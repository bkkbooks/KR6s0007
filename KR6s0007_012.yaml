body:
  text: 上天竺前住持沙門一如等奉勑集注四仙避死出出曜經昔有梵志兄弟四人各得五通自知命促却後七日皆當命終共相議言我等既得五通以己神力何所不辦豈不能避此難也四人雖各往避死終不免佛以道眼觀見其死終不可避而説偈曰非空非海中非入山石間無有地方所脫之不受死梵語梵志華言淨裔五通者一足不履地二知人心命三回眼千里四呼名即至五石壁無礙也一入海入海者言吾入大海上不至表下不至底正處中間無常殺鬼焉知我處七日期滿命亦終盡二入山入山者言吾入須彌山擘山兩開入中還合無常殺鬼焉知我處七日期滿命亦終盡梵語須彌華言妙高三隱空隱空者言吾踊身虛空中隱形無迹無常殺鬼焉知我處七日期滿自空墮地而死猶如果熟自然脫落四居廛居廛者言吾當隱居大市之中衆人猥閙各不相識無常殺鬼隨得一人何必取吾七日期滿於衆人中亦自命終四種死生出雜阿含經波斯匿王白佛言云何為婆羅門死還生婆羅門家及剎帝利毗舍首陀家耶佛言當知死生有四種不同梵語波斯匿華言勝軍梵語婆羅門華言淨行梵語剎帝利華言王種梵語毗舍華言商賈梵語首陀華言農人一從冥入冥冥即暗也謂世人生卑賤家或旃陀羅家及餘種種下賤之家貧窮活命形體憔悴而復作卑賤之業名之為冥處此冥中復行身口意惡業死墮惡趣是為從冥入冥梵語旃陀羅華言屠者惡趣即餓鬼畜生地獄也二從冥入明謂世人生卑賤家乃至作諸鄙惡之業名之為冥於此冥中能行身口意善業身壞命終生於人天是為從冥入明三從明入冥謂世人生富貴家若剎帝利婆羅門長者家受身端正多財多智名之為明於此明中行身口意惡業身壞命終當生惡趣受無量苦是為從明入冥四從明入明謂世人生富貴家乃至形相端嚴名之為明於此明中行身口意善業勤修福德身壞命終天上受生是為從明入明菩薩四心出金剛經論菩薩梵語具云菩提薩埵華言覺有情謂菩薩發此四種心度諸衆生故天親頌曰廣大第一常其心不顛倒是也一廣大心謂菩薩發心度生欲令三界四生之類普皆濟度無一衆生而不度者所度衆生無量無邊是名廣大心三界者欲界色界無色界也四生者卵生胎生濕生化生也二第一心謂菩薩度脫三界四生之類不欲令證聲聞小果要皆令入無餘涅槃是名第一心梵語涅槃華言滅度無餘涅槃者惑業與身俱滅名曰無餘三常心謂菩薩度無量無數無邊衆生了知衆生本來空寂實無衆生得滅度者雖無衆生可度而度生之心常無懈倦是名常心四不顛倒心謂菩薩度生若有我人等相即非菩薩菩薩了知我人等相本來皆空無能度者是名不顛倒心我人者於色受想行識五陰上強立主宰名我復計為人名人也四無量心出法界次第四無量心者慈悲喜捨也通名無量者謂菩薩利他之心廣大也所緣衆生既無量而能緣之心亦無量也菩薩梵語具云菩提薩埵華言覺有情一慈無量心慈名愛念即與樂之心也謂菩薩愛念一切衆生常求樂事隨彼所求而饒益之故名慈無量心二悲無量心悲名愍傷即苦之心也謂菩薩愍念一切衆生受種種苦常懷悲心拯救濟令其得脫故名悲無量心三喜無量心謂菩薩慶他衆生離苦得樂其心恱豫欣慶無量故名喜無量心四捨無量心謂菩薩於所緣衆生無憎愛心名之為捨復念一切衆生同得無憎無愛無瞋無恨無怨無惱故名捨無量心四種信心出起信論一信根本謂真如之法諸佛所師衆行之源能愛樂者即是信於根本故云信根本二信佛謂信佛有無量功德常念親近供養恭敬發起善根求一切智故云信佛三信法謂信受諸佛所説之法有大利益常念修行故云信法四信僧謂信僧能正修行自利利他常樂親近求學其道故云信僧四緣發菩提心出地持經一見聞為增上緣增上即增進之義謂世間之人或見或聞諸佛菩薩有不可思議神通變化之事既見聞已即發是念是佛菩薩功行具足能為如是諸變化事以此見聞為增上緣故樂佛大智發菩提心梵語菩提華言道二聞法為增上緣謂世間之人雖不見聞諸佛菩薩神通變化但聞説法讚嘆菩提及大乘法彼人聞已則歡喜信樂以此聞法為增上緣故樂佛大智發菩提心三護法為增上緣謂世間之人雖不聞法或見法欲滅之相遂作是念無量衆生造諸惡業當遭大苦我今修菩薩道護持正法為諸衆生滅無量苦以此護法為增上緣故樂佛大智發菩提心四發心為增上緣謂世間之人雖不見法滅之相但見惡世衆生為煩惱所障不能出離生死遂作是念於此惡世尚不能發二乘之願況能志求無上菩提我當發心亦令他發以此發心為增上緣故樂佛大智發菩提心二乘者聲聞乘緣覺乘也菩薩四法出瑜伽師地論一善修事業謂修菩薩行者於種種財法惠施衆生無所吝惜諸佛戒律堅守護持遇諸苦難忍受無悔諸正法行精進無怠安住禪定心不散亂以正智慧照了諸法乃至種種行業皆悉修習是為善修事業菩薩梵語具云菩提薩埵華言覺有情二方便善巧謂修菩薩行者於諸有情或於聖教有未入者令其趣入已趣入者令其成熟已成熟者令其解脫乃至諸戒律儀受持毀犯種種方便令諸有情皆得利益是為方便善巧三饒益於他謂修菩薩行者於諸有情或以布施或以愛語或作利他之行或與隨類同事令其皆得安樂是為饒益於他四無倒回向謂修菩薩行者於己所修一切善業及方便善巧饒益之行以淨信心回向於他而求無上正等菩提終不以此所集善根倒求世間果報是為無倒回向四種法為菩薩實德出大寶積正法經一入空解脫門謂菩薩觀一切法皆從因緣和合而生無作無受如是通達名空解脫是為菩薩實德菩薩梵語具云菩提薩埵華言覺有情二入無我無願門謂菩薩觀一切法皆無有我而於三界之中無所願求雖得涅槃恆起大悲樂度衆生是為菩薩實德三界者欲界色界無色界也梵語涅槃華言滅度三巧施方便謂菩薩廣運慈悲之心於三界中巧施方便不住涅槃仍復出入生死化度衆生是為菩薩實德四施不求報謂菩薩廣運慈悲之心愍諸有情廣行給施平等無厭了達性空而不求於果報是為菩薩實德四攝法出法界次第此四通言攝者攝即攝受也謂菩薩欲化導衆生必須以此四法攝受使其依附然後導以大乘正道故維摩經云先以欲鈎牽後令入佛智是也菩薩梵語具云菩提薩埵華言覺有情一布施攝謂菩薩以財法二種布施攝衆生也若衆生樂財即以財施攝之若衆生樂法即以法施攝之衆生既蒙二施利益因是生親愛心依附受道得住真理故名布施攝二愛語攝謂菩薩隨順衆生根性善言慰喻則一切衆生樂聞善言因是生親愛心依附受道得住真理故名愛語攝三利行攝謂菩薩起身口意善行利益一切衆生因是生親愛心依附受道得住真理故名利行攝四同事攝謂菩薩以法眼明見衆生根性隨其所樂即分形示現同其所作使其各霑利益因是生親愛心依附受道得住真理故名同事攝四法集善根出大寶積正法經一樂住林間謂修菩薩行者當離憒閙住於山林空間之處寂靜宴默思惟正道而廣集一切善根也二四事攝物四事者布施愛語利行同事也謂修菩薩行者自行既充必須外引衆生同己所行之道是以常行布施周其貧乏復以愛語安慰開諭起諸利行同其事業而廣集一切善根也三捨身求法謂修菩薩行者樂求大乘之法其心勇猛雖棄捨身命亦復無所顧惜而廣集一切善根也四勤行精進謂修菩薩行者誓欲求就佛果是以勤加精進無少懈怠而廣集一切善根也四善法出涅槃經一近善知識謂善知識常談善法若人親近則得滅除一切惡法增長一切善根也二能聽受法謂既親近善知識又能聽受正法生長善根也三能思惟義謂既聞正法即當思惟微妙之義而契會於心也四如説修行謂既能思惟正法之義當如所説而修其行則能脫煩惱生死之苦證真空寂滅之道也菩薩四法門出如來不思議祕密大乘經一智門謂菩薩以大智慧善知一切衆生根性隨順調伏令其解脫是為菩薩智門菩薩梵語具云菩提薩埵華言覺有情二慧門謂菩薩以大妙慧為諸衆生分別宣説深法句義亦欲令其開發慧性照了萬法本來空寂是為菩薩慧門三陀羅尼門梵語陀羅尼華言總持以其持善不散持惡不生也蓋菩薩以總持之法隨順一切衆生言音開導正信令其滅諸惡心而行一切善法是為菩薩陀羅尼門四無礙解門謂菩薩以無礙智解為諸衆生宣説無盡甚深法義亦欲令其獲無礙解是為菩薩無礙解門在家人四種具足法出雜阿含經一信具足謂在家之人於如來所起敬信心聞勝妙法心開意解不生疑謗信根堅固是名信具足二戒具足謂在家之人起淨信心受佛禁戒不殺不盜不邪不妄語不飲酒持此五戒一無毀犯是名戒具足三施具足謂在家之人受前戒法能於一切所有之財不慳不惜施濟貧乏修此捨行是名施具足四慧具足謂在家之人既受戒行施當以智慧觀察此身虛假不實由貪瞋癡起諸煩惱招集無量生死之苦能修善道證涅槃樂是名慧具足梵語涅槃華言滅度四弘誓出止觀大意弘廣也誓制也謂菩薩廣發誓願要制其心志求滿足也菩薩梵語具云菩提薩埵華言覺有情一衆生無邊誓願度此依苦諦境而發誓也謂菩薩遍觀六道衆生等類無量無邊皆被生死諸苦所逼一一不虛故發誓願欲度脫之令出三界故云衆生無邊誓願度六道者天道人道修羅道餓鬼道畜生道地獄道也三界者欲界色界無色界也二煩惱無數誓願斷此依集諦境而發誓也謂菩薩諦審煩惱惑業無量無邊能招集生死苦果流轉三界無有窮盡故發誓願欲斷除之而使六道衆生悉亦斷除令出三界故云煩惱無數誓願斷三法門無盡誓願知此依道諦境而發誓也謂菩薩諦審一切道法無窮無盡能通至涅槃自既知已亦令一切衆生證知故云法門無盡誓願知梵語涅槃華言滅度四佛道無上誓願成此依滅諦境而發誓也謂菩薩諦審菩提之果最勝無有過上自成就已普願一切衆生咸皆成就故云佛道無上誓願成梵語菩提華言道四弘誓願出法界次第一未度者令度度即超度也謂衆生未度生死苦者令其得度也二未解者令解解即解脫也謂衆生未解煩惱業縛者令其得解也三未安者令安安即安住也謂衆生未能安住於戒定慧而修行者令其得安住也四未涅槃者令得涅槃梵語涅槃華言滅度謂衆生未滅生死之苦者令其滅之而得證於涅槃也滅度者謂大患永滅超度三界也菩薩四弘誓出陀羅尼雜集一心如大地謂願我心如大地長養衆生道芽善種皆成聖果二心如橋船謂願我心如橋船運度衆生不滯中流達於彼岸三心如大海謂願我心如大海涵育衆生同得真源霑於法味四身如虛空謂願我身如虛空包含萬物與諸衆生平等無二同證法性四梵福出增一阿含經一未起塔處起塔塔梵語具云塔婆華言高顯謂人能起塔者當來之世受初禪天福經云若有善信男子女人求梵天福者未曾起塔婆處於中能起是為初受梵天之福也二補治故寺謂修補破壞故寺當來之世受二禪天福經云補治故寺是為第二受梵天之福也三和合聖衆謂修習聖道之衆常令和合不使離散當來之世受三禪天福經云和合聖衆是為第三受梵天之福也四勸轉法輪謂聞佛成道即當勸請轉於法輪利益衆生當來之世受四禪天福經云菩薩初轉法輪若人能勸轉者是為第四受梵天之福也四法生福出大寶積正法經一恆行法施謂修菩薩行者當以如來所説正法廣為一切衆生而作利益於己之心無復吝惜是以無量福德由此而生也菩薩梵語具云菩提薩埵華言覺有情二起大悲心謂修菩薩行者常運大悲心利益一切於諸破戒衆生方便遮止不令為惡是以無量福德由此而生也三化諸有情謂修菩薩行者常以利他為心廣化一切有情令發菩提之心修習妙行成就佛果是以無量福德由此而生也梵語菩提華言道四忍辱救護謂修菩薩行者常應廣運大悲之心於諸下劣不善之人設以橫逆而加於我不惟忍受其辱抑且方便救護使其改惡遷善是以無量福德由此而生也入道四行出正宗記并稽古略達磨大師謂二祖可大師曰夫入道多塗要而言之不出理行而已謂理入者則藉教悟宗深信含生同一真性但為客塵妄想所覆不能顯了若捨妄歸真則聖凡一等無有分別若以行入者乃有四焉一報冤行凡修道之人若受苦時當念我從往昔劫中棄本逐末流浪諸有多起冤憎違害無限今雖無犯是我宿殃惡業果熟所以甘心忍受都無怨恨作是觀時與理相應體冤進道故名報冤行劫梵語具云劫簸華言分別時節二隨緣行謂衆生無我皆由業轉苦樂齊受皆從緣生若得勝報榮譽等事皆是過去宿因所感緣盡還無何喜之有得失從緣心無增減喜風不動𡨋順於道故名隨緣行三無所求行謂愚人長迷處處貪著智者悟真安心無為萬有皆空無所希冀三界久居猶如火宅有身皆苦誰得所安若了達者息念無求經云有求皆苦無求乃樂是則無求真為道行故名無所求行三界者欲界色界無色界也四稱法行謂性淨之理因之為法此理衆相皆空無染無著無此無彼故經云法無有我離我垢故智者信解此理應當稱法而行法體無慳於身命財行檀捨施心無慳惜達解三空自利利他莊嚴菩提之道為除妄想修行六度而無所行故名稱法行三空者施者受者及所施之物三相皆空也六度者一布施二持戒三忍辱四精進五禪定六智慧也四種觀行出慈悲水懺謂修行懺悔者自念煩惱深厚覆蓋慧眼令無所見斷除衆善不能出離苦果今既發露衆惡投誠懺悔須作四種觀行為滅罪之方便也一觀因緣謂修行懺悔者當觀我之此罪由無明所覆無正觀力不識其過遠離善友隨逐魔行如蛾赴火自燒自爛以是因緣不能自出是為觀因緣二觀果報謂修行懺悔者當觀所有諸惡不善之業三世輪轉苦果無窮淪溺生死大海冥然無涯如抱石沉淵求出應難是為觀果報三世者過去現在未來也三觀自身謂修行懺悔者當觀自身雖有正因靈覺之性而為煩惱黑暗之所覆蔽無了因力不能得顯是為觀自身正因者即本有正性也了因者即解了諸法也四觀如來身謂修行懺悔者當觀如來之身衆德具足湛然常住雖復方便入於滅度而慈悲救衆生之心未曾暫舍常如是觀乃滅罪之良津除障之要行是為觀如來身滅度者謂大患永滅超度三界也四事行出阿難陀目佉尼阿離陀經一身常恭謹謂修菩薩行者當謹守身業毋令放逸所謂殺盜淫等一切惡法斷而不行及諸不善律儀亦皆無犯是為身常恭謹菩薩梵語具云菩提薩埵華言覺有情二言常至誠謂修菩薩行者欲修無上正真之道當守護口業誠實不虛所謂妄言綺語惡口兩舌之過悉皆遠離是為言常至誠三意常柔順謂修菩薩行者欲成菩提當防護意業調和柔順離諸邪念所謂貪欲嗔恚愚癡皆悉斷除是為意常柔順梵語菩提華言道四善權方便謂修菩薩行者當善權方便救護一切衆生所謂或生天上乃至或入地獄不捨生死隨類現形但為利樂有情不為自求度脫是為善權方便四事供養出增一阿含經佛在舍衛國祇樹給孤獨園為波斯匿王説法王即請佛及比丘僧三月供養遂於宮門之外作大講堂懸繒幡蓋及辦一切供給所須衣被飲食臥具醫藥故云四事供養梵語舍衛華言豐德祇樹給孤獨園者謂祇陀太子捨樹給孤長者買園建立精舍請佛而住也梵語波斯匿華言勝軍一衣被衣即袈裟而有三品上品二十五條及九條中品七條下品五條被即覆身之物此皆可以蔽形骸禦寒暑嚴肅威儀以成道業是以供養佛僧也梵語袈裟華言不正色三飲食飲即種種漿水如果漿蜜漿醍醐甘蔗蒲萄等漿食即米麵酥酡肴饌等味比皆可以資色身進道業而證菩提是以供養佛僧也三臥具臥具即床褥枕席之類此可以調攝身心將養勞苦以進道行是以供養佛僧也四醫藥醫藥即冷熱甘苦辛酸草木諸劑及金石丹砂之類此皆可以治溫寒濕燥之病藉以固身延命成就道業是以供養佛僧也施有四事出諸經要集一施多得福少謂飲酒歌舞等事費用極多而無福報是名施多得福少二施少得福多謂能以慈心供奉道德之人彼人受已精進學道施物雖少其福彌大是名施少得福多三施少得福少謂以慳貪惡意施邪見外道施物既少得福亦少是名施少得福少四施多得福多謂能覺世無常發心捨財起立塔寺供養三寶所獲福報如衆河入于大海流注不斷施物既多其福亦多是名施多得福多三寶者佛寶法寶僧寶也四施出菩薩善戒經一筆施謂見人發心書寫經典當以筆施之堅固其心助成善緣也二墨施謂見人書寫經典當以墨施之堅固其心助成善緣也三經施謂刊造經板或印施與人勸其讀誦令發菩提之心也梵語菩提華言道四説法施謂若有人樂聞正法即當隨其根機方便演説使之聞法領解修因證果也四種施處出瑜伽師地論一有苦者謂貧窮乞丐盲聾殘疾無依倚者如是等類名為有苦故宜施之二有恩者謂凡於我有恩德者故宜施之此施非是菩薩之行菩薩行施豈分有恩無恩也菩薩梵語具云菩提薩埵華言覺有情三親愛者謂凡於我有親情眷愛者故宜施之此施亦非菩薩之行菩薩行施怨親平等豈分親與不親也四尊勝者謂世間之人推為賢善者及能離貪欲瞋恚愚癡而修行者如是等類名為尊勝故宜施之此施亦非菩薩之行菩薩行施見卑劣者愈當施與豈分勝與不勝也四種施俱得淨報出大涅槃經謂菩薩達性相空觀一切衆生無非福田不見持戒毀戒及施受果報之異名為淨善所以施受雖俱不淨亦俱得淨報也一施淨受不淨謂能施之人持戒多聞知有慧施及施果報受者破戒邪見言無慧施及施果報是名施淨受不淨也二施不淨受淨謂能施之人著於邪見言無慧施及施果報受者持戒多聞知有慧施及施果報是名施不淨受淨也三施受俱淨謂施者受者俱能持戒多聞智慧知有所施及施果報是名施受俱淨也四施受俱不淨謂施者受者俱破戒無聞著於邪見言無有施及施果報是名施受俱不淨四戒出華嚴孔目一解脫戒謂身不殺盜口不妄言綺語惡口兩舌則自然遠離惑業之縛而得自在是名解脫戒二定共戒謂因修習禪定發得初禪二禪三禪四禪天定之時不作意持自然不犯而戒與定俱發是名定共戒初禪二禪三禪四禪皆色界天也三道共戒謂聲聞之人於見道修道位中不作意持自然不犯而戒與道俱發是名道共戒見道即初果須陀洹修道即二果斯陀含三果阿那含也四斷戒謂斷貪瞋癡等煩惱得成道果是名斷戒四種持戒出雜阿毗曇心論一悕望戒悕即悕求望即期望謂求生天及餘善處堅持禁戒是名悕望戒二恐怖戒謂畏隨惡趣畏惡名稱堅持禁戒是名恐怖戒三順覺支戒謂隨順七覺支莊嚴其心堅持禁戒是名順覺支戒七覺支即七覺分謂擇法覺分精進覺分喜覺分除覺分捨覺分定覺分念覺分也四清淨戒謂無漏戒能離煩惱染垢是名清淨戒無漏戒者即聲聞緣覺無漏道品所發之戒也四忍出華嚴經隨疏演義鈔忍即忍可亦安忍也思益經云梵天菩薩有四忍法善出毀犯禁戒之罪一得無生忍謂一切諸法自性空寂本來不生菩薩證知此法則能超出毀犯禁戒之罪是為得無生忍二得無滅忍謂一切諸法昔本不生今亦無滅菩薩證知此法則能超出毀犯禁戒之罪是為得無滅忍三得因緣忍謂六根為因六塵為緣菩薩了知一切諸法皆從因緣和合而生本無自性則能超出毀犯禁戒之罪是為得因緣忍六根者眼根耳根鼻根舌根身根意根也六塵者色塵聲塵香塵味塵觸塵法塵也四得無住忍住即停住菩薩心不住著而無異念相續則能超出毀犯禁戒之罪是為得無住忍四種定學出成唯識論一大乘光明定謂此定所發智慧即能照了大乘理教行果故名大乘光明定理教行果者理即所詮之理教即能詮之教行即所修之行果即所證之果也二集福王定謂此定自在即能聚集無邊福德如王勢力無有等比故名集福王定三賢守定謂此定即能守持世間出世間賢善之法故名賢守定四健行定謂佛菩薩以精進大健之力修行勝行而得此定故名健行定四空處定出法界次第此四通言空處定者以其定體無形色故名之為空各依所證之境名之為處境法持心心無分散故名定也一空處定謂行者厭患色質有如牢獄心欲出離即修觀智滅三種色故不念種種相入無邊虛空處心與虛空之法相應是名空處定三種色者可見有對色不可見有對色不可見無對色也二識處定謂行者復厭虛空無邊緣多則散能破於定即捨虛空轉心緣識心與識法相應是名識處定三無所有處定謂行者復厭心識無邊緣多則散能壞於定唯有無心識處心無依倚乃名安隱如是知已即捨識處繫心無所有處心與無所有法相應是名無所有處定四非有想非無想定前識處是有想無所有處是無想至此捨前有想名非有想捨前無想名非無想謂行者復厭無所有處定如癡如醉如眠如暗無可愛樂於是一心加功忽然真實定發不見有無相貌泯然寂絶清淨無為是名非有想非無想定四種資糧出瑜伽師地論一福德資糧謂由宿世修諸福德而於今生豐饒財寶遇善知識離諸障礙能勤修行是名福德資糧二智慧資糧謂由宿世修習智慧而於今生聰慧明敏解了法義是名智慧資糧三先世資糧謂由宿世積集善根而於今生諸根完具家財富足是名先世資糧四現法資糧謂於今世有善法故善根成熟具戒律儀是名現法資糧四種意趣出阿毗達磨雜集論一平等意趣意即心意趣即趣向謂菩薩於往昔因中修平等行而成正覺今於現世化諸衆生與昔無異是名平等意趣菩薩梵語具云菩提薩埵華言覺有情二別時意趣謂衆生現世修習淨業求生極樂世界者命終皆即往生得不退轉蓋現種是因則在他時成熟是名別時意趣三別義意趣謂一切法無有自性不可執文取義當離文字相別求義趣是名別義意趣四衆生意樂意趣菩薩見衆生修得一善者讚嘆其善增彼勇猛見多貪者讚嘆佛土清淨殊勝除彼貪欲見懈怠者讚嘆諸佛精勤不息除彼懈怠皆令心生信樂發其趣向是名衆生意樂意趣四種作意出瑜伽師地論一調練心作意調練者調停練習也謂於可厭患之法調停練習令心厭離是名調練心作意二滋潤心作意滋潤者滋長沃潤也謂於可欣尚之法滋長沃潤令心欣樂是名滋潤心作意三生輕安作意輕安者即身輕心安也謂於可厭法令心厭離於可欣法令心欣樂安住寂靜對治身心粗重生起身心輕安是名生輕安作意四淨智見作意淨智者即清淨智慧也謂以此智慧照了諸法皆空即得內心寂靜由寂靜故見真實理是名淨智見作意四種念佛出普賢行願記一稱名念佛謂稱念阿彌陀佛名號於晝夜間一心專注或一萬聲乃至十萬聲如是歲月既久則念念不斷純一無雜臨命終時定見彼佛現身迎接決得往生極樂世界矣梵語阿彌陀華言無量壽二觀像念佛謂觀阿彌陀佛形像相好口稱佛名則心不散亂心不散亂則本性佛從而顯現如是則念念不斷純一無雜臨命終時定見彼佛現身迎接決得往生極樂世界矣三觀想念佛謂端坐正念面向西方心作妙觀或想阿彌陀佛眉間白玉毫相光乃至足下千輻輪相如是從上至下從下至上展轉觀之觀想純熟三昧現前臨命終時決得往生極樂世界矣梵語三昧華言正定四實相念佛謂念阿彌陀佛法性之身即得實相之理無形無相猶如虛空心及衆生本來平等如是之念即是真念念念相續三昧現前決得往生極樂世界矣四種白法出勝思惟梵天所問經論謂修菩薩行者當習一切白淨善法遠離四趣諸惡之黑法也四趣者修羅趣餓鬼趣畜生趣地獄趣也一欲白法謂修菩薩行者聞佛正教理趣深遠心生樂欲而不暫捨故名欲白法二行白法謂修菩薩行者勤行六度之行唯在利益世間一切衆生而不求於自身果報故名行白法六度者一布施二持戒三忍辱四精進五禪定六智慧也三滿足功德白法謂修菩薩行者精進勇猛遍修衆行令諸功德圓滿具足故名滿足功德白法四證白法謂修菩薩行者淨行已成功德已圓得證佛果故名證白法四種法為善友出大寶積正法經一求菩提者謂諸衆生若有發心樂求菩提之道者是為菩薩之善友也梵語菩提華言道梵語菩薩華言覺有情二作大法師謂人深達妙義作大法師為衆演説以其正行令彼進修是為菩薩之善友也三聞思修慧謂人以聞思修之三慧倍䇿精進出生一切善根者是為菩薩之善友也四求佛法者謂人修習梵行志求佛法則能離諸煩惱超出世間是為菩薩之善友也四法離魔道出大寶積正法經一不離菩提心謂菩薩修習衆善之行常欲度脫一切衆生而不離於菩提之心是以邪魔之道悉遠離也二無惱害心謂菩薩修習慈善之行於一切衆生常懷悲愍不起惱害之心是以邪魔之道悉遠離也三明了諸法謂菩薩以智慧照察於一切法明了通達正直無礙是以邪魔之道悉遠離也四不生輕慢謂菩薩了達諸法平等於諸有情常行不輕之行而無憍慢之心是以邪魔之道悉遠離也四事先苦後樂出增一阿含經一修習梵行先苦後樂梵即淨也謂人不辭勞苦修習淨行淨行既立則能證於道果而得涅槃之樂故名修習梵行先苦後樂梵語涅槃華言滅度二誦習經文先苦後樂謂人不辭勞苦口誦經文心習其義其義習熟則能如説修行證於道果而得涅槃之樂故名誦習經文先苦後樂三坐禪念定先苦後樂謂人不辭勞苦坐禪念定由禪定力則能次第入諸三昧證於道果而得涅槃之樂故名坐禪念定先苦後樂梵語三昧華言正定四數出入息先苦後樂謂人不辭勞苦數出入息自然攝諸散亂心得寂靜安住正理與定相應由此證於道果而得涅槃之樂故名數出入息先苦後樂四魔出瑜伽師地論魔梵語具云魔羅華言能奪命又云殺者謂能奪智慧之命而殺害出世善根故也一蘊魔蘊猶積聚也謂色受想行識等積聚而成生死苦果此生死法能奪智慧之命故云蘊魔二煩惱魔謂三界中一切煩惱妄惑也修行之人為此妄惑惱亂心神不能成就菩提是名煩惱魔三界者欲界色界無色界也三死魔死者謂四大分散天喪殞沒也修行之人為此夭喪不能續延慧命是名死魔四大者地大水大火大風大也四天魔此魔即欲界第六天也若人勤修勝善欲超越三界生死而此天魔為作障礙發起種種擾亂之事令修行人不得成就出世善根是名天魔第六天即他化自在天也外道四論出瑜伽師地論一常論謂外道計我及世間之法皆是常住又見諸識流轉相續從此世間至彼世間無斷絶故發起常見是名常論二邊無邊論謂外道若憶念壞劫壞諸世間即於世間起有邊想若憶念成劫成諸世間即於世間起無邊想是名邊無邊論劫梵語具云劫波華言分別時節壞劫成劫者中劫之名也三不死矯亂論謂諸外道若有人問世間善不善法或問世間苦集滅道四諦等法便自稱言我依不死淨天不亂詰問即於彼所問假託餘事以言矯亂是名不死矯亂論淨天即梵天外道計梵天不死故云不死淨天不亂詰問者謂梵天常居靜定故不雜亂而辨問也四無因見論謂外道計我及世間之法皆無因而起或見大風卒起於一時間寂然止息或見暴河瀰漫於一時間宛然空竭或見果木敷榮於一時間颯然衰落由如是故起無因見立無因論是名無因見論外道四見出華嚴經疏疏云外道所計不出四見謂數論計一勝論計異勤娑婆計亦一亦異尼犍陀若提子計非一非異梵語勒娑婆華言苦行梵語尼犍陀華言離繫若提母名母子兼稱故名若提子一計一謂數論師計因中有果因果不異故名計一二計異謂勝論師計因中無果因果不同故名計異三計亦一亦異謂勒娑婆論師計因中有果名一因中無果名異有無雙計故名亦一亦異四計非一非異謂尼犍陀若提子計因果亦非是一亦非是異不同計一計異故名非一非異四韋陀出摩登伽經并翻譯名義梵語韋陀華言智論即婆羅門所作邪論也以世間之智造養生等書而有四種不同故名四韋陀典其書不曾傳至東土梵語婆羅門華言淨行一阿由梵語阿由華言方命亦曰壽謂養生繕性之書也繕者治也二殊夜梵語殊夜無翻謂祭祀祈禱之書也三婆磨梵語婆磨無翻謂禮儀占卜兵法軍陳之書也四阿達婆梵語阿達婆無翻謂異能技數禁呪醫方之書也有無四句出華嚴經疏一有句謂外道或計我與五蘊之身皆有是名有句即著常見五蘊者色蘊受蘊想蘊行蘊識蘊也二無句謂外道或計我與五蘊之身皆無是名無句即著斷見三亦有亦無句謂外道欲離上二過故計我與五蘊亦有亦無即墮有無相違之見四非有非無句謂外道欲避上有無相違立俱非句故計我與五蘊非有非無則又成戲論之見常等四句出華嚴經疏一常句謂外道計過去世之我即是今世之我相續不斷執之為常即墮常見是名常句二無常句謂外道計我今世始生不從過去之因執為無常即墮斷見是名無常句三亦常亦無常句謂外道見上二執皆有過失便計我是常身是無常若爾離身則無有我此亦成過是名亦常亦無常句四非常非無常句謂外道計身有異故非常我不異故非無常若爾離身亦無有我此亦成過是名非常非無常句異四句出成唯識論外道所計不出斷常二見或執為有即是常見或執為無即是斷見於有見中及計一異遂有四句一執有法與有等性其體定一執有法者謂外道於五陰等法執為實有也有等性者謂執五陰等法皆有自性也其體定一者謂法之與性其體各無差別故云定一五陰者色陰受陰想陰行陰識陰也二執有法與有等性其體定異謂外道執法與性其體各自不同故云定異三執有法與有等性亦一亦異謂外道執法與性其體亦同亦不同故云亦一亦異四執有法與有等性非一非異謂外道執法與性其體非同非不同故云非一非異鳥四生出起世因本經金翅鳥王與龍之類皆具卵胎濕化四種而生經云大海之北有一大樹名曰居吒奢摩離其樹高一百由旬枝葉遍覆五十由旬此鳥王與龍等皆依此樹四靣而住其四靣各有宮殿縱廣六百由旬七重垣墻七寶莊嚴梵語居吒奢摩離華言鹿聚梵語由旬華言限量一卵生卵生金翅鳥王居樹東靣欲啖龍時飛往東枝之上觀大海水乃即飛下以兩翅扇大海水令水自開二百由旬取龍食之此鳥王惟能取卵生龍不能取胎濕化三生龍也二胎生胎生金翅鳥王居樹南靣欲取龍時飛往樹上乃即飛下令水開四百由旬取龍食之此鳥王惟能取卵胎二生龍不能取濕化二生龍也三濕生濕生金翅鳥王居樹西靣欲取龍時即向樹西海取之水開八百由旬此鳥王惟能取卵胎濕生之龍不能取化生龍也四化生化生金翅鳥王居樹北靣欲取龍時向樹北海取之水開一千六百由旬彼諸龍等皆為此鳥王之所食啖樓炭經云四生金翅鳥還食四生龍是也龍四生出起世因本經一卵生卵生龍居吒奢摩離樹東靣所居宮殿皆七寶莊嚴梵語居吒奢摩離華言鹿聚七寶者金銀琉璃玻璃硨磲碼瑙赤真珠也二胎生胎生龍居樹南面所居宮殿皆七寶莊嚴三濕生濕生龍居樹西靣所居宮殿皆七寶莊嚴四化生化生龍居樹北靣所居宮殿皆七寶莊嚴阿修羅四生出楞嚴經梵語阿修羅華言非天以其果報最勝鄰次諸天而非天也一卵生謂若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝二胎生謂若於天中降德貶墜生於彼道其所卜居鄰於日月此阿修羅從胎而出人趣所攝三濕生謂別有一分下劣修羅生大海心沉水穴口旦遊虛空暮歸水宿此阿修羅因濕氣而有畜生趣所攝四化生謂有阿修羅執持世界勢力無畏能與梵王及天帝釋四天王爭權此阿修羅因變化而有天趣所攝四天王東方持國天王南方增長天王西方廣目天王北方多聞天王
