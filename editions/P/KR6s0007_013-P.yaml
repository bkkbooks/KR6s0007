body:
  text: 上天竺前住持沙門一如等奉勑集註四種法離菩薩行出大寶積正法經一疑惑佛法謂人宿無善種於佛法中心生疑惑而不愛樂是以離於菩薩行也梵語菩薩華言覺有情二我見貢高謂人妄執我見心懷貢高嗔恚一切眾生是以離於菩薩行也三嫉他利養謂人見他所得利養妄起貪愛而復憎嫉是以離於菩薩行也四不敬信謂人心著邪見於佛菩薩不生敬信亦不稱讚而復毀謗是以離於菩薩行也四人有障出究竟一乘寶性論障者覆障也謂一闡提等四人各有所障不能生正信入理沉滯空寂故言四人有障梵語一闡提華言信不具一一闡提不信障謂此人不信有因有果毀謗大乘是名一闡提不信障二外道執我障謂其所執神我之見多在理外名為外道我者即於五陰身中強立主宰名之為我此外道謂罪福苦樂自有定因要當必受執著我見不信佛法是名外道執我障五陰者色陰受陰想陰行陰識陰也三聲聞畏苦障聞佛聲教故曰聲聞謂聲聞之人怖畏世間生死之苦樂著真空是名聲聞畏苦障四獨覺捨悲障謂其出無佛世獨宿孤峯觀物變易自覺真空故名獨覺此獨覺之人但能自度而不能起大悲心利益一切眾生是名獨覺捨悲障說法四謗出華嚴經隨䟽演義鈔一定有是增益謗定有者謂不知真如之理離相寂滅性本不有而言真如決定是有者則成增益謗也二定無是減謗定無者謂不知真如之理不可變壞性本不空而言真如決定是無者則成減謗也三亦有亦無是相違謗亦有亦無者謂不知真如之理是即有之空即空之有而言真如亦有是不知即空又言真如亦無是不知即有二邊共執則成有無相違謗也四非有非無是戲論謗非有非無者謂不知真如之理具有無之德而言真如非有又言真如非無二邊不定則成戲論謗也四識住出寶積經一色識住色即眼根所對之色謂內意識緣於外色之時識於色中生喜住著故名色識住二受識住受即領納之義謂意識領納六塵之時識於受中生喜住著故名受識住六塵者色塵聲塵香塵味塵觸塵法塵以其能染故名塵也三想識住想即思想謂意識想起六塵相貌之時識於想中生喜住著故名想識住四行識住造作之心名為行謂意識起諸行時識於行中生喜住若故名行識住有漏四種過失出瑜伽師地論有漏者謂漏落三界生死也三界者欲界色界無色界也一不寂靜過失謂諸眾生隨逐根塵起諸妄想顛倒散亂而無禪定之功不能斷惑證果是為不寂靜過失二內外變異過失謂諸眾生由內心亂想外境遷流心境相應更互變異所謂心隨境起境逐心生煩惱纏綿不能解脫是為內外變異過失三發起惡行過失謂諸眾生由煩惱妄惑造諸殺盜妄種種惡業輪轉生死無有出期是為發起惡行過失四攝受因過失謂諸眾生由造種種惡業之因攝取未來苦果展轉輪廻不能解脫是為攝受因過失四無明出宗鏡錄無明者於第一義無所明了故曰無明即惑是也一纏無明纏即纏縛謂由此無明之惑纏縛不能出離生死故曰纏無明二隨眠無明謂無明煩惱長時隨逐眠伏第八藏識之中故曰隨眠無明三相應無明謂意識緣於六塵之境識與境相應而起無明煩惱故曰相應無明六塵者色塵聲塵香塵味塵觸塵法塵也四獨頭無明亦名不共無明謂未有六塵之境相對而意識獨緣想諸塵之境識與境不相應故曰獨頭無明四種貪出瑜伽師地論一顯色貪謂於他人身分及青黃赤白等顯現之色而起貪著也修行之人觀色作青瘀肨脹等想而生厭離令心清淨二形色貪謂於長短嬌媚等形相之色而起貪著也修行之人觀此形相作爛壞想而生厭離令心清淨三妙觸貪觸即觸著謂於自他身分細輭光滑等觸而起貪著也修行之人觀此身分作蟲蛆想而生厭離令心清淨四承事貪謂於他人趍承服事折旋俯仰等而起貪著也修行之人觀彼趍承服事自作死想猶如枯木而生厭離令心清淨四欲出法苑珠林一情欲謂欲界眾生多於男女情愛之境而起貪欲故名情欲二色欲謂欲界眾生多於男女嬌媚等色而起貪欲故名色欲三食欲謂欲界眾生多於美味飲食而起貪欲故名食欲四欲謂欲界眾生多於男女互相染著行於欲事故名欲四縛亦名四結出鞞婆沙論縛者束縛也又連續也謂眾生由欲愛等業束縛流轉生死連續不斷故名四縛一欲愛身縛謂欲界眾生於五欲順情等境心生貪愛起諸惑業束縛於身不得解脫故名欲愛身縛五欲者色欲聲欲香欲味欲觸欲也二瞋恚身縛謂欲界眾生於五欲違情等境心生瞋恚起諸惑業束縛於身不得解脫故名瞋恚身縛三戒盜身縛戒盜亦名戒取本非是戒強以為戒名為戒盜又取以進行復名戒取如外道諸戒是也由此邪戒增長惑業束縛於身不得解脫故名戒盜身縛四我見身縛我見即見取也謂於非涅槃法中妄自分別以為涅槃生心取著名為見取由此我見增長惑業束縛於身不得解脫故名我見身縛梵語涅槃華言滅度四流出成實論流而不返謂之流謂眾生由三惑之所流轉漂泊三界而不能返於涅槃彼岸也又名四暴河者以其惑業暴湧成河漂沒眾生也亦名四軛者謂眾生為惑業所纏若牛之縛軛以駕車而不能脫離也梵語涅槃華言滅度一見流見即三界見惑也謂意根對於法塵起分別見因此見惑流轉三界不能出離故名見流三界者欲界色界無色界也二欲流欲者即欲界思惑也謂五根貪愛五塵故名為思惑即貪瞋慢也因此思惑流轉欲界不能出離故名欲流五根者眼根耳根鼻根舌根身根也五塵者色塵聲塵香塵味塵觸塵也三有流有即因果不亡為有謂色界無色界思惑即貪慢也因此思惑流轉色無色界不能出離故名有流四無明流無所明了故曰無明即三界思惑中癡惑也由此無明流轉生死不能出離故名無明流四取出佛性論一欲取欲即貪欲取即取著謂於彼欲界色聲香味觸五塵之境貪欲取著故名欲取二見取邪心分別名之為見所謂身見邊見等因見取著故名見取身見者於五陰等法妄計為身也邊見者於斷常二見中隨執一邊也三戒取謂於非戒中謬以為戒取著成行故名戒取如外道雞狗等戒是也雞狗戒者外道妄計我身前世從雞中來故今學寒雞獨立為行若妄計從狗中來即噉糞穢等是也四我語取華嚴鈔云我見我慢名為我語云何此二獨名我語由此二種說有我故又云隨假言說起於我執隨執取著故名我語取我見者於五陰等法中不了虛假妄計有我也我慢者謂以我為勝而輕僈於他也四障出海意菩薩所問淨印法門經一惑障謂諸眾生由貪欲瞋恚愚癡等惑根性昏鈍障蔽正道是名惑障二業障謂諸眾生由貪瞋癡等惑於諸善法不能勤行而隨身口意造作惡業障蔽正道是名業障三報障報即果報謂諸眾生由煩惱惑業為因而感地獄畜生餓鬼諸趣之報不聞正道是名報障四見障謂諸眾生由不聞正法起諸邪見隨逐魔事失菩提心是名見障梵語菩提華言道四刦出佛祖統紀刦梵語具云刦波華言分別時節謂人壽八萬四千歲時歷過百年則壽減一歲如是減至人壽十歲則止復過百年則增一歲如是增至八萬四千歲此一增一減名為一小刦如是二十增減名為一中刦摠成住壞空四中刦名為一大刦一成刦成刦者謂世界初成立也有二十小刦第一小刦因過去刦壞空之後第二禪光音天空中布金色雲注大洪雨積風輪上結為水輪有大風起吹水生沫而成須彌等山時一切有情皆集光音天中天眾既多居處迫窄其福減者下生世間最初有一天子從光音天沒來生大梵天中是為梵王其壽六十小刦第二小刦光音諸天來生初禪梵世天中為梵輔天其壽四十小刦第三小刦光音諸天復有來生梵世天中為梵眾天其壽二十小刦如是漸漸下生欲界天中時光音諸天有福盡者化生為人飛行自在無有男女之相地涌甘泉味如酥蜜因試甞之遂生味著失其神通及以身光世間大暗黑風吹海漂出日月置須彌山腹照四天下乃有晝夜彼時眾生由躭地味顏色粗悴復食自然稉稻殘穢在身為欲蠲除便生二道成男女根宿習力故便生滛欲夫妻共住光音諸天後來生者入母胎中遂有胎生時自然稉稻朝刈暮熟刈復隨生米長四寸後因人多貪取漸生糠𥢶刈已不生第四小刦乃至第二十小刦皆悉一增一減名為成刦梵語須彌華言妙高二住刦住刦者謂世界安住也有二十小刦第九小刦人壽減至五萬歲時第一拘留孫佛出世減至四萬歲時第二拘那含牟尼佛出世減至二萬歲時第三迦葉佛出世減至一百歲時第四釋迦牟尼佛出世第十小刦人壽減至八萬歲時第五彌勒佛出世第十五小刦於減刦中第六師子佛乃至欲樂佛凡九百九十四佛相繼出興說法度人第二十小刦於增刦中樓至佛出世滿足一千也已上二十小刦皆悉一增一減名為住刦梵語拘留孫華言所應斷梵語拘那含牟尼華言金色仙梵語迦葉華言飲光梵語釋迦牟尼華言能仁寂默梵語彌勒華言慈氏梵語樓至華言愛樂三壞刦壞刦者謂世界壞減也有二十小刦如火灾起時壞至初禪天始從地獄終至梵天有情眾生經十九增減刦次第壞盡唯器世間空曠而住乃至一切有情都盡最後一增減刦方壞器世間有七日從海底出大海盡竭須彌崩壞風吹猛𦦨燒上梵天悉成灰燼乃至三千世界一時燒盡名為壞刦噐世間者世界如噐故也梵天即初禪天也三千世界者小千中千大千也四空刦空刦者謂世界空虛也有二十小刦壞刦之後自初禪梵世已下世界空虛猶如墨無晝夜日月唯大黑暗名為空刦四土出觀無量壽佛經妙宗鈔一同居土同居土者有穢有淨謂如此土娑婆世界沙礫充滿即同居穢土也西方安養世界金寶莊嚴無四惡趣即同居淨土也雖淨穢有異皆是凡聖共住故名同居也梵語娑婆華言能忍四惡趣者脩羅趣餓鬼趣畜生趣地獄趣也二有餘土有餘土者謂二乘等已斷三界見思惑盡出生彼土尚餘無明之惑未盡故名有餘也二乘者聲聞乘緣覺乘也三界者欲界色界無色界也三果報土果報土者亦名實報土即別教十地圓教十住十行十回向乃至等覺諸菩薩所居之土也觀無量壽佛經䟽云行真實法感得勝報是也十地者歡喜地離垢地發光地𦦨慧地難勝地現前地遠行地不動地善慧地法雲地也十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也十行者歡喜行饒益行無嗔恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也十回向者救一切眾生離眾生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切眾生回向真如相回向無縛解脫回向法界無量回向也四常寂光土常寂光土者即理性土也常即法身寂即解脫光即般若此以不迁不變名常離有離無名寂照俗照真名光即妙覺究竟果佛所居之土也淨名䟽云修於圓教願行之因因極果滿道成妙覺居常寂光是也又四土出華嚴經䟽一自性身依法性土自性身者以真如自性為身即法身也法性土者即理土也謂此身土體無差別俱非色相所攝譬如虛空遍一切處是名自性身依法性土二自受用身依自受用土自受用身者謂自受用法喜之樂名自受用身即自報身也自受用土者即實報土也謂佛以相應淨識所修成就從初成佛盡未來際相續變為純淨佛土周圓無際眾寶莊嚴自受用身常依而住是名自受用身依自受用土法喜之樂者聞法歡喜而快樂也三他受用身依他受用土他受用身者謂因他機感扣而現此身即勝應身也他受用土者亦即實報土也謂佛以大慈悲力隨十地菩薩所冝變為淨土或小或大或劣或勝他受用身依之而住是名他受用身依他受用土十地者歡喜地離垢地發光地𦦨慧地難勝地現前地遠行地不動地善慧地法雲地也四變化身依變化土變化身者改轉不定名之為變無而忽有名之為化即劣應身也變化土者謂佛以大慈悲力隨諸有緣眾生所冝化為佛土或大或小或淨或穢佛變化身依之而住是名變化身依變化土世界四持出華嚴經䟽經云彼須彌山塵數風輪最在上者名殊勝威光能持普光摩尼莊嚴香水海有大蓮華名種種光明蘂香幢莊嚴世界海住在其中梵語須彌華言妙高一能持風輪謂此風輪能持香水海而使安住故曰能持風輪二所持香海謂此香水海因為風輪所持而得安住故曰所持香海三海出蓮華謂此香水海中出生大蓮華為世界種十方剎土皆為大蓮華之所含攝故曰海出蓮華四華持剎海謂此大蓮華能持世界剎海安住其中四方均平清淨堅固故曰華持剎海剎梵語具云剎摩華言土田四輪持世界出佛祖統紀輪取持載之義華嚴經云三千大千世界依於水輪風輪空輪不言金輪者文略也三千者小千中千大千也今言三千大千者總別兼稱也一金輪大地之下有金輪起世因本經云水上有風吹轉此水於上成金如熟酥生膏是名金輪二水輪金輪之下有水輪菩薩藏經云最上風輪為水輪之所依止其水量高六十八百千由旬梵語由旬華言限量三風輪水輪之下有風輪菩薩藏經云風輪量高六萬八千俱胝梵語俱胝華言百億四空輪風輪之下有空輪華嚴經云空無所依雖無所依然由眾生業感世界次第安住四風輪出華嚴經經云此四風輪能持水輪水輪能持大地令不散壞以譬如來出現依無礙慧光明而起四種大智風輪能持一切眾生義根也一安住謂三千大千世界依此風輪而得安住以譬如來大智風輪普攝眾生皆令懽喜安住也三千者小千中千大千也言三千大千者總別兼稱也二常住謂三一大千世界依此風輪而得常住以譬如來大智風輪建立正法常住世間令諸眾生皆生愛樂也三究竟謂三千大千世界依此風輪而為究竟極際以譬如來大智風輪具一切方便通達無漏究竟之道也無漏者不漏落生死也四堅固謂三千大千世界依此風輪而得堅固以譬如來大智風輪守護一切眾生善根令不斷壞也四大部洲亦名四洲形量出長阿含經一東弗于逮梵語弗于逮亦云弗婆提華言勝身以其身勝南洲故也又翻為初謂日初從此出也在須彌山東其土東狹西廣形如半月縱廣九千由旬人靣亦如半月之形人身長八肘人壽二百五十歲梵語須彌華言妙高梵語由旬亦云踰繕那華言限量大論云由旬有三大者八十里中者六十里下者四十里肘以一尺八寸為一肘二南閻浮提梵語閻浮提華言勝金洲閻浮是樹提是洲名因樹立稱故名閻浮提在須彌山南其土南狹北廣形如車箱縱廣七千由旬人靣亦像地形人身多長三肘半於中有長四肘者人壽百歲中夭者多三西瞿耶尼梵語瞿耶尼華言牛貨為彼多牛以牛為貨故名牛貨在須彌山西其土形如滿月縱廣八千由旬人靣亦如滿月人身長十六肘人壽五百歲四北欝單越梵語欝單越華言勝處以其土勝三洲故也在須彌山北其土正方猶如池沼縱廣一萬由旬人靣亦像地形人身長三十二肘人壽一千歲命無中夭日照四洲出法苑珠林起世經云刼初世間黑暗爾時忽然出生日月及諸星宿便有晝夜年歲時節日從東方出繞須彌山半腹而行照于四洲遂有晝夜不同梵語須彌華言妙高一南閻浮提日正中時謂南閻浮提日正中時東弗婆提日則始沒西瞿耶尼日則初出北欝單越正當半夜梵語閻浮提華言勝金洲梵語弗婆提華言勝身梵語瞿耶尼華言牛貨梵語欝單越華言勝處二西瞿耶尼日正中時謂西瞿耶尼日正中時南閻浮提日則始沒北欝單越日則始出東弗婆提正當半夜三東弗婆提日正中時謂東弗婆提日正中時北欝單越日則始沒南閻浮提日則初出西瞿耶尼正當半夜四北欝單越日正中時謂北欝單越日正中時西瞿耶尼日則始沒東弗婆提日則初出南閻浮提正當半夜世間四義出㭊玄記世間者即三藏教四加行中最後世第一位也以其是有漏法故名世間於中最勝故名第一有四義焉四加行者謂一煖二頂三忍四世第一也以其加功進行故也一可破壞謂世間有漏煩惱等法體本虛妄自性不實皆是無常故名可破壞也二有生滅謂世間一切諸法皆從因緣和合而生皆從因緣別離而滅故名有生滅也三隱真理謂世間有漏煩惱等法障覆真空之理不能顯發故名隱真理也四性有漏謂世間煩惱等法其性實能招集有漏生死之果故名性有漏也依正四句出華嚴經隨䟽演義鈔依正者依即所依國土正即能依之身也一依內現依依內現依者謂於國土中又現一切國土也如成就品云一一塵中難思剎隨眾生心普現前一切剎海靡不周如是方便無差別是也二正內現正正內現正者謂於一身中復現一切身也如現相品云如來一一毛孔中一切剎塵諸佛坐菩薩眾會共圍繞演說普賢之勝行是也菩薩梵語具云菩提薩埵華言覺有情三正內現依正內現依者謂於身中現一切國土也如現相品云如來安坐菩提座一毛示現多剎海一一毛現悉亦然於是普周於法界是也四依內現正依內現正者謂於國土現一切身也如現相品云一切剎土微塵數常現身雲悉充滿普為眾生放大光各雨法雨稱其心是也舍衛四德出翻譯名義梵語舍衛華言聞物亦云豐德以其具四德故也一具財寶德謂舍衛國中多出一切寶勝於餘國是名具財寶德二妙五欲德謂舍衛國中五欲勝妙非餘國所及是名妙五欲德五欲者色欲聲欲香欲味欲觸欲也三饒多聞德饒益也謂舍衛國中財寶具足五欲勝妙聞於四方是名饒多聞德四豐解脫德豐盛也謂舍衛國中之人多修道行而得解脫是名豐解脫德淨穢四句出華嚴經䟽淨穢者謂佛說華嚴經或在清淨之土或在穢惡之土也一唯染染即穢染謂佛於娑婆世界摩竭提國等處而說是經隱覆淨相故名唯染梵語娑婆華言能忍梵語摩竭提華言善勝二唯淨淨即清淨謂佛於華藏世界而說是經其地金剛無有染相故名唯淨三染淨俱謂佛隨於一處而說是經隨其機噐大小所見有異或見是染或見是淨故名染淨俱四非染淨謂佛隨於一處而說是經大乘之機不見染淨之相同一法界故名非染淨海底四寶出華嚴經經云譬如大海有四熾然光明大寶布在其底性極猛熱常能飲縮百川所注無量大水是故大海無有增減以譬如來大智慧海亦有四種大智慧寶具足無量威德光明能令眾生竭愛欲流破愚癡暗故以此四寶喻之一日藏光明大寶日藏光明大寶者譬如來有滅一切散善波浪大智慧寶由此光明觸彼菩薩令捨一切散善波浪持心一境住於三昧也梵語三昧華言正定二離潤光明大寶離潤光明大寶者譬如來有除一切法愛大智慧寶由此光明觸彼菩薩令捨離三昧味著起廣大神通也三火熖光光明大寶火𦦨光光明大寶者譬如來有慧光普照大智慧寶由此光明觸彼菩薩令捨所起廣大神通住大明功用行也四盡無餘光明大寶盡無餘光明大寶者譬如來有平等無邊功用大智慧寶由此光明觸彼菩薩令捨大功用行及息一切功用令無有餘也四河出長阿含經一殑伽河梵語殑伽華言天堂來以見其從高處而來也又名恒河此河從阿耨達池東靣銀牛口流出繞池一帀入東南海梵語阿耨達華言無熱惱在香山之南大雪山之北周圍八百里金銀琉璃玻𭹳銅鐵等以飾其岸也二信度河梵語信度華言驗河此河從阿耨達池南靣金象口流出繞池一帀入西南海又名辛頭河三縛芻河梵語縛芻華言青河此河從阿耨達池西靣瑠璃馬口流出繞池一帀入西北海梵語瑠璃華言青色寶四徙多河梵語徙多華言冷河此河從阿耨達池北靣頗胝迦師子口流出繞池一帀入東北海或曰潛流地下出積石山為中國之河源也梵語頗胝迦華言水精即玻瓈也一境四心出攝大乘論釋譬如一水本無有異盖因天人餓鬼畜生果報不同故於一水而見有四相分別之異也一天見是寶嚴地謂諸天福德勝故其所見水悉成瑠璃眾寶莊嚴之地也梵語瑠璃華言青色寶二人見是水謂世間之人所見之水清濁雖異皆是水也三餓鬼見是膿血謂由宿世慳貪罪障深重墮餓鬼中長刦不聞漿水之名既因飢渴所逼望見河水意欲飲之速趍岸傍皆是膿血也四魚見是住處住處即窟宅也謂魚以水而為住處潛躍游泳不見水相也通局四句出華嚴經䟽一或局謂佛說華嚴經或局在娑婆世界內摩竭提國故也梵語娑婆華言能忍梵語摩竭提華言善勝二或通謂佛說華嚴經或通十方世界故也三或俱謂佛說華嚴經或在摩竭提國及十方世界故也四或泯謂佛說華嚴經處染淨二相皆盡同一法界故也四光喻智出法華文句并華嚴經隨䟽演義鈔一日光喻佛智謂日光照世無幽不燭以喻佛之智慧無事不了無理不照故云日光喻佛智二月光喻菩薩智謂月之光明有虧有盈以喻菩薩雖具智慧而惑業尚未盡斷則其智慧或虧或明故云月光喻菩薩智三星光喻緣覺智謂星雖有光其照不遠以喻緣覺之人雖觀十二因緣悟真空理而於中道深遠之義不能明了故云星光喻緣覺智十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也四螢光喻聲聞智謂螢火之光只能自照不能照物以喻聲聞之人雖觀四諦悟真空理只能自度不能度人故云螢光喻聲聞智四諦者苦諦集諦滅諦道諦也四事不可思議出增一阿含經一眾生不可思議謂世間眾生為從何來復從何起從此命終當從何生皆不可思議故云眾生不可思議二世界不可思議謂一切世界皆由眾生業力而成成而復壞壞而復成始終相續無有斷絕故云世界不可思議三龍境界不可思議謂龍降雨非從口出亦不從眼耳鼻出但龍有大神力意之所念若善若惡皆能作雨故云龍境界不可思議四佛境界不可思議謂如來之身清淨無染不可模則不可言長不可言短與夫梵音深遠智慧辯才現通說法一切人天二乘等眾皆莫能測故云佛境界不可思議二乘者聲聞乘緣覺乘也四種心出翻譯名義一肉團心肉團心者即父母所生血肉之團狀似蓮華開合乃意識所依之處也二緣慮心緣慮心者即緣持思慮之心此通第八識而言謂眼緣色乃至第八緣根身種子噐世間故也通第八識者此緣慮心以第八藏識為體故也根身者根即眼等諸根身即色身也種子者即善惡種子也噐世間者以世界如噐故也三積聚精要心積聚精要心者謂諸經中積集一切要義名為文心如般若心經為大品六百卷中之精要是也梵語般若華言智慧四堅實心堅實心者謂堅固真實乃眾生本有之性諸佛所證之理即第一義心也四威儀出菩薩善戒經謂修道之人心不放逸若行若坐常在調攝其心成就道業雖久於行坐亦當忍其勞苦非時不住非時不臥設或住臥之時常存佛法正念如理而住於此四法動合規矩不失律儀是為四威儀也一行謂修道之人舉止動步心不外馳無有輕躁常在正念以成三昧如法而行也梵語三昧華言正定二住謂修道之人非時不住若或住時隨所住處常念供養三寶讚嘆經法廣為人說思惟經義如法而住也三寶者佛寶法寶僧寶也三坐謂修道之人加趺宴坐諦觀實相永絕緣慮澄湛虛寂端肅威儀如法而坐也四臥謂修道之人非時不臥為調攝身心或時暫臥則右脇宴安不忘正念心無昬亂如法而臥也息有四種相出修習止觀坐禪法要息即鼻中出入之氣也謂坐禪之人若欲攝心入定必先行數息之法息有四種不同故須揀其麤而守其細也一風謂鼻中之氣出入有聲為風坐禪之人若依之而數則心散難調故須揀而不用也二喘謂鼻中之氣雖無聲相而結滯不通者為喘坐禪之人若依之而數則心結難定故須揀而不用也三氣謂鼻中之氣雖無風喘之相而出入不細者為氣坐禪之人若依之而數則心勞難定故須揀而不用也四息謂鼻中之氣無前三種麤相而出入綿綿若存若亡者為息坐禪之人依之而數則資神安隱情抱恱豫其心易定故須守而不捨也四夢一無明習氣夢謂由無明煩惱積習氣分覆蔽真如之性無所明了以致心神顛倒形於夢想也二善惡先徵夢謂人凡有善惡吉凶之事必先形於夢𥧌以為徵驗也三四大徧增夢謂人由地水火風四大而成於身若地大增身則沉重水大增身則浮腫火大增身則狀熱風大增身則急脹四大不調則身心不安心不安則形於夢𥧌也四巡遊舊識夢謂人平昔遊歷之處或有所見所聞若美若惡繫念不捨而形於夢也四夢出善見毘婆沙律一四大不和夢謂或夢山崩或夢自身飛騰虛空或夢見虎狼及賊追逐此因地水火風四大不調心神散逸故有此夢是名四大不和夢二先見夢謂日間先見男女苦樂等境夜則隨夢猶如日間所見是名先見夢三天人夢謂若人修善乃感天人為現善夢令其善根增長若人作惡亦感天人為現惡夢令其怖惡生善是名天人夢四想夢謂若人前世或有福德或有罪障有福德者多思想善事則現善夢有罪障者多思想惡事則現惡夢是名想夢四食出華嚴經隨䟽演義鈔一𫨻食𫨻即分𫨻食有資益之義謂以香味觸三塵為體入腹變壞資益諸根故言𫨻食古譯經律皆為摶食以手團曰摶後譯復言漿飲等不可摶遂譯為𫨻食二觸食觸即對也謂六識所對色等諸塵柔輭細滑冷煖等觸而生喜樂俱能資益諸根故名觸食六識者眼識耳識鼻識舌識身識意識也按翻譯名義註釋云見色愛著名食豈非觸食義耶設非觸食何以觀戲劇等終日不食而不飢也三思食思即意思謂第六識思於可愛之境生希望意而能潤益諸根如人飢渴至飲食處望得飲食而身不死故名思食第六識即意識也四識食識以執持為義即第八識也由前三食勢分所資能令此識增勝執持諸根故名識食第八識即藏識也按翻譯名義註釋云識食地獄眾生及無色界中無邊識處天等皆用識持以為其食四利須食出釋氏要覽一資身為道謂修行之人若無飲食則身疲力倦命且不支豈能進道若得飲食資益於身則心安體徤乃可進道故須食也二養身中蟲謂人身中多有諸蟲若缺飲食則蟲鑽刺身亦不安必當及時進食而調養之故須食也三生施者福謂修行之人持戒清淨專心修道則能福利人天若有檀越施以飲食使其成就道業能令施者亦獲福報故須食也梵語檀華言施稱檀越者謂人行施能越貧窮苦也四破餓外道謂外道自以吞饑忍餓為解脫法即自饑餓而不知徒受困苦安能解脫故修行之人日中受食資其進道兼破外道不應饑餓故須食也乞食四分出寶雲經乞食之法一日止以七家為限為無多貪故也出家之人常行乞食復分作四分故名乞食四分一分奉同梵行者同梵行者謂同修淨行之人也凡乞食時必有同修之人看守房舍或有老病不便行履者得食歸時則以一分奉之令其飽滿亦得安心修道也一分與窮乞人與窮乞人者謂乞得食時遇有窮苦求乞之人當起憐憫心作自饑想亦以一分施之令其飽滿勸他修善也一分與諸鬼神與諸鬼神者謂乞得食時即以淨噐盛貯一分待日晡時則然香諷呪加持普施一切鬼神令其飽滿出離苦趣悉得解脫也一分自食自食者謂乞得食時除前三分之外唯留一分或多或少則自食之食已安心行道庶不虛受信施也四邪命食出大智度論謂諸比丘當以乞食清淨自活不應以下口仰口方口維口四種邪命之食以自活命也一下口食謂種植田園合和湯藥以求衣食而自活命是名下口食也二仰口食謂仰觀星宿日月風雨雷電霹靂術數之學以求衣食而自活命是名仰口食也三方口食謂曲媚豪勢通使四方巧言多求以自活命是名方口食也四維口食維即四維也謂學種種呪術卜筭吉凶以求衣食而自活命是名維口食也四食時出法苑珠林一天食時天食時者謂清旦時即諸天所食之時也二法食時法食時者謂三世諸佛皆以千時為法食時過此即非時也三世者過去未來現在也三畜生食時畜生食時者謂日暮時即是畜生所食之時也四鬼神食時鬼神食時者謂昬夜時即是鬼神所食之時也行四依出四分律藏謂出家之人依此四法而修則能成就聖道也一著糞掃衣著糞掃衣者謂視同糞土掃除不用即世人所棄弊垢之衣也修道之人當収拾淨洗補湊穿著如此則心無所戀能成道業矣二常行乞食乞食者謂出家之人常以乞食自活其命也三樹下坐樹下坐者謂出家之人不冝營治舍宅當於樹下或石窟中隨便而居修習禪定也四用陳腐藥用陳腐藥者謂出家之人若患病時當用陳年朽腐之藥而調治之病瘥即止不得貪樂新好藥物而預積蓄也四機出法華文句四機者機即機噐又機緣也有可發之義故名為機一人天機謂諸惡莫作諸善奉行是名人天機二二乘機謂厭畏生死忻尚涅槃是名二乘機梵語涅槃華言滅度二乘者聲聞乘緣覺乘也三菩薩機謂先人後己慈悲仁讓是名菩薩機菩薩梵語具云菩提薩埵華言覺有情四佛機謂一切諸法中悉以等觀入一切無礙人一道出生死是名佛機等觀者即非空非假平等中道觀也一道出生死者以中道觀頓斷諸惑頓出生死也四種我出圓覺經畧䟽一凡夫妄計我謂世間凡夫之人不了五陰等法皆空於中妄計我身強立主宰造作諸業流轉生死無有休息是為凡夫妄計我五陰者色陰受陰想陰行陰識陰也二外道神我謂外道之人於五陰中妄計識神如麻荳等或計遍身起於我見墜墮邊邪輪廻生死是為外道神我三三乘假我謂三乘之人了知一切五陰等法虛假不實悉無有我是為三乘假我三乘者聲聞乘緣覺乘菩薩乘也四法身真我謂如來法身量等虛空無所不遍故於無我法中明八自在我是為法身真我八自在我者一能示一身以為多身二示一塵身滿大千界三大身輕舉遠到四現無量類常居一土五諸根互用六得下切法如無法想七說一偈義經無量刦八身遍諸處猶如虛空也四大出圓覺經四大者謂人之身攬外地水火風四大而成內身四大因對色香味觸四微故稱為四大也一地大地以堅礙為性謂眼耳鼻舌身等名為地大若不假水則不和合經云髮毛爪齒皮肉筋骨等皆歸於地是也二水大水以潤濕為性謂唾涕津液等名為水大若不假地即便流散經云唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水是也三火大火以燥熱為性謂身中煖氣名為火大若不假風則不增長經云煖氣歸火是也四風大風以動轉為性謂出入息及身動轉名為風大此身動作皆由風轉經云動轉歸風是也動轉歸風者凡身動轉皆屬風也四微出金光明經文句記四微者謂色香味觸也因對四大稱為四微又復四大皆由四微所成故大智度論云地有色香味觸重故自無所作水少香故動作勝地火少香味故勢勝於水風少色香味故動作勝火一色微色者謂眼所見種種諸色也以其微細故名色微二香微香者謂鼻所嗅種種諸香也以其微細故名香微三味微味者謂舌所嘗種種諸味也以其微細故名味微四觸微觸者謂身分所覺種種諸觸也以其微細故名觸微四求出法集經一欲愛謂於欲界五塵而起貪愛也因貪愛故推求不已是名欲愛五塵者色塵聲塵香塵味塵觸塵也二色愛謂於色界禪定而起貪愛也因貪愛故推求不已是名色愛三無色愛謂於無色界禪定而起貪愛也因貪愛故推求不已是名無色愛四無有愛無有即空也謂於涅槃真空之法而起貪愛也因貪愛故推求不已是名無有愛梵語涅槃華言滅度四求不得出大乘莊嚴經論求者推求也論云菩薩以四種求諸法皆不可得不可得即是空也故名求不得一名求不得名即假名謂若有是物則有是名以此推之物則為主名則為客名既為客則是假名推求實義了不可得故論云推名於物是客故云名求不得二物求不得物即事物謂雖有其物若無其名物不自顯以此推之名亦是主物亦是客物既是客亦成虛假故論云推物於名是客故云物求不得三自性求不得謂名之與物各有自體之性若推名之自性及物之自性但有虛假之名皆無真實之義故論云推名自性及物自性知俱是假故云自性求不得四差別求不得謂於名於物各有差別之相一一分別推求悉歸於空皆不可得故論云推名差別及物差別知俱空故悉不可得故云差別求不得四不寄附出優婆塞戒經經云佛言善男子受優婆塞戒者先學世事既學通達如法求財若得財物應供父母妻子眷屬其餘藏積俟用不應寄附四處也梵語優婆塞華言清淨土一老人謂年老之人死日漸近故所有財物不應寄附於彼也二遠處謂道路隔遠之處緩急要用取討難及故所有財物不應寄附於彼也三惡人謂不善之人稟性凶惡若見財物恐生貪奪之心故不應寄附於彼也四大力謂豪強之人倚恃勢力若見財物恐生貪奪之心故不應寄附於彼也四不見出圓覺經鈔一魚不見水謂魚以水為窟宅游泳水中悉無所障故云魚不見水二人不見風謂風發於萬竅但有聲響可聞而無形相可見故云人不見風三迷不見惟謂靈明覺知之性人人本具但為煩惱無明覆障迷而不了故云迷不見性四悟不見空謂修行之人既能覺了靈知之性本來空寂而此空性亦不可得故云悟不見空四不成出因明入正理論一兩俱不成謂聲是無常非眼所見若言聲是眼見而聲與眼俱不能成是名兩俱不成二隨一不成謂聲是所作性故以聲顯論聲是實法若不將名句文等共相為用則不成其論矣是名隨一不成三猶豫不成謂如見雲霧等即起疑惑以為是火非火疑心不決是名猶豫不成四所依不成謂虛空實有為萬物所依若言虛空定無則萬物無所依是名所依不成四種無出涅槃經一未有名無謂梵志妄計涅槃之法在眾生煩惱心中不可說有譬如瓶未出泥名為無瓶盖外道不知眾生煩惱心中實具涅槃之德故佛答言如是涅槃非是先無同泥無瓶梵語梵志華言淨裔梵語涅槃華言滅度二滅已名無謂梵志妄計滅煩惱已名為涅槃涅槃即無譬如瓶既壞已名為無瓶蓋外道不知煩惱既滅涅槃即顯故佛答言亦非滅無同瓶壞已三異相名無謂梵志妄計煩惱涅槃其相即異謂煩惱中無涅槃涅槃中無煩惱譬如牛中無馬馬中無牛蓋外道不知轉煩惱即是涅槃轉涅槃即是煩惱故佛答言雖牛中無馬不可說言牛亦是無雖馬中無牛不可說言馬亦是無如此則不可言煩惱中無涅槃涅槃中無煩惱也四畢竟名無謂梵志妄計涅槃之法畢竟無有名之為無譬如龜毛兔角實不可得蓋外道不知涅槃之德其性常住不可毀壞故佛答言亦非畢竟無如龜毛兔角
