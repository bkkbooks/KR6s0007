body:
  text: 大明三藏法數總目卷上昆第一卷一心出華嚴經第十三卷平字函一心約教有異出華嚴一乘教義分齊章中卷跡字函一善心出涅槃經第十九卷歸字函一人出仁王護國經上卷翔字函一身出華嚴經第十三卷平字函一虛出普賢行願品䟽未入藏一月喻三身出寶王論未入藏一月三舟喻出華嚴經䟽第十七卷軍字函一法出華嚴經第十三卷平字函一理出法華玄義第一卷下多字函一乘出法華經第一卷草字函一雨出法華經第三卷草字函一門出法華經第二卷草字函一味出法華經第三卷草字函并法華玄義士字函一大事因緣出法華經一卷草字一覺出起信論情字函一道出華嚴經第十三卷平字函第一義出大集經第十六卷讓字函一實諦出涅槃經第十三卷歸字函一實相印出法華玄義章八卷上多字演一實境界出占察善惡當邦經下卷景字重一地出法華經第三卷草字函一法印出宗鏡錄第一卷第字函一法界出起信論情字函一真法界出華嚴經隨䟽演義鈔第一卷沙字函一藏出華嚴經䟽第十六卷軍字函一會出法華要義下卷未入藏一極出普賢行願品䟽未入藏一致出華嚴經隨䟽演義鈔第四卷沙字函一源出華嚴經隨䟽演義鈔第一卷沙字函一體出法界觀跡字函一偈出翻譯名義第四卷十二分教篇一句出華嚴經第六十二卷首字函一言出圓覺經畧䟽未入藏一語出華嚴經䟽第四卷用字函一名出涅槃經第三十三卷王字函一字出大方廣師子吼經良字函一義出華嚴經第六十二卷首字函一音出維摩經上卷方字函一音教出華嚴經䟽第一卷用字函一宗出華嚴經䟽第三卷用字函一相出起信論情字函一合相出金剛經羽字函一性出涅槃經第十卷賔字函一性出華嚴經第五十二卷𥠖字函一因出涅槃經第三十二卷王字函一如出首楞嚴三昧經中卷靡字函一行出涅槃經第十一卷歸字函佛二種十身出華嚴經䟽第一卷用字函二覺出翻譯名義第一卷十種通號篇二覺出起信論上卷情字函二種佛境出華嚴經䟽第五卷用字函二種身土出佛地經論第一卷離字函身土二不相離出宗鏡錄第二十一卷茂字函二種神力出大智度論第九卷傅字函二宿因力出華嚴經䟽第一卷用字函二足出金剛經纂要䟽未入藏悉達太子二相出佛本行集經第九卷父字函二種舍利出翻譯名義第五卷名句文法篇二法出華嚴經䟽第一卷用字函二法出楞伽經第三卷惟字函二種法性出地持經第二卷安字函契經二義出阿毘達磨大毘婆沙論第一百二十六卷堅字函二般若出大智度論第一百卷叔字函二般若出華嚴經䟽第一卷用字函般若二種相出地藏十輪經第十卷陶字函二種般若莊嚴出大般若經并大智度論第八卷傅字函金剛二義出金剛經助顯錄未入藏法華二妙出法華玄義第二卷上密字函第二卷迹本二門出法華玄義釋籤第七卷下士字函并法華文句第一卷寔字函二種一乘出華嚴經䟽第二卷用字函二種莊嚴出涅槃經第二十七卷王字函二種莊嚴出金剛經纂要䟽未入藏二如來藏出大乘止觀法門第一卷途字函二經體出華嚴經䟽第二卷用字函二涅槃出金光明經玄義上卷三涅槃下會字函二涅槃出大智度論第三十一卷奉字函二法相違出瑜伽師地論第九十二卷氣字函二智出華嚴經隨䟽演義鈔第一卷沙字函二智出攝大乘論第三卷下隱字函二智出大集經第二十三卷國字函二智出觀音玄義下卷三智下遵字函二智出華嚴經隨䟽演義鈔第九卷沙字函二真如出華嚴經隨䟽演義鈔第六卷沙字函二真如出起信論䟽未入藏二真如出起信論䟽未入藏二種如如出佛性論第二卷匪字函二心出蓮宗寶鑑未入藏二心出成唯識論第三卷義字函二種心相出占察善惡經下卷景字函二種性出楞伽經第二卷鞠字函二種性出大智度論第三十一卷奉字函二種性出地持經第一卷安字函二種性出地持經第二卷安字函二相出起信論上卷情字函二相出起信論上卷情字函二相出大智度論第三十一卷奉字函二相出宗鏡錄第七十八卷銘字函二相別出析玄記未入藏二根出楞嚴經義海第十四卷頗字函二種根本出楞嚴經第一卷羔字函二種識出顯識論沛字函識二分出攝大乘論釋第四卷連字函阿頼耶二義出宗鏡錄第六卷策字函二德出觀音玄義上卷三德下遵字函二行出華嚴經䟽第一卷用字函二行出華嚴經䟽第三卷用字函二觀行亦名唯識觀出宗鏡錄第三十五卷寶字函二道出婆沙論并淨土十疑論刑字函二道出止觀輔行記第三卷魏字函二道出析玄記未入藏二道出文殊師利菩薩問菩提經論下卷弗字函二諦出翻譯名義第四卷明四諦法篇二門出華嚴經䟽第一卷用字函二門出大智度論第十五卷訓字函起信二門出起信論上卷情字函二種神力出楞伽經第二卷惟字函二力出華嚴經䟽第八卷用字函二種師子奮迅三昧出法界次第中卷刑字函二種超越三昧出法界次第中卷刑字函精進二種相出地藏十輪經第九卷陶字函二忍出大智度論第六卷傅字函二忍出地持經第五卷安字函忍有二種相出地藏十輪經第九卷啕字函二方便出無著造金剛般若經論中卷受字函方便二種相出地藏十輪經第十卷陶字函二無我出楞伽經第一卷惟字函二種我見出起信論下卷情字函二空出法藏般若心經畧䟽百字函二空出土觀第三卷上霸字函空有各具二義出華嚴經䟽第四卷用字函二執出金光明經文句記第四卷盟字函二法執出宗鏡錄第六十五卷㓨字函二我執出宗鏡錄第七十四卷銘字函空有二執出宗鏡錄第十六卷功字函二種常出大智度論第四十三卷母字函二無常出大智度論第四十三卷母