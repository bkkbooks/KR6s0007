body:
  text: 上天竺前住持沙門一如等奉勑集註四眾出法華文句一發起眾發起眾者開端發起之眾也謂激揚發動使如來有所說使大眾有所聞乃至發起問荅等是也二當機眾當機眾者當座之機眾也謂宿植德本緣合時熟不起于座聞即得道也植者種也德本者眾善之根本也三影響眾影響眾者謂古徃諸佛菩薩隱其圓極之果示同機眾匡輔法王如影之隨形響之應聲又如眾星遶月雖無作為而有大益也佛梵語具云佛陀華言覺菩薩梵語具云菩提薩埵華言覺有情匡者正也輔者助也言古佛菩薩隱大現小而來匡輔釋迦法王也四結緣眾結緣眾者謂結聞法因緣之眾也蓋由過去根淺三慧不生現世雖見佛聞法而未能獲益但作未來得度因緣也三慧者聞慧思慧脩慧也四衍眾衍者乘也出翻譯名義一聲聞謂聞佛聲教依四諦法脩道證真是名聲聞四諦者苦諦集諦滅諦道諦也二緣覺謂稟佛教法觀十二因緣覺真諦理是名緣覺十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三菩薩菩薩梵語具云菩提薩埵華言覺有情謂自行成就則能覺悟一切有情眾生是名菩薩四佛佛梵語具云佛陀華言覺覺具三義一者自覺謂悟性真常了惑虛妄二者覺他謂運無緣慈度有情眾三者覺行圓滿謂歷劫脩因行滿果圓是名為佛無緣慈者謂無心攀緣一切眾生而能自然現益也人四依出法華玄義依即依止也謂從五品位至等覺菩薩堪為世間眾生之所依止能令眾生聞法開解脩行證果故名人四依五品位者隨喜品讀誦品說法品兼行六度品正行六度品也五品十信為初依五品十信皆圓教位次也謂此位之人觀慧明了達如來秘密之藏能令眾生聞法開解脩行證果而可依止故為初依也十信者信心念心精進心慧心定心不退心護法心回向心戒心願心也十住為二依十住亦圓教位次也謂此位之人惑破理顯功用轉深能令眾生聞法開解脩行證果而可依止故為二依也十住者發心住治地住脩行住生貴住具足住正心住不退住童真住法王子住灌頂住也十行十回向為三依十行十回向亦圓教位次也謂此位之人無明漸盡利祐轉深能令眾生聞法開解脩行證果而可依止故為三依也十行者懽喜行饒益行無瞋恨行無盡行離癡亂行現前行無著行尊重行善法行真實行也十回向者救一切眾生離眾生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切眾生回向真如相回向無縛解脫回向法界無量回向也十地等覺為四依十地亦圓教位次也等覺者去後妙覺位猶有一等故名為等勝前諸位故稱為覺即最後心菩薩也謂此菩薩漸盡無明之源將滿圓極之果勝用具足能令眾生聞法開解脩行證果而可依止故為四依也十地者懽喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也菩薩四事入於法門出大寶積經一入禪思門謂菩薩說法開導眾生必先入定思惟觀其根器或大或小大者即說大法小者即說小法方便隨冝稱機合道是為入禪思門菩薩梵語具云菩提薩埵華言覺有情二入智慧門謂菩薩說法以智慧照了於諸章句義理通達無礙悉令一切眾生悟解明了破諸癡暗生法喜心是為入智慧門三入總持門謂菩薩入諸善法持令不忘遮諸惡法持令不生於諸眾生運大慈與樂之心即持善也起大悲苦之心即遮苦也是為入總持門四入辯才門謂菩薩於諸佛法之義分明决了辯說無礙開發一切眾生之心令得皆入正道是為入辯才門菩薩四淨出菩薩善戒經一身淨謂菩薩斷除惑業身器清淨成無上道生滅自在是名身淨菩薩梵語具云菩提薩埵華言覺有情二緣淨謂菩薩為攝化眾生故現種種神通出沒自在諸緣無礙是名緣淨三心淨謂菩薩脩習梵行離諸煩惱於一切法不生取著之心是名心淨四智淨謂菩薩善知世間出世間之法得清淨智無有罣礙是名智淨四種自在出大乘莊嚴經論一得無分別自在謂菩薩住第八不動地即捨一切功用之行得無功用法於一切法遠離一切分別之想而得自在故名得無分別自在不動地者以無生智慧捨於三界性無動移故也二得剎土自在謂菩薩住不動地深心清淨於諸剎土亦得清淨出生自在故名得剎土自在剎梵語具云剎摩華言土田即國土也三得智自在謂菩薩住第九善慧地得無礙智慧演說諸法稱理自在故名得智自在善慧者謂已得真如之體顯發真如妙慧也四得業自在謂菩薩住第十法雲地於諸煩惱業縛悉能通達更無障礙故名得業自在法雲地者謂菩薩以大慈悲普覆一切眾生如雲之普覆萬物也四無所畏出大智度論無所畏有二種一佛無所畏二菩薩無所畏今此四無所畏皆言菩薩也蓋菩薩具諸智慧明了决定而於眾中說法則無恐畏之相故名無所畏菩薩梵語具云菩提薩埵華言覺有情一能持無所畏能持者謂菩薩聞一切法常能受持憶念不忘故於眾中說法得無所畏也二知根無所畏知根者謂菩薩知一切眾生諸根利鈍隨其所應而為說法故於眾中說法得無所畏也三决疑無所畏决疑者決剖一切眾生之疑難也謂凡有一切來難問者菩薩悉能如法剖決而答故於眾中說法得無所畏也四答報無所畏答報者以言辭應答酬報其所問也謂凢一切眾生聽受問難菩薩悉能隨意如法而答故於眾中說法得無所畏也四事勝出地持經一根勝謂菩薩根性聰利勝於一切聲聞緣覺是名根勝菩薩梵語具云菩提薩埵華言覺有情二道勝謂菩薩以慈悲心脩行六度既自度已復能度脫一切眾生勝於聲聞緣覺但能自度不能度他是名道勝六度者一布施二持戒三忍辱四精進五禪定六智慧也三巧便勝謂菩薩善巧方便悉能了知一切諸法勝於聲聞緣覺但能了知五陰等法是名巧便勝五陰者色陰受陰想陰行陰識陰也四果勝謂菩薩脩因滿足即證佛果菩提勝於聲聞緣覺所證之果是名果勝梵語菩提華言道菩薩行有四難出華嚴經䟽一背己利世難謂脩菩薩行者其心專為利益一切眾生而無一毫為己之念非如世人但求自利而不能利他是為背己利世難菩薩梵語具云菩提薩埵華言覺有情二行相唯苦難謂脩菩薩行者不樂世間種種欲樂愛護身命唯為利益眾生以滿本願脩行苦行是為行相唯苦難三處經諸有難謂脩菩薩行者其心但為利益眾生諸有苦處無不經歷示現出生代受其苦是為處經諸有難四時劫無量難劫梵語具云劫波華言分別時節華梵雙稱故名時劫謂脩菩薩行者唯求無上佛果兼脩利他之行所經時劫不可限量是名時劫無量難大乘四果出大乘莊嚴經論大乘者謂通教中菩薩於當教中對聲聞緣覺小乘故得稱為大乘也四果者本是聲聞所證果位今菩薩歷於十地脩行證果亦有淺深始終不同故借小乘四果之位以區別之是名大乘四果十地者歡喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也一初地生如來家是須陀洹果梵語須陀洹華言入流又云預流謂菩薩入初乾慧地時斷惑證理即是證佛所證故云生如來家因借聲聞初果以區別之故云是須陀洹果二八地得授記是斯陀含果梵語斯陀含華言一來謂菩薩於第八辟支佛地中蒙佛授記而得作佛因借聲聞第二果以區別之故云是斯陀含果辟支梵語具云辟支迦羅華言緣覺三十地得受職是阿那含果梵語阿那含華言不來謂菩薩於第十佛地中而得受如來職猶如別圓二教等覺之位因借聲聞第三果以區別之故云是阿那含果四佛地是阿羅漢果梵語阿羅漢華言無學又云無生佛地即通教中果佛也菩薩已斷見思習氣俱盡而得成佛因借聲聞第四果以區別之故云是阿羅漢果四種聲聞出法華文句一決定聲聞謂其久習小乘之法故今聞小乘教而得證果既證小果之後再不進求大乘之法是名決定聲聞二退菩提聲聞梵語菩提華言道謂此聲聞本是菩薩曾發菩提之心積劫脩道忽因疲厭生死退失大心而證小果是名退菩提聲聞劫梵語具云劫波華言分別時節三應化聲聞應謂應現化即變化謂此聲聞本是諸佛菩薩內秘真實之行外現聲聞之身而能引接前之二種聲聞歸於大乘及廣化眾生令入佛道是名應化聲聞四增上慢聲聞謂自得增上之法而輕慢於他此種聲聞厭惡生死欣樂涅槃因脩戒定慧之道少有所得便謂證果此即未得謂得未證謂證是名增上慢聲聞梵語涅槃華言滅度聲聞四果出金剛經䟽一須陀洹果梵語須陀洹華言入流又名預流即初果也謂此人斷三界見惑盡預入聖道法流故名入流三界者欲界色界無色界也二斯陀含果梵語斯陀含華言一來即第二果也謂此人於欲界九品思惑中斷前六品盡後三品猶在須更來欲界一番受生故名一來思惑者謂眼等五根對色等五塵心起貪愛迷惑不了也九品者於上中下三品中又各分三品也三阿那含果梵語阿那含華言不來即第三果也謂此人斷欲界後三品思惑盡更不來欲界受生故名不來四阿羅漢果梵語阿羅漢華言無學即第四果也謂此人斷色界無色界思惑盡四智已圓已出三界已證涅槃無法可學故名無學四智者我生已盡梵行已立所作已辦不受後有也梵語涅槃華言滅度四向出成實論并法華玄義一須陀洹向梵語須陀洹華言入流謂此人將入須陀洹道未至本位不稱為果但稱為向言其從此向初果也二斯陀含向梵語斯陀含華言一來謂此人將入斯陀含道未至本位不稱為果但稱為向言其從此向第二果也三阿那含向梵語阿那含華言不來謂此人將入阿那含道未至本位不稱為果但稱為向言其從此向第三果也四阿羅漢向梵語阿羅漢華言無學謂此人將入阿羅漢道未至本位不稱為果但稱為向言其從此向第四果也羅漢四智出涅槃經一我生已盡謂阿羅漢斷見思惑盡更不受三界生死故云我生已盡梵語阿羅漢華言無學見思惑者謂意根對法塵起諸分別名見惑眼等五根對色等五塵起諸貪愛名思惑也三界者欲界色界無色界也二梵行已立梵行即淨行也謂阿羅漢由戒定慧之行成就得證此果故云梵行已立三所作已辦謂阿羅漢本求出離三界脩諸梵行生死既盡梵行既立故云所作已辦四不受後有謂阿羅漢生死惑業既盡更不受後世之身故云不受後有四種變易出成唯識論變易者因移果易故名變易謂脩一分之因即感一分之果此從變易生死一種中開出後之三種也一變易生死謂菩薩以無漏智力斷其麤惑所感殊勝細異熟果以因移果易而為生死故名變易生死漏即漏落生死今言無漏者謂菩薩依大智慧而脩不漏落生死故名無漏智麤惑即塵沙等惑也二不思議身謂菩薩以無漏定力及以願力身所示現妙用難測故名不思議身三意成身謂聲聞緣覺菩薩以無漏定力於十方世界隨其意願成身故名意成身四變化身謂聲聞緣覺菩薩以無漏定力於十方世界變現其身故名變化身四加行亦名四善根出析玄記此四通言加行者謂此行人欲求見道革凡成聖遂起煖等四心脩四諦觀以定資慧加功用行故名四加行見道即初果須陀洹也四諦者苦諦集諦滅諦道諦也一煖加行煖者從喻得名謂如人以木鑽火火雖未出先得煖相譬此加行位中以智慧火燒煩惱薪雖未得無漏之智已得智火之前相故名煖加行無漏者謂不漏落三界生死也二頂加行頂者謂觀行轉明在煖之上如登山頂觀矚四方悉皆明了故名頂加行觀矚四方者謂觀四諦也三忍加行忍有二義一者印可義謂於此位中即能印可四諦之理謂苦諦實是苦乃至道諦實是道也二者決定義謂此善根決定無退故名忍加行四世第一加行謂此位中觀四諦理雖未能證而於世間最勝故名世第一加行滅盡定與無想定四義不同出宗鏡錄滅盡定者謂受想心滅出入息盡身證此定能斷見思煩惱而證聖果無想定者謂能於定中心想不起如冰魚蟄虫不能斷惑證入聖果故此二定有四種勝劣之義也見思即見思二惑也謂意根對法塵起諸分別名見惑眼等五根對色等五塵起諸貪愛名思惑也一約得人異謂羅漢聖人由受想心滅而證滅盡之定外道凡夫由妄計無想以為至道而證無想之定此之二定有世間出世間之不同故云約得人異也受想者受謂領受想謂想像即五陰中之二也二祈願異謂入滅盡定者則息諸想念斷除貪愛之心唯求出世功德入無想定者則妄計心無想慮以為解脫唯求世間樂果故云祈願異也三感果不感果異謂無想定是有漏業能感無想天果報滅盡定是無漏業不感三界生死果報故云感果不感果異也三界者欲界色界無色界也四滅識多少謂滅盡定既滅第六識已兼能滅第七識染分無想定但滅第六識分別之見而諸邪見則未能盡斷故云滅識多少也第六識即意識第七識即傳送識又云執我識染分者我痴我見我慢我愛之四惑也四種沙門出瑜伽師地論梵語沙門華言勤息謂勤行眾善止息諸惡也一勝道沙門謂稟佛出家能滅貪瞋癡等煩惱得證勝道是名勝道沙門二說道沙門謂已調伏貪瞋癡等煩惱而能宣說正法為令眾生入於佛道是名說道沙門三壞道沙門謂破諸禁戒行諸惡法非是梵行自稱梵行是名壞道沙門四活道沙門謂能調伏貪瞋癡等勤脩正行所有善法堪能生長智慧命根是名活道沙門四種僧出十輪經一勝義僧謂諸佛世尊及諸菩薩緣覺聲聞等眾其德尊高於一切法通達無礙而得自在是名勝義僧二世俗僧謂剃除鬚髮被服袈裟成就出家威儀能持佛之禁戒是名世俗僧三瘂羊僧謂愚癡魯鈍不能了知根本等罪犯與不犯及於微小之罪不能發露懺悔是名瘂羊僧根本等罪即殺盜妄也四無慙愧僧謂若有人投佛出家得出家已於所受持佛之禁戒一切毀犯無慙無愧不畏後世苦果是名無慙愧僧四種天出大智度論一世間天謂世間國王雖居人世受享天福是名世間天二生天謂三界諸天因脩戒善等福兼習禪定得生此天是名生天三界者欲界色界無色界也戒善者即五戒十善也三淨天謂二乘之人因脩空觀斷見思惑淨盡是名淨天二乘者聲聞乘緣覺乘也見思惑者謂意根對法塵起諸分別名見惑眼等五根對色等五塵起諸貪愛名思惑也四義天謂十住菩薩善解諸法之義是名義天十住者發心住治地住脩行住生貴住具足住正心住不退住童真住法王子住灌頂住也四禪變化出大智度論變即轉變化即幻化謂此四禪諸天於五欲勝妙之境悉能次第種種變化也五欲者色欲聲欲香欲味欲觸欲也一初禪天二變化初禪天二變化者一者能於初禪天中變化二者能於欲界變化也二第二禪天三變化第二禪天三變化者一者能於二禪天中變化二者能於初禪天中變化三者能於欲界變化也三第三禪天四變化第三禪天四變化者一者能於三禪天中變化二者能於二禪天中變化三者能於初禪天中變化四者能於欲界變化也四第四禪天五變化第四禪天五變化者一者能於四禪天中變化二者能於三禪天中變化三者能於二禪天中變化四者能於初禪天中變化五者能於欲界變化也四天華梵出法華文句四天即四天王皆帝釋之外臣也又稱護世者以能護持世間故也梵語釋提桓因華言能天主言帝釋者華梵兼舉也一提頭頼吒天王梵語提頭頼吒又云提多羅咤華言持國謂能護持國土也亦云安民謂令人民悉得安隱也居須彌山東黃金山梵語須彌華言妙高二毗留勒叉天王梵語毗留勒叉又云毗流離華言增長謂能令自他善根增長也居須彌山南瑠璃山梵語瑠璃華言青色寶三毗留愽义天王梵語毗留义又云毗流波义華言廣目謂以其目廣大過於人眼故也居須彌山西白銀山四毘沙門天王梵語毗沙門華言多聞謂福德之名聞於四方故也居須彌山北水精山帝釋四苑出阿毘達磨大毘婆沙論梵語釋提桓因華言能天主言帝釋者梵華兼舉也須彌山頂是諸天所住之處有城名曰善現乃帝釋所都城有千門嚴飾壯麗中有殊勝殿種種妙寶具足莊嚴其城四隅有四臺觀金銀等寶所成甚可愛樂城外四面面各一苑形皆正方中央各有一如意池八功德水盈滿其中是彼諸天遊戲之處也八功德水者一澄清二清冷三甘美四輕軟五潤澤六安和七飲時除飢渴等八飲已長養諸根也一眾車苑謂帝釋諸天若欲遊玩隨天福德之力種種寶車於此苑中自然出現二麤惡苑謂帝釋諸天若欲闘戰之時隨其所須甲仗等器於此苑中自然出現三雜林苑謂帝釋諸天若遊此苑於諸眾妙之境所玩皆同俱生勝喜四喜林苑謂帝釋諸天若遊此苑極妙欲塵種種皆集歷觀遍覽喜樂無窮而不生厭四輪王出長阿含經此四輪王長阿含經唯言金輪王有金輪寶現若據俱舍論則四王各有輪現也一鐵輪王大智度論以人壽一增一減為一小劫謂人壽八萬四千歲時歷過百年壽減一歲如是減至十歲則止復過百年又增一歲如是增至二萬歲時有鐵輪王出獨領南閻浮提一洲諸國有不順化者王則現威列陣令其降伏然後於彼勸化人民脩十善道是名鐵輪王劫梵語具云劫波華言分別時節梵語閻浮提華言勝金洲十善者不殺不盜不邪滛不妄語不兩舌不惡口不綺語不貪欲不嗔恚不邪見也二銅輪王謂人壽增至四萬歲時有銅輪王出領東弗于逮及南閻浮提二洲諸國有不順化者王至彼國宣威布德令其歸順於是勸化人民脩十善道是名銅輪王梵語弗于逮華言勝身三銀輪王謂人壽增至六萬歲時有銀輪王出領東弗于逮南閻浮提西瞿耶尼三洲諸國有不順化者王至彼國威嚴所加即便臣伏於是勸化人民脩十善道是名銀輪王梵語瞿耶尼華言生貨四金輪王謂人壽增至八萬四千歲時有金輪王出統領北欝單越等四洲以十五日沐浴昇殿有金輪寶忽現於前輪有千輻光色具足若王欲徃東方輪則東轉王乃將諸兵眾隨其後行金輪寶前又有四神引導輪所住處王即止駕南西北方隨輪所至亦復如是於四天下普勸人民脩十善道是名金輪王梵語欝單越華言勝處輪王四德出樓炭經一大富謂轉輪王有寶田宅奴婢珠玉象馬眾多天下之人無有能及是為第一德二端正姝好謂轉輪王端正姝好顏色無比天下之人無有能及是為第二德三無疾病謂轉輪王常安隱無病天下之人無有能及是為第三德四長壽謂轉輪王常安隱長壽天下之人無有能及是為第四德四主出法苑珠林四主者謂世間無輪王應運之時贍部洲地有四主焉梵語贍部又云閻浮華言勝金一東人主人主之國風俗機變仁義昭明其地和暢多人故名人主二南象主象主之國人則躁烈多習異術亦能清心釋累出離生死其地暑濕冝象故名象主三西寶主寶主之國人無禮義惟重財賄其地臨海多產寶貝故名寶主四北馬主馬主之國人則獷暴情忍殺戮其地寒勁冝馬故名馬主西域四姓亦名梵生四姓出翻譯名義謂四種人妄計我從梵天而生故稱梵生婆羅門自計從梵天口生剎帝利自計從梵天臍生毗舍自計從梵天脇生首陀自計從梵天脚生以此貢高自謂第一實非第一也一婆羅門梵語婆羅門華言淨行或在家或出家世世相承以道學為業自稱是梵天苗裔守道居貞潔白其操故謂之淨行二剎帝利梵語剎帝利華言田主為世間大地之主即王種也三昆舍梵語毘舍亦云吠奢即商賈種也四首陀梵語首陀亦云戌陀羅即農人種也四王生八子出釋迦譜四王同出師子頰王各坐二子故通有八子也一淨飯王生二子第一子梵語名悉達多華言頓吉以其生時諸吉祥瑞頓出現故即釋迦牟尼佛也第二子梵語名難陀華言善歡喜從初慕道為名歡喜中勝故云善歡喜二白飯王生二子第一子梵語名調達華言天熱以其生時人天等眾心皆驚熱故也第二子梵語名阿難華言歡喜又云慶喜以其生時舉國欣慶故也從佛出家持三藏教三藏者經藏律藏論藏也三斛飯王生二子第一子梵語名摩訶男無翻從佛出家即於鹿苑中最初得度第二子梵語名阿那律華言無滅又云無貧從佛出家所謂天眼第一者是也四甘露飯王生二子第一子梵語名婆娑無翻第二子梵語名䟦提華言小賢從佛出家即於鹿苑中最初得度是也四軰出翻譯名義一比丘梵語比丘華言乞士乞是乞求之名士是清雅之稱謂出家之人上乞法以資慧命下乞食以資色身故名乞士二比丘尼梵語尼華言女佛初不度女人出家成道之後因姨母摩訶波闍波提懇求出家佛乃度之故名比丘尼梵語摩訶波闍波提華言大愛道三優婆塞梵語優婆塞華言清淨士謂雖在家能持五戒清淨自守又云近事男謂能持戒可親近承事諸佛法故名優婆塞五戒者不殺不盜不邪不妄語不飲酒也四優婆夷梵語優婆夷華言清淨女謂雖在家亦能堅持五戒清淨自守故名優婆夷人四生亦名四種生出法苑珠林人四生者謂世間之人亦具卵胎濕化四種之生也一卵生卵生者謂依殼而出也婆沙論云昔有商人入海得一雌鶴遂生二卵卵漸濕熟生二童子端正聰明年長出家得阿羅漢大名世羅小名鄔波世羅是也梵語阿羅漢華言無學二胎生胎生者謂含藏而生也謂世間之人含藏於母胎之中滿足十月而生是也三濕生濕生者謂假濕而生也賢愚經云於過去世有大國王名曰善住其頂上歘生一皰皮教切後轉轉大便生童子顏貌端正即頂生王是也又經律異相云昔維耶離國有梵志家種一柰樹生一榴節節生一枝去地七丈杪生諸枝形如偃蓋即作棧仕限切閣登而視之見偃蓋中乃有池水有一女兒在池水中是也梵語維耶離華言廣嚴梵語梵志華言淨裔四化生化生者謂無而忽有也涅槃經云佛與四眾遊行有比丘尼名阿羅婆忽於地中化生又劫初人皆是化生是也四眾者比丘比丘尼優婆塞優婆夷也四種人出成實論一常沒謂人不能脩習涅槃之法則不得出離生死大河故名常沒梵語涅槃華言滅度二暫出還沒謂人或生世間於信等五種善根不能堅固還復退失流轉生死故名暫出還沒五種善根者信根精進根念根定根慧根也三出觀謂人沒於生死之河而能隨順涅槃之法欲求出離如人既沒思欲得濟故先觀看方向故名出觀四得度謂人具足脩習涅槃之法則能截生死流到涅槃岸故名得度四法不得菩提出地持經一無善友謂修行之人雖有精進之心而無善友知識為其說法開導終不能得佛果菩提也梵語菩提華言道二謬受學謂脩行之人雖值善友知識種種說法而稟性愚鈍於所受法錯謬領解亦不能得佛果菩提也三不精進謂脩行之人雖於受學之際不謬領解但自己懈怠不能勇猛精進則亦不得佛果菩提也四不調伏謂修行之人雖聞正法精進勤修然善根未熟久遠已來不能調伏其心則亦不得佛果菩提也四人果報出法苑珠林一先苦後樂謂或有人先生卑賤家衣食不充受諸困苦然心無邪見自念我於宿世不行布施不脩福德恒值貧賤即便懺悔改徃所作修於善行後生人中多饒財寶無所缺乏是名先苦後樂二先樂後苦謂或有人先生富貴之家衣食充足受諸快樂然心懷邪見不能布施脩福多造惡業後生地獄受種種苦若生人中貧窮醜陋無有衣食是名先樂後苦三先苦後苦謂或有人先生貧賤家衣食不充受諸逼迫復懷邪見習諸惡法後墮地獄受種種苦若生人中又極貧賤衣食不充是名先苦後苦四先樂後樂謂或有人先生富貴家多諸財寶受諸快樂復能敬重三寶布施脩福後生人天中恒受富貴多饒財寶稱意自在是名先樂後樂三寶者佛寶法寶僧寶也四種業報出法苑珠林一現報現報者謂今生作極善極惡之業即於今生現受善惡之果報也二生報生報者謂今生作善惡業來世身中受善惡果報也三後報後報者謂今身造業來世未受多生之後乃受果報也四無報無報者謂由無記業而受不善不惡之果報也無記業者即不善不惡之業無所記憶故名無記四報定不定出法苑珠林四報定不定者又於前無報中開出四種也一時定報不定時即時節報即果報謂於三時决定不改由業有可轉故受報不定是名時定報不定三時者謂現報生報後報也二報定時不定謂業力定故報不可改然時有可轉故時節不定是名報定時不定三時報俱定謂由業報定故時節亦定是名時報俱定四時報俱不定謂由業不决定故時報亦不定也蓋因眾生之業有輕有重故受報之時有遠有近隨其因緣先後不定是名時報俱不定四有出宗鏡錄因果不亡曰有謂眾生作業感果果必由因因果相酬則有生死既有生死必有色身既有色身必經中陰輪轉不息則成四有中陰者謂人初死之後未曾托生故名中陰一生有謂從中陰來托母胎一念識心相續五蘊由此生起是名生有五蘊者色蘊受蘊想蘊行蘊識蘊也二本有謂已生之後未死之前於其中間所有五蘊色身是業報之本是名本有三死有謂本有之後中有之前五蘊業果色身一時壞滅是名死有四中有即中陰也謂已死之後未生之前於其中間識未托胎是名中有四胎相出阿毘達磨俱舍論一正知入不正知住出謂轉輪王宿世曾脩廣大之福其業最勝但知入胎不能正知住胎出胎也正知猶明知也二正知入住不正知出謂獨覺之人久習多聞其智最勝但正知入胎住胎不能正知出胎也三俱正知入住出謂菩薩曠劫脩行福德智慧俱勝故能正知入胎住胎出胎也四俱不正知謂六道眾生有情之類若福微薄者入母胎時或見大風大雨或眾聲威逼遂見己身入於密草稠林住在此中復從此出若福厚大者入母胎時自見己身或處妙好園林或居勝臺殿住在此中復從此出於入住出胎皆不能知也六道者天道人道脩羅道餓鬼道畜生道地獄道也五根有四事增上出五事毘婆沙論五根者眼耳鼻舌身也增上猶增勝也一莊嚴身莊嚴端莊嚴飾也謂眼耳鼻舌莊嚴於身然後完美於此諸根若闕一者便成殘陋若不缺者全美增勝是為莊嚴身也二導養身導養者導引資養也謂眼能見安危之色耳能聞美惡之聲鼻能嗅香臭之氣舌能甞甜苦之味如是等諸識於色聲氣味若好若惡皆能分別導引於身就好避惡令身增勝是為導養身也三生識識即分別之義謂眼對色耳對聲鼻對香舌對味身對觸而能生於分別之識及相應法俱得增勝是為生識也四不共事謂眼惟見色耳惟聞聲鼻惟嗅香舌惟甞味身惟覺觸如是諸根各有所用不相雜亂於本根相應之法自能增勝是為不共事也四增盛出阿毘達磨毘婆沙論一壽量增盛謂劫末時此贍部洲人壽減至十嵗後復漸增展轉增至八萬歲是名壽量增盛劫梵語具云劫波華言分別時節梵語贍部又云閻浮華言勝金二有情增盛有情即眾生也謂劫末時此贍部洲惟餘萬人後復漸增展轉無數於劫增時其地廣嚴淨人民淳善福德以其人民加眾是名有情增盛三資具增盛資具者資生之具也謂劫末時此贍部洲人民飢饉以稊稗等為上妙食至劫增時安隱豐樂種種地味自然出生乃至穀果等類漸漸充足是名資具增盛四善品增盛善品者善人所脩諸道品也謂劫末時世間有情廣造十惡之業不脩善道至劫增時人民廣修十善及諸道品是名善品增盛十惡者一殺生二偷盜三邪四妄語五兩舌六惡口七綺語八貪欲九嗔恚十邪見也十善者不殺生不偷盜不邪不妄語不兩舌不惡口不綺語不貪欲不嗔恚不邪見也四力出地持經一自力謂世間之人宿有善種不假他人教誡而自能以精進勇猛之力發菩提心是名自力梵語菩提華言道二他力謂世間之人或因他人教誡或因他事感動遂發菩提之心則是藉他之力是名他力三因力謂世間之人先世脩習大乘之法今因見佛及諸菩薩嘆說無上佛道遂發菩提之心是名因力四方便力謂世間之人於現世中親近善友知識聞其善巧方便說法遂發菩提之心是名方便力四恩出本生心地觀經一父母恩經云父有慈恩母有悲恩蓋父母長養之恩廣大無比若有男女背恩不順死即墮於地獄餓鬼畜生若有男女孝養父母承順無違常為諸天護念福樂無盡縱能一日三時割自身肉以養父母尚未能報一日之恩也二眾生恩經云即無始來一切眾生輪轉五道於多生中互為父母以互為父母故一切男子即是慈父一切女人即是悲母以是因緣諸眾生類亦有大恩猶如現在父母等無差別也五道者天道人道鬼道畜生道地獄道也三國王恩經云國王福德最勝雖生人間得自在故於其國界山河大地盡屬國王一人福德勝過一切眾生之福又以正法治世能使眾生悉皆安樂若王國內一人脩善其所作福七分之中脩善之人自得五分國王常獲二分以依於王而得修善故也王若以善法化世諸天善神常來守護若有惡人而生逆心於須頃福自消滅命終當墮地獄備受諸苦所以者何是諸眾生由不知國王恩故起諸惡逆得如是報若有人民能行善心敬輔仁王尊重如佛是人現世安隱豐樂所以者何一切國王於過去時曾受如來清淨禁戒常為人王安隱快樂以是因緣違順果報其速如影隨形如響應聲也四三寶恩三寶即佛法僧可尊可貴名之為寶經云三寶利樂眾生無有休息功德寶山巍巍無比福德甚深猶如大海智慧無礙等於虛空一切眾生由煩惱業障沉淪苦海生死無窮三寶出世作大船師能截愛流超昇彼岸故恩難報也四恩出釋氏要覽一國王恩謂出家之人國王聽許方得出家又蒙治化之力無強弱陵逼之憂而得安居山林進脩道業兼復飲食水土皆屬國王是為國王恩二父母恩謂稟父母遺體而得成人其生成養育之恩如天罔極復令出家進脩道業是為父母恩三師友恩謂出家之人蒙師剃度教誨授以經業及得善友講明妙道開發慧性是為師友恩四檀越恩梵語檀華言施謂出家之人凡所資身飲食衣服等物皆由施者供給遂得安身辦道是為檀越恩四難出法華經文句一值佛難謂眾生因無始惑業輪迴六道之中四趣不得見佛聞法固不在言設得人身若生在東西北三洲者佛不出現於彼皆不見佛得生南洲而或居邊地或著邪見佛雖出世如是等人亦不得見佛而况佛不常出值遇良難故經云諸佛興出世懸遠值遇難此舉人之值佛難也六道者天道人道脩羅道餓鬼道畜生道地獄道四趣但除人天也二說法難謂如來出世本欲便說大乘之法蓋緣機器不純不得已而權說三乘之法委曲調停方堪入實所以歷四十餘年更三百餘會最後至於法華會上方顯真實故經云正使出於世說是法復難此舉大法之難說也三聞法難謂一乘圓頓之法微妙甚深難解難入非利根上智之士聞則惑耳驚心生疑起謗如法華會上五千人等雖梵音盈耳猶乃退席而去故經云無量無數劫聞是法亦難此舉聞法難也四信受難謂一乘圓頓之法唯談中道實相之理乃是果佛所證非彼三乘所知然如來出世直欲人人信受此法以致四十餘年漸次調停後至法華會上佛初為上根之人作法說唯身子得悟次為中根之人作譬喻說唯四大弟子得悟又次為下根之人作宿世因緣說千二百聲聞方始得悟故經云能聽是法者斯人亦復難此舉信受難也法說者作三乘一乘而說譬喻說者作三車一車而說故文句云上根已悟中下未了故須作喻還譬上法也宿世因緣者如為陳如明繫珠緣而領解阿難引空王緣而授記之類四大弟子即須菩提迦旃延迦葉目犍連也四事不可久保出出曜經經云有一孤母而喪其子憂惱失意來白於佛佛即以此四事告之一常必無常世間之相一一無常假令萬劫之久鐵石之堅須彌之高大海之廣終為無常之所壞滅是故常不可久保也梵語須彌華言妙高二富貴必貧賤世間之事盛必有衰盈必有虧此理之必然也蓋富貴雖命於天而理有不可常者故今之富貴安知異時而不貧賤故富之與貴亦不可久保也三會合必別離人之生世離必有會合必有離此理之自然而非人意之所能必故今之會合安知異時而不別離故會合亦不可久保也四強徤必死人之處世生必有死此理之常是故年雖強徤終歸壞滅豈山石空海之所可避耶是故強徤亦不可久保也山石空海者經云非空非海中非入山石間無有地方所脫之不受死是也四不可得出諸經要集佛告諸比丘世有四事不可得免古今已來天地成立無免此苦以斯四苦佛興于世令諸眾生咸得脫離梵語比丘華言乞士一常少不可得謂年幼之時髮黑齒白形貌光澤眾人瞻戴莫不愛敬一旦老耄頭白齒落短氣呻吟欲使常少不至老者終不可得二無病不可得謂身體強徤行步輕便一旦疾病伏著床枕不能動轉欲使常安無病終不可得三長壽不可得謂欲求長壽五欲自恣放心逸意將期永久無常卒至忽然命終欲求長壽終不可得五欲者色欲聲欲香欲味欲觸欲也四不死不可得謂父母兄弟妻妾子息歡娛笑樂意可常得無常卒至䰟神獨逝欲求不死終不可得四山出別譯雜阿含經佛在給孤獨園語波斯匿王云有大石山上連於天下連於地從東方來所歷之處卉木叢林有生之類悉皆摧碎南西北方亦復如是以此四山喻眾生老病死衰之四相也梵語波斯匿華言勝軍一老山謂人之老邁形色枯悴精神昏昧髮白面皺逮將不久則彼少年端美之相悉皆變壞如彼大山來時摧於物不可免者故經言老山能壞一切壯年盛色也二病山謂人之四大不調或寒或熱生種種病能使身力疲敗精神減如彼大山來時一切物莫可避者故經言病山能壞一切強徤也三死山謂人身殞命終四大諸根悉歸磨滅如彼大山來時萬物一時摧碎莫可禦者故經言死山能壞一切壽命也四大者地大水大火大風大也四衰耗山謂人之生迫於衰耗勢力既去貲財亦空名稱不聞志意消沮如彼大山來時壞於物莫可逃者故經言衰耗之山能壞一切榮華富貴也四種死出阿毘曇毘婆沙論一壽盡財不盡死謂如有人由宿業故報壽既短於現生中復不積善作福但經營生理多求財物其壽已盡積蓄尚多是名壽盡財不盡死二財盡壽不盡死謂如有人不能經營生理少有財物壽雖未盡積蓄素無或因飢餓或由凍苦遂致於死是名財盡壽不盡死三壽盡財盡死謂如有人作短壽業又不能經營財物一旦壽盡其財亦盡是名壽盡財盡死四壽不盡財不盡死謂如有人廣作壽業廣作財業其財未盡其壽未盡以餘因緣忽遭橫死是名壽不盡財不盡死
