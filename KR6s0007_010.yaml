body:
  text: 上天竺前住持沙門一如等奉勑集注四悉檀出法華文句悉遍也檀梵語具云檀那華言施華梵兼稱故名悉檀佛以此四説法遍施一切衆生故名四悉檀也一世界悉檀世即隔別之義界即界分也蓋由衆生根器淺薄故佛隨其所欲樂聞為之次第分別而説令生歡喜是名世界悉檀二為人悉檀謂佛欲説法必先觀衆生機器之大小宿種之淺深然後稱其機冝而為説之令生正信增長善根故名為人悉檀三對治悉檀謂如衆生貪欲多者教觀不淨瞋恚多者教修慈心愚癡多者教觀因緣為對此等諸病説此法藥遍施衆生故名對治悉檀四第一義悉檀第一義即理也謂佛知衆生善根已熟即為説法令其得悟聖道是名第一義悉檀四攝利益出大集經一佛攝利益謂佛攝持衆生令其常得親近諸佛諸魔不得其便故名佛攝利益二天攝利益謂諸天攝持衆生於説法之處常樂聽受不為他緣所害故名天攝利益三福攝利益謂福德莊嚴於身有諸相好莊嚴於口凡所演説衆生樂聞莊嚴種姓令生尊貴故名福攝利益四智攝利益謂以智慧知衆生根性隨冝説法知衆生病苦隨病施藥得大神通遊諸佛土了了通達法界之理是名智攝利益涅槃四種大樂出大涅槃經一無苦樂無苦樂者謂無世間之苦樂也世間之樂即是苦因故經云不斷樂者則名為苦以斷樂故則無有苦無苦無樂乃名大樂此即涅槃之大樂也梵語涅槃華言滅度二大寂靜樂謂涅槃之性是大寂靜以其遠離一切憒閙法故以大寂靜名為大樂此即涅槃之大樂也三大知樂謂諸佛如來有大智慧於一切法悉知悉見名為大樂此即涅槃之大樂也四不壞樂謂如來之身非煩惱無常之身猶如金剛不能毀壞身不壞故名為大樂此即涅槃之大樂也四種涅槃出成唯識論一本來自性清淨涅槃謂真如理隨緣變造一切諸法雖有煩惱垢染而本性清淨具足無量妙功德無生無滅湛若虛空一切衆生平等共有與一切法不一不異離一切相無有分別故名本來自性清淨涅槃梵語涅槃華言滅度二有餘依涅槃謂煩惱之障雖滅尚餘欲界五陰之身而為所依故名有餘依涅槃五陰者色陰受陰想陰行陰識陰也三無餘依涅槃謂煩惱既盡所餘五陰之身亦滅故名無餘依涅槃四無住處涅槃謂不住生死不住涅槃窮未來際利樂有情故名無住處涅槃華嚴四分出法寶標目一信分謂第一會菩提場中説世主妙嚴品至毗盧遮那品名舉果勸樂生信分蓋舉揚如來依正二報難思之果勸勵當機聞而樂欲生其淨信故名信分梵語菩提華言道梵語毗盧遮那華言遍一切處依正二報者身為正報國土是依報也二解分謂第二會普光明殿説十信法第三會忉利天宮説十住法第四會夜摩天宮説十行法第五會兜率陀天宮説十回向法第六會他化自在天宮説十地法第七重會普光明殿説十定等法名修因契果生解分蓋進修六位之圓因契證十身之妙果令生勝解故名解分十信者信心念心精進心慧心定心不退心護法心回向心戒心願心也十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也十行者歡喜行饒益行無嗔恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也十回向者救一切衆生離衆生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切衆生回向真如相回向無縛解脫回向法界無量回向也十地者歡喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也十定者普光大三昧妙光大三昧次第遍往諸佛國土大三昧清淨深入行大三昧知過去莊嚴藏大三昧智光明藏大三昧了知一切世界佛莊嚴大三昧衆生差別身大三昧法界自在大三昧無礙輪大三昧也六位者十住十行十回向十地等覺妙覺也十身者菩提身願身化身力持身相好莊嚴身威勢身意生身福德身法身智身也三行分謂第八會普光明殿普賢説離世間一品具二千行法名託法進修成行分蓋於差別因果之法既生解已今乃寄託前法攝解成行隨舉一行六位頓修故名行分二千行法者即普慧菩薩二百問普賢菩薩二千答是也四證分謂第九會逝多林説入法界品名依人證入成德分蓋由前大行既具隨事顯理而善財童子歷事善知識隨所見聞無不證入故名證分梵語逝多華言勝林四種教授出瑜伽師地論一無倒教授謂不顛倒宣説法義令其受持讀誦修學是名無倒教授二漸次教授謂稱其根機宣説法義先教習小後令入大是名漸次教授三教教授謂或從如來或從佛弟子所聞正教即如其教不增不減教授他人是名教教授四證教授謂自己所證之法為欲令他得證方便教授是名證教授四種授記出菩提資糧論聖言説與曰授果與心期曰記一未發菩提心授記謂諸佛世尊觀諸衆生根機利鈍其有具增上信者佛則令其發菩提心而為授記當得作佛是名未發菩提心授記梵語菩提華言道增上猶增勝也二共發菩提心授記謂諸菩薩善根成熟得增上行但欲度脫一切衆生同諸衆生共發菩提心誓願同成正覺蒙佛授記是名共發菩提心授記三隱覆授記謂此人修行精進固當授記恐其自聞授記則志滿足不復更發精進之心如不授記復恐衆人生疑而謂此人修行精進不蒙授記故佛以威神之力密為授記當得作佛使他人聞不使其自聞是為隱覆授記四現前授記謂諸菩薩成熟出世善根得不動地即時蒙佛授記是為現前授記四種真實義出菩薩善戒經一世流布真實義謂世間之法悉同其名衆生見地即言是地見火即言見火終不言是水是風至於見苦終不言樂見樂終不言苦雖假名立相而稱認皆同是為世流布真實義二方便流布真實義謂世間有智之人先以心意籌量隨冝方便造作經書論議開導於人是為方便流布真實義三淨煩惱障真實義謂聲聞緣覺以無漏道破諸煩惱結業得無礙智是為淨煩惱障真實義四淨智慧障真實義謂佛菩薩於聲聞緣覺所得無礙之智以能障中道之理不能顯發故名智慧障今佛菩薩斷此之障則中道之理自然顯現是為淨智慧障真實義四種對治亦名四道出阿毗達磨俱舍論對即敵對治即攻治譬如人有此病即用此藥治之故名對治一厭患對治謂衆生見欲界生死之苦煩惱惑業之集深生厭惡起大加行修於聖道對治苦集故名厭患對治二斷對治謂衆生知一切煩惱惑業能招生死之苦於是修無間道斷除惑業故名斷對治無間道者觀道相續無有間斷也三持對治謂從無間道後起解脫道則能攝持所斷煩惱不令更起故名持對治解脫道者不繫名解自在名脫謂解脫一切惑業之縛也四遠分對治謂從解脫道後起勝進道能令所斷之惑永永遠離故名遠分對治勝進道者猶增進之意也同教説聽四句出華嚴經疏同教者謂會三乘歸一乘也三乘者聲聞乘緣覺乘菩薩乘也一唯説無聽謂佛真心外無別衆生以衆生真心即佛真心故故所説教唯佛所現是名唯説無聽二唯聽無説謂衆生心外更無別佛以佛真心即衆生真心故故所説教即衆生自現是名惟聽無説三説聽雙全謂佛真心現時不礙衆生真心現故是名説聽雙全四説聽雙寂謂佛即衆生故非佛衆生即佛故非衆生互奪雙亡則説聽雙寂故淨名經云其説法者無説無示其聽法者無聞無得是也別教説聽四句出華嚴經疏別教者圓融具德異前諸教一唯説無聽謂衆生全在諸佛心中故則果門攝法無遺故所説教唯佛所現是名惟説無聽二惟聽無説謂佛全在衆生心中故則因門攝法無遺故所説教即衆生心容自現是名唯聽無説三説聽雙存謂生佛互在則因果交徹故衆生心中之佛為佛心中之衆生説法佛心中之衆生聽衆生心中之佛説法是名説聽雙存四説聽雙寂謂衆生全在佛則同佛非生佛全在衆生則同生非佛兩相形奪二位齊融則佛心中之衆生無聽衆生心中之佛無説是名説聽雙寂起信四覺出起信論一本覺謂一切衆生自性清淨心源離於妄念即寂而照等虛空界無所不遍法界一相即是如來平等法身故名本覺二相似覺謂圓教十信位中由始覺之功見思粗惑既已斷竟尚餘無明細惑未破所覺之理非真本覺唯得名為相似故名相似覺十信者信心念心精進心慧心定心不退心護法心回向心戒心願心也三隨分覺謂圓教十住十行十回向十地等覺位中分破無明之惑故得分分是真本覺故名隨分覺十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也十行者歡喜行饒益行無嗔恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也十回向者救一切衆生離衆生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切衆生回向真如相回向無縛解脫回向法界無量回向也十地者歡喜地離垢地發光地焰慧地難勝地現前地遠行地不動地善慧地法雲地也四究竟覺謂圓教極果妙覺位中無明之惑既盡本覺之體全彰得心見性心即常住是名究竟覺四德處出成實論論云若近善人則聞正法聞正法已則具四德處一慧德處謂由聞正法生大智慧故名慧德處二實德處謂以是智慧見真諦空故名實德處三捨德處謂見真空即得離諸煩惱故名捨德處四寂滅德處謂煩惱盡故心得寂滅故名寂滅德處四法施出寶積經法施者謂如來以此四法施諸衆生令依此法修證不起邪見也一一切萬物皆歸無常謂衆生愚惑不知世間有情無情等物悉皆有生有滅有成有壞畢竟無常而反計有常如來説法為斷此計故曰一切萬物皆歸無常二一切所有悉為苦毒謂衆生愚惑不知五陰等法是衆苦之本計想有樂如來説法為斷此計故曰一切所有悉為苦毒五陰者色陰受陰想陰行陰識陰也三一切諸法皆無有我謂衆生愚惑不了一切法空計著有我如來説法為斷此計故曰一切諸法皆無有我四一切有形悉至於空謂衆生愚惑不知一切有形相者終歸於空反計為有如來説法為斷此計故曰一切有形悉至於空四無記出宗鏡録謂不能記別當來之果又於善惡法中無所記別故名無記一能變無記謂第八識心王是無記性與心所五法相俱則能變現色等一切境界而無所分別故名能變無記五法者一作意二觸三受四想五思是名遍行五法即第八識心所法也二所變無記謂根身種子器世間三類之境皆由本識之所變現以此三境無分別性故名所變無記三分位無記謂於不相應行中假無記法立諸分位由此諸法不屬善惡不與心相應不與色相應無所記別故名分位無記四勝義無記謂虛空無為非擇滅無為有勝義故而無所作為故名勝義無記虛空無為者謂真空之理不為惑染之所障礙也非擇滅無為者聲聞之人證果之後諸惑不復續起自然契悟真空之理不假揀擇也賴耶四分出翻譯名義梵語阿賴耶華言藏識謂第八識能含藏一切善惡種子而有此四分之義焉一相分相即形相有三種一境相名相謂此識能與根心而為境界故二相狀名相謂世間有為之法皆有相狀惟是此識之所變現故三義相名相即能詮教下所詮義理之相亦是此識之所變現故此之三相通名相分根心者謂眼識耳識鼻識舌識身識意識也二見分見即照了之義有五種一證見名見即根本智見分是也二照燭名見此通根心俱有照燭義故三能緣名見即通內三分俱能緣故四念解名見以念解所詮義理故五推度名見即比量心推度一切境故此五種見通名見分根本智者即第八識也內三分者即見分自證分證自證分也三自證分自證者自證所具之法也謂此識能持見分相分以能親證自見分故緣於相分不謬是名自證分四證自證分證即能證之體自證即所具之法謂能持前自證分見分相分即是此識之本體以能親證自證分故緣見分不謬是名證自證分四種意識出宗鏡録四種意識不出三境一性境二帶質境三獨影境性境者謂意識與眼耳鼻舌身五識同緣五塵初心取境未有分別是名性境意識於五塵境上分別方圓長短好惡以有塵相可分別故是名帶質境意識不與五識同緣而獨緣法塵謂緣過去未來變現之相或緣空華水月等相以無境可對是名獨影境也五塵者色塵聲塵香塵味塵觸塵也一定中獨頭意識謂意識獨緣定境不與五識同緣而無一切塵境作對是名定中獨頭意識二散位獨頭意識謂意識不緣五塵之境但散亂遍計諸法或緣空華水月等諸色相或緣過去現在未來一切諸法此非定中又非夢境是名散位獨頭意識三夢中獨頭意識謂不對諸塵而於夢中見種種境界此亦心王性境變現而有諸相是名夢中獨頭意識四明了意識謂意識依五根與五識同緣五塵明了取境好惡長短悉皆現前是名明了意識識境四相出金剛經論謂衆生於此四法不了虛假而於心識之境妄生邪見執著取相故名識境四相一我相謂衆生於五陰法中若即若離計我我所之實是名我相五陰者色陰受陰想陰行陰識陰也若即若離者謂計即陰是我離陰是我也我我所者我即假名我所即五陰也二人相謂衆生於五陰法中妄計我是人我生人道異於餘道是名人相三衆生相謂衆生於五陰法中妄計色受想行識衆共而生此身是名衆生相四壽者相謂衆生於五陰法中妄計我受一期壽命或長或短是名壽者相一期者謂從生至死也四緣出大智度論一因緣謂六根為因六塵為緣也如眼根對於色塵時識即隨生餘根亦然是名因緣六根者眼根耳根鼻根舌根身根意根也六塵者色塵聲塵香塵味塵觸塵法塵也二次第緣謂心心所法次第無間相續而起名次第緣心心所法者心即心王心所即受想行也此心王心所對於諸塵念念不停是名次第相續也三緣緣謂心心所法由託緣而生還是自心之所緣慮名為緣緣託緣者謂依託色聲香味觸法之緣也四增上緣謂六根能照境發識有增上力用諸法生時不生障礙名增上緣諸法生者謂根塵相對則有一念心起名諸法生不生障礙者根塵相對之時隨對隨起悉無所障也四相約位出圓覺經略疏四相即生住異滅也此之四相乃是本覺心源無明初起一念之相而有四種之別以其細難見故約信住行向地等覺妙覺從淺至深次第覺了粗細分齊之相以明之此之四法起則從生至滅覺則從滅至生故以滅異住生而為次第也一十信覺滅相十信覺滅相者謂菩薩修行證此信位則能覺了心中念念滅相分齊也十信者信心念心精進心慧心定心不退心護法心回向心戒心願心也二三賢覺異相三賢覺異相者三賢即十住十行十回向也謂菩薩修行證此三賢位則能覺了心中念念異相分齊也異者變異也十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也十行者歡喜行饒益行無嗔恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也十回向者救一切衆生離衆生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切衆生回向真如相回向無縛解脫回向法界無量回向也三十聖覺住相十聖覺住相者十聖即十地也謂菩薩修行證此十聖位則能覺了心中念念住相分齊也住者現起未滅之心也十地者歡喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也四位滿覺生相位滿覺生相者位滿即佛位果滿也謂大菩薩修行滿足證佛果位則能覺了心中一念初生之相分齊也四種頌出華嚴經疏一阿耨窣覩婆梵語阿耨窣蘇骨切覩婆華言頌謂此頌不用長行與偈但字數滿三十二字即為一頌也長行者即經中散文也二伽陀梵語伽陀華言諷頌或名不頌頌謂不頌長行也或名直頌謂直以偈説法也三祇夜梵語祇夜華言應頌謂應前長行而頌也四縕馱南梵語縕音蘊馱南華言集施謂以少言攝集多義施令他人誦習受持也四聖言出阿毗達磨集異門足論四聖言者聖正也即正直之言也一不見言不見謂眼識所受眼識所了則可言見若實眼識未受未了則不可言見是名不見言不見二不聞言不聞謂耳識所受耳識所了則可言聞若實耳識未受未了則不可言聞是名不聞言不聞三不覺言不覺謂鼻覺香舌覺味身覺觸也若鼻識舌識身識所受所了則可言覺若實三識未受未了則不可言覺是名不覺言不覺四不知言不知謂意識所受意識所了則可言知若實意識未受未了則不可言知是名不知言不知四種尋思出阿毗達磨集論一名尋思謂於諸法之中推求一切名字皆悉不實是為名尋思二事尋思謂於諸法之中推求五陰等事生滅無常皆悉不實是為事尋思五陰者色陰受陰想陰行陰識陰也三自體假立尋思謂於諸法能詮名字及所詮義理中推求自體惟是假立名言皆悉不實是為自體假立尋思四差別假立尋思謂於諸法能詮之中推求差別惟是假立名言皆悉不實是為差別假立尋思真空觀四句出華嚴經隨疏演義鈔真空者法界之理也依理而觀故名真空觀一會色歸空會即融會色即根身世界也謂根身世界本是真如一心與生滅和合而有今觀此色都無實體歸於真心之空故云會色歸空根者謂眼等諸根身即色身也二明空即色明即明了謂了真空之理不異於色色無自性不異於空故云明空即色三色空無礙謂色之體全是真空真空之體不異於色若色是實色即礙於空空是斷空即礙於色今既色是幻色故不礙空空是真空故不礙色故云色空無礙四泯絶無寄泯即亡泯絶即寂絶寄猶依也謂所觀真空之理不可言即色是空亦不可言離色是空空不空皆不可得非言思所及亦無所依故云泯絶無寄共不共四變出宗鏡録問云本識變現根身器世間等為是自變為是共變答有四種不同也本識即藏識也一不共中不共變謂如眼等五根唯自己第八識中最初一念託父母遺體時變現名不共出胎之後唯自己受用復名不共如眼識惟依眼根而發乃至身識唯依身根而發不相混雜是為不共中不共變二不共中共變謂內浮塵根初唯自己第八識變現名不共變生己後他人亦有受用之義復名為共是為不共中共變浮塵根者謂眼耳等諸根皆由色香味觸四塵所成故名浮塵楞嚴經云眼如蒲萄朵等是也他人受用者謂自己浮塵根能見之境他根亦能見而亦得同受用也三共中共變謂如山河大地由多人之識同所變現名之為共變已亦與一切同用復名為共是名共中共變四共中不共變謂如己田宅不與人共又如一水人見是水餓鬼見是猛火膿血等物是名共中不共變四榮亦名凡夫四倒出涅槃經并宗鏡録四榮者佛於拘尸那城娑羅雙樹間入滅東西南北各有雙樹每面雙樹一榮一枯故名四榮四枯以表凡夫二乘常無常等八倒也此四榮正表凡夫四倒而言榮者以凡夫由此四倒增長惑業有榮茂之義故名四榮也梵語拘尸那華言角城梵語娑羅華言堅固樹間入滅者謂雙樹中間用表非常非無常即中道也二乘者聲聞乘緣覺乘也一非常計常謂凡世間一切有為等事皆悉無常虛幻不實豈能長久凡夫妄計是常即成常顛倒二非樂計樂謂世間五欲之樂皆是受苦之因凡夫不了妄計為樂即成樂顛倒五欲者色欲聲欲香欲味欲觸欲也三非我計我謂此身皆因四大假合本無有我若一大是我三大應非我若四大俱是我應有多我畢竟是誰為我故知我不可得凡夫不了於自身中強作主宰妄計為我即成我顛倒四大者地大水大火大風大也四不淨計淨謂己身他身具有五種不淨凡夫不了妄生貪著執以為淨即成淨顛倒五種不淨者種子不淨住處不淨自體不淨外相不淨究竟不淨也四枯亦名二乘四倒出涅槃經并宗鏡録四枯者表二乘四倒也所言枯者以二乘觀無常苦空無我等則煩惱有朽滅不生之義故名為四枯也二乘者聲聞乘緣覺乘也一常計無常常者即法身常住之義無常者即變異也謂聲聞緣覺為無明之惑所覆於如來常住法身中妄計有變異相是為無常顛倒二樂計非樂樂者即涅槃清淨之樂非樂者即苦義謂聲聞緣覺為無明之惑所覆於如來涅槃清淨樂中妄計是苦是為非樂顛倒三我計無我我者即佛性真實之我也無我者謂佛性中無有我也謂二乘為無明之惑所覆不了無我法中而有真我故於佛性真我之中妄計無我是為無我顛倒四淨計不淨淨者即是如來常住之身非雜食身非煩惱身非血肉身非是筋骨纏縛之身不淨者二乘為無明之惑所覆但觀世間一切諸色皆為不淨不了如來常住之淨是為不淨顛倒四種性行出佛本行集經一自性行經云若諸菩薩本性已來賢良質直順父母教信敬沙門及婆羅門善知家內尊卑親踈恭敬承事無失具足十善復更廣行其餘善業是名菩薩自性行梵語沙門華言勤息梵語婆羅門華言淨行十善者不殺不盜不邪不妄語不兩舌不惡口不綺語不貪欲不嗔恚不邪見也二願性行經云若諸菩薩發如是願我於何時當得作佛十號具足是名菩薩願性行十號者一如來二應供三正遍知四明行足五善逝六世間解無上士七調御丈夫八天人師九佛十世尊也三順性行經云若諸菩薩隨順修行六波羅蜜是名菩薩順性行梵語波羅蜜華言到彼岸謂修布施持戒忍辱精進靜慮智慧六度之行到涅槃彼岸是為六波羅蜜也四轉性行經云如我供養然燈世尊依彼因緣讀誦經典轉凡成聖是名菩薩轉性行如我者釋迦如來自謂也四不可説出金光明經玄義拾遺記涅槃經中明四教之理但可智證不可言説以其理本無説故也四教者藏教通教別教圓教也一生生不可説生生者能生所生也謂根塵相對是為能生由此根塵相對之時一念心起分別好惡是為所生即心法也能所兼言故名生生此是藏教所詮實有生滅之法法雖生滅理本無言故云不可説也二生不生不可説生者即前根塵相對所生之法也不生者了此所生之法當體即空也既達所生之法本空故云生不生也此是通教所詮之理理本無言故云不可説也三不生生不可説不生者即真空之理也生者從空出假而起度生之用也此言別教之人於十住位中修習空觀了法無生故云不生而又不住於空復於十行中而修假觀起十界度生之用故復云生也此是別教所詮之理理本無言故云不可説也十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也十行者歡喜行饒益行無嗔恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也十界者佛界菩薩界緣覺界聲聞界天界人界阿修羅界鬼界畜生界地獄界也四不生不生不可説謂理本不生事即理故事亦不生是名不生不生又惑體本空故不生智用亦泯故不生是名不生不生又無因可修故不生無果可證故不生是名不生不生此是圓教所詮之理理本無言故云不可説也翻譯四例出翻譯名義一翻字不翻音翻字不翻音者謂如諸呪字是此方之字音是彼土之音是也二翻音不翻字翻音不翻字者謂如卍字以此方萬字之音翻之而卍字之體猶存梵書是也三音字俱翻音字俱翻者謂諸經文音與字二者皆就此方言音字體翻之是也四音字俱不翻音字俱不翻者謂西來梵夾音與字二者未經此方翻譯是也阿難四問出涅槃經後分佛將入滅語阿難大衆言我滅度後汝當精勤教誡我諸眷屬早求出離此生空過後悔無追時阿難聞佛語已悲哽嗚咽舉體迷悶時阿泥樓豆安慰阿難曰如來滅度時至今日則有明旦則無汝依我語咨啓四問阿難問已佛言汝致四問為最後問大能利益一切世間汝等諦聽吾當為説梵語阿難華言慶喜梵語阿泥樓豆又名阿䨲樓馱即阿那律華言如意謂於過去九十一劫天人之中受如意樂故名如意一佛滅度後惡性車匿云何共住佛答言車匿比丘其性鄙惡我滅度後汝當依我教法調伏其心捨本惡性不久自當得證道果車匿無翻西域記云正音闡釋迦亦釋種太子出家令車匿牽捷陟捷陟馬名譯云納二佛滅度後我等以何為師佛答言汝問以何為師者當知尸波羅戒是汝大師依之修行能得出世甚深定慧梵語尸波羅華言戒三佛滅度後我等依何法住佛答言汝問依何法住者當知依四念處嚴心而住一觀身性相同於虛空名身念處二觀受不在內外不住中間名受念處三觀心但有名字名字性離名心念處四觀法不得善法不得不善法名法念處一切比丘應當依此四念處住觀受者受即領納之義謂眼耳鼻舌身意六根領納色聲香味觸法六塵之境也不在內外者心不在六根名內不在六塵名外根塵之中名為中間四一切經初當安何語佛答言汝問一切經初當安何語者當知如來滅後結集法藏一切經初當安如是我聞一時佛住某方某處與某等大衆而説是經化儀四教出天台四教儀化儀者如來出世一代化物之儀式也一頓教謂不談小乘直説大法故名頓教即華嚴經也二漸教漸即漸次有漸初漸中漸末之不同謂如來初於鹿苑破斥邪法建立正教專為二乘此名漸初即阿舍經也次於方等會上彈斥二乘小機令其歸向大法此名漸中即淨名等經也後於般若會上廣談空慧之法淘汰二乘執小之情會一切法皆歸大乘此名漸末即般若經也如是自淺至深次第而進故名漸教二乘者聲聞乘緣覺乘也三祕密教謂如來不思議智慧神通之力能令大衆同會聽法所聞各異彼不知此此不知彼隱密赴機故名祕密教四不定教不定者謂如來不思議智慧神通之力能令聽法之衆或聞小法而證大果或聞大法而證小果彼此相知得益不定故名不定教化法四教出天台四教儀化法者佛化衆生之方法也一藏教藏即含藏之義謂經律論各含一切文理故名藏教二通教謂通前藏教通後別圓故名通教通前藏教者謂此教鈍根菩薩雖觀無生四諦但證真空之理與前藏教是同也通後別圓者謂此教利根菩薩證真空之理時能於真空了達不空即入後之別教若知空不空具一切法即入後之圓教也三別教別即隔別不同之義謂別前藏通別後圓教故名別教別前藏通者謂此教獨被菩薩不涉二乘所修也別後圓教者謂此教所談法門行相隔歷次第而不圓融也四圓教圓即不偏之義謂此教所詮中道之理性相圓融事理無礙法法具足故名圓教龍樹四教出華嚴經隨疏演義鈔龍樹論師乃西天第十三祖嘗立四教判釋經論故云龍樹四教也一有門謂阿含小乘等經説一切因果之法悉皆實有是為有門梵語阿舍華言無比法二空門謂大品般若等經説真空實相之理蕩除衆生情執是為空門梵語般若華言智慧三亦有亦空門謂深密等諸大乘經説有談空互相無礙是為亦有亦空門四非有非空門謂中論等説一切法皆即空之有是非有即有之空是非空互泯互融即第一義是為非有非空門苑公四教出華嚴經疏苑公唐賢首藏法師弟子也因寶性論有四種衆生不識如來藏遂立四教焉四種衆生者一凡夫二聲聞三辟支四初心菩薩也一迷真異執教謂諸外道凡夫迷於真性廣起異計故云迷真異執教二真一分半教謂聲聞辟支二人於真如隨緣不變二分義中但得隨緣不得不變故名一分於隨緣分中唯説生空所顯之理不説法空故名為半合而言之故云真一分半教隨緣不變者即真如之理隨染淨緣變造諸法而其本體則不變易也生空即人空也三真一分滿教謂初心菩薩但得不變不得隨緣故名一分於不變分中雙辨二空之理故名為滿合而言之故云真一分滿教二空者人空法空也四真具分滿教謂菩薩由具隨緣不變二分之義顯真實理識如來藏故云真具分滿教曉公四教出華嚴經疏唐元曉法師海東新羅人來此弘宗亦立四教判釋諸經故稱曉公四教焉一三乘別教謂如四諦緣起經等聲聞緣覺菩薩三乘之所共學於中二乘未明法空即是別相故云三乘別教二三乘通教謂如般若深密經等聲聞緣覺菩薩三乘之所共學於中説諸法空即是通相故云三乘通教三一乘分教謂如梵網經等菩薩不與二乘共學名為一乘於中永顯法之周普名為隨分故云一乘分教四一乘滿教謂如華嚴經等其中具明法界之理圓融周普故云一乘滿教四不生出中論龍樹菩薩造中觀論云因諸外道計一切法或從自生或從他生或從自他共生或從無因生故説偈破云諸法不自生亦不從他生不共不無因是故知無生一不自生自即六根謂根塵相對則有一念心起若無所對六塵則一念之心畢竟不生故名不自生六根者眼根耳根鼻根舌根身根意根也六塵者色塵聲塵香塵味塵觸塵法塵也二不他生他即六塵謂雖有六塵若無六根相對則一念之心亦畢竟不生故名不他生三不共生謂六根六塵和合名之為共前云不自生則是根不能生又云不他生則是塵不能生根塵各各既不能生根塵相共又焉得生故名不共生四不無因生謂不因根塵而生也既離根塵則一念心無有生處故名不無因生四種問答出十住毗婆沙論一定答謂決定以實答也如一比丘問佛云色受想行識常不變異否佛答言無有色受想行識常不變異蓋言五陰之法本空實非常不變異是名定答梵語比丘華言乞士五陰者色陰受陰想陰行陰識陰也二分別答謂分別果報而答也如梵志問佛云人作身口意業受何果報佛答言若作苦業即受苦報若作樂業即受樂報若作不苦不樂業即受不苦不樂報是名分別答梵語梵志華言淨裔三反問答謂反問於他而使其答也如先梵志問佛已佛言我還問汝隨汝意答色是如來否受想行識是如來否梵志答曰非也佛又問云離色受想行識是如來否梵志又答言非也蓋如來之法不即五陰不離五陰梵志不達故皆答言非也是名反問答四置答謂棄置而不答也如外道或計世間常世間無常世間亦常亦無常世間非常非無常世間有邊世間無邊世間亦有邊亦無邊世間非有邊非無邊又計如來滅後有如來滅後無如來滅後亦有亦無如來滅後非有非無然如來實無此理凡若此問佛皆置而不答是名置答四病出圓覺經疏一作病作者即生心造作之謂也謂若有人言我於本心作種種行欲求圓覺彼圓覺性非作得故説名為病二任病任者即隨緣任性之謂也謂若有人言我等今者不斷生死不求涅槃任彼一切欲求圓覺彼圓覺性非任有故説名為病三止病止者即止妄即真之謂也謂若有人言我今永息諸念寂然平等欲求圓覺彼圓覺性非止得故説名為病四滅病滅者即寂滅之謂也謂若有人言我今永滅一切煩惱身心根塵虛妄境界一切永寂欲求圓覺彼圓覺性非滅相故説名為病大四相出大乘起信論疏大四相者此就始終一期受報而言也一期者謂從生至死也一生相謂一念托胎十月滿足此身即生是為生相二住相謂既出胎已住於世間是為住相三異相謂少則顏紅體潤老則髮白面皺是為異相皺側救切四滅相謂業盡命終身亦壞滅是為滅相小四相出大乘起信論疏小四相者此就一念而論也一生相謂以根對塵一念心生是為生相根即眼耳鼻舌身意六根也塵即色聲香味觸法六塵也二住相謂一念之心暫爾相續是為住相三異相謂一念之心初後不同是為異相四滅相謂塵境既忘心念亦滅是為滅相光宅四乘出華嚴經疏光宅者梁光宅寺雲法師也立四乘教謂臨門三車為三乘即權教也四衢所授大白牛車為第四乘即實教也一羊車謂聲聞之人以析空觀觀於生滅四諦破見思煩惱證真諦理得離三界生死如乘羊車出於火宅故法華經云為求羊車出於火宅是也析空觀者謂於五陰等法觀察分析離其著心也四諦者苦諦集諦滅諦道諦也三界者欲界色界無色界也二鹿車謂緣覺之人以析空觀觀十二因緣生滅破見思煩惱覺了真諦之理得離三界生死如乘鹿車出於火宅故法華經云為求鹿車出於火宅是也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三牛車謂三藏教菩薩發四弘誓修六度行化導衆生同出三界生死究竟至於真空涅槃如乘牛車出於火宅故法華經云為求牛車出於火宅是也三藏者經藏律藏論藏也四弘誓者衆生無邊誓願度煩惱無數誓願斷法門無量誓願知佛道無上誓願成六度者一布施二持戒三忍辱四精進五禪定六智慧也梵語涅槃華言滅度四大白牛車謂大乘菩薩以圓融三觀觀於諸法實相之理頓破無明煩惱而成一切種智如乘大白牛車至於寶所故經云有大白牛肥壯多力行步平正其疾如風是也三觀者空觀假觀中觀也一切種智者佛智也寶所者喻實相之理也生公四輪出華嚴經隨疏演義鈔生公者即羅什法師之弟子也立此四輪者輪有摧滅之義能摧滅衆生惑業而超出三界也三界者欲界色界無色界也一善淨法輪謂修五戒十善之法摧滅四惡趣業而得天人果報是為善淨法輪五戒者不殺不盜不邪不妄語不飲酒也十善者不殺不盜不邪不妄語不兩舌不惡口不綺語不貪欲不嗔恚不邪見也四惡趣者修羅趣餓鬼趣畜生趣地獄趣也二方便法輪謂修四諦十二因緣方便之道而證二乘之果是為方便法輪四諦者苦諦集諦滅諦道諦也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三真實法輪謂修中道實相之觀摧滅無明煩惱之業而證一乘佛果是為真實法輪四無為法輪謂修三德妙觀摧滅五住煩惱而證涅槃無為之果是為無為法輪三德者法身德般若德解脫德也五住煩惱者見惑為一住思惑分三住塵沙無明惑合為一住因此五者住著三界故名住也文義四用出法華文句記一有文有義常人用之謂凡立言立論有文字可證據有義理可依憑此尋常之人皆能用故云常人用之二無文有義智人用之謂凡立言立論雖無文字可證據而有義理可依憑此唯智者能用故云智人用之三有又無義暗者用之謂凡立言立論雖有文字可證據而無義理可依憑此暗昧之人不明義理而強自用故云暗者用之四無大無義迷者用之謂凡立言立論既無文字可證據又無義理可依憑此愚迷之人不了文義而強自用故云迷者用之
