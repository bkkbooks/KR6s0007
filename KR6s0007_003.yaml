body:
  text: 上天竺前住持沙門一如等奉勑集注論有二種出阿毗達磨大毗婆沙論論即辨明之義謂造論者或發明佛説大小二乘諸經之奧義或發明自宗之道辨證他宗之非故曰論也一立自宗立自宗者立自家之本宗也謂如善説法者立善説法宗惡説法者立惡説法宗應理論者立應理論宗分別論者立分別論宗也二遮他宗遮他宗者遮止他家所立之宗也謂如善説法者遮惡説法宗惡説法者遮善説法宗應理論者遮分別論宗分別論者遮應理論宗也二種語出涅槃經一世語謂如來為諸聲聞緣覺説於世間有為之法名為世語二出世語謂如來為諸菩薩説出世間無為之法名為出世語二種愛語出大智度論一隨意愛語謂菩薩為憐憫衆生故隨順其意而為説法是名隨意愛語二隨所愛法為説謂菩薩隨順衆生所愛樂法而為宣説論云菩薩若已得道隨所應度而為説法如高心富人為讚布施是人愛著名聲福德故心則喜樂是名隨所愛法為説二句出翻譯名義句即句逗也又衆語和合成句謂如來所説之經必由文以載其義由義以成其文文義相成是為句也一文句文即字也依類象形為字形聲相稱曰文謂一切契經皆以文為身文成語為句詮顯其義必藉於文是為文句二義句義即義理謂一切契經皆詮義理然義必依文而得顯文因義而能成裁斷其文必由乎義是為義句二義出圓覺經略疏一了義謂諸大乘經宣説勝義如煩惱即菩提生死即涅槃之類皆究竟顯了名為了義二不了義謂諸經中宣説世俗等事或説厭離生死欣求涅槃等種種文句差別不為究竟顯了名不了義二決定義出楞嚴經決定者斷然不易之謂如來令阿難甄別真妄一以審因心果覺之異同一以審煩惱根本之生起故有二種決定義也一審因心果覺佛語阿難若欲捐捨小乘入佛知見應當審觀因地發心與果地覺為同為異者蓋為阿難不知衆生本具之因心即如來所證之果覺如來所證之果覺即衆生本具之因心故令其諦審觀察決定知因心果覺本來不異也若能即此不異之心而為立行進修之本則無上菩提決定成就矣梵語菩提華言道二審煩惱根本佛令阿難審詳煩惱根本發業潤生誰作誰受者蓋為阿難不知煩惱根本隨所作業妄受生死無解脫時是故令其審觀詳察決定知煩惱體性及所作之業所受之報本來虛幻不實也若能窮此顛倒之源則正行成立而無上涅槃決定可證也梵語涅槃華言滅度二請出華嚴經疏一言請言請者謂以言説而請問也即華嚴第一會三昧品中普賢菩薩以言重請下之三品是也三品者世界成就品華藏世界品毗盧遮那品也二念請念請者謂不興言説唯以念想而請問也即第二會如來名號品中世尊知諸菩薩心之所念為現神通等是名念請二答出華嚴經疏一言答謂華嚴經第一會至第八會各有請問皆以言説而答是名言答二示相答謂華嚴經第九會入法界品初起六十句問如來自入師子頻申三昧現相而答蓋佛心自在不待興言佛力殊勝現相能答是名示相答頻申奮迅貌二食出法華文句一法喜食謂聞法歡喜即得增長善根資益慧命猶世間之食能養諸根支持其命是名法喜食二禪恱食謂以禪法資其心神而得禪定之樂即得增長善根資益慧命猶世間之食能養諸根支持其命是名禪恱食二種觀出禪要呵欲經觀即定心運想之謂也修行之人未得正定於不淨法猶生染心故作此二觀遣其著心也一死尸臰爛不淨觀謂修行之人於間靜處運心觀想死尸臰爛不淨之相心生厭惡我身不淨亦復如是云何著是色欲貪求無厭况命如電逝須難保一息不來與彼何異由觀臰爛不淨而貪著之心自息是為死尸臰爛不淨觀二聞法憶想分別觀謂修行之人雖聞法要未有空慧貪愛因緣熾然未息故須憶想自身以骨為柱以肉為泥毛髮爪齒皮膜筋血聚以為身飢寒失調百骸俱苦分別身分無一堅固由此憶想分別觀而貪著之心自息是為聞法憶想分別觀二種觀法出占察經一唯識觀謂於一切時一切處隨身口意所有作業知惟自心於念念間悉以三觀觀察所起之心是名唯識觀三觀者空觀假觀中觀也二實相觀實相即理也謂思惟心性無生無滅不住見聞覺知於念念間悉以三觀觀於本心所具實相之理是名實相觀二見出涅槃經一住地分見謂十住等菩薩破一品無明之惑顯一分三德從淺至深故名住地分見三德者法身德般若德解脫德也二究竟無見謂等覺菩薩斷最後品微細無明之惑淨盡無餘即登妙覺果佛之位本有性德一時究竟顯現更無所見故名究竟無見二見出涅槃經一相貌見謂因彼形相狀貌而見如人遠見煙起便言見火雖不見火亦非虛妄是名相貌見二了了見謂人眼根清淨不壞自觀掌中阿摩勒果了了分明菩薩見於菩提涅槃之果亦復如是是名了了見梵語阿摩勒翻譯名義不翻言其樹葉似棗花白而小果如胡桃味酸甜可入藥梵語菩提華言道梵語涅槃華言滅度無明二義出起信論疏一無體即空義謂無明之惑皆依衆生妄心違於真如而起妄境元空體本不有故云無體即空義二有用成事義謂無明雖無自體而能成辦世間出世間一切事業故云有用成事義二種熏出翻譯名義熏資熏擊發之義也蓋言第八識雖含藏一切善惡種子若無染淨二緣熏發則不能成染淨等事如穀麥等種雖有生芽之能若不得水土資熏芽亦不生故名熏也第八識即藏識也一熏習熏即熏發習即數習謂數習染淨之緣熏發心體而成染淨等事故名熏習二資熏資猶助也謂現對塵境所起之心及諸惑相資熏發而成染淨等事故名資熏二種生死出唯識論一分假生死分即分限假即形假謂六道衆生隨其業力所感果報身則有長有短命則有壽有夭而皆流轉生死故名分假生死六道者天道人道修羅道餓鬼道畜生道地獄道也二變易生死因移果易名為變易謂聲聞緣覺菩薩雖離三界內分假生死而有方便等土變易生死如初位為因後位為果又後位為因後後位為果以其因移果易故名變易生死方便土者修戒定慧方便之道得生其中名方便土二女出涅槃經如來為諸衆生但欣生惡死而不知出離之方故以二女喻之蓋二女行止共俱不相棄捨亦猶生必有死死必有生未嘗暫離也一功德天經云如有女人入於他舍主即問言汝字何等答言我身即是功德大天又問為何所作答言我所至處能與種種金銀等寶聞已歡喜敬愛禮拜供養此喻凡夫貪生亦猶舍主貪愛財寶而愛是女也二黑暗女經云復見一女其貌醜陋多諸垢膩主即問言汝字何等答言我字黑暗又問為何所作答言我所行處能令其家所有財寶一切衰耗聞已持刀作如是言汝若不去當斷汝命答言汝甚愚癡無有智慧汝之家中所供養者即是我姊我常與姊進止共俱汝若驅我亦當驅彼主人還入問功德天實為是否天言實是我妹行住共俱未曾相離我常利益彼常衰耗若愛我者亦應愛彼若厭彼者亦應厭我此喻凡夫但知惡死而不知生亦當惡若惡其死須惡其生生死俱惡方為有智所謂有智主人二俱不受也二種破著出大智度論一破欲著謂人於好色多起貪欲若觀色是無常不淨等則不生貪著之心而得解脫之樂是名破欲著二破見著謂人雖觀色無常不淨猶尚著法生見若能了達色相本空則不起於分別之見是名破見著二解脫出寶性論謂諸衆生常為業繩所縛不能脫離若解其縛即得自在故名解脫一性淨解脫謂衆生性本清淨而無繫縛染汙之相是名性淨解脫也二障盡解脫謂衆生由煩惱之惑障蔽聖道不得出離若離此障即得自在是名障盡解脫也二解脫出華嚴經疏一有為解脫謂有作之戒依師作法而受如法而持則能防非止惡離諸惑業之縛故名有為解脫二無為解脫謂無作之戒性自清淨體本無為雖持戒法無持犯相心體既空罪性亦泯故名無為解脫二解脫出成實論一慧解脫謂以智慧斷除無明惑業之縛而得解脫故名慧解脫二心解脫謂因此心離於貪愛之縛而得解脫故名心解脫二斷出地持經一緣縛斷謂但斷心中之惑則於外塵境不起貪嗔於境雖緣不生染著故名緣縛斷二不生斷謂得法空之時能令三途惡道苦果永更不生故名不生斷三途者刀途血途火途也二種護持事出地藏十輪經一護持佛種佛種者佛之種性也謂諸佛菩薩以大悲心紹隆佛種令諸衆生捨俗出家剃髮染衣修行聖道使無斷絶也二護持正法正法者即四諦等真正之法也謂諸佛菩薩以大悲心護持如來正法使一切邪魔外道無能惱亂令諸衆生正信樂聞弘通流布利益無窮也四諦者苦諦集諦滅諦道諦也二教出華嚴孔目一化教通內外衆謂如來一代施化之教通被內衆受道弟子及外衆在俗之人皆令依之修行出離生死之苦故名化教通內外衆二制教唯內衆謂如來説諸律儀專為禁制內衆受道弟子令其如法受持成就聖果故名制教唯內衆華嚴為諸教本有二出華嚴經疏華嚴即大方廣佛華嚴經也如來出現於世初説此經而後演説漸頓諸法者蓋大小漸次諸教皆從此華嚴性海流出故此經能統攝該括以為諸教之本也一為開漸之本開謂開設漸即漸次即三乘之教也佛初説華嚴根本一乘圓教諸大菩薩信解證入如來智慧時有三乘權淺之機雖預法會如聾若盲不信不解不順不入故盧舍那佛脫御服著弊垢衣乃開三乘漸次隨宜之教令彼聲聞緣覺及權教菩薩開解成熟故華嚴為開漸之本也三乘者聲聞乘緣覺乘菩薩乘也梵語盧舍那華言淨滿二為攝末之本攝謂𭣣攝末即支末即前三乘教也佛既為諸小乘之機説三乘法既成熟已最後令其悟入佛慧故大乘同性經云所有聲聞法辟支佛法菩薩法諸佛法如是一切諸法皆悉流入毗盧遮那智藏大海故華嚴為攝末之本也梵語毗盧遮那華言光明遍照亦云遍一切處印師二教出華嚴經疏印師二教者唐初印法師立此二教也一屈曲教謂釋迦如來所説之經逐其機性隨計破著方便委曲令物生解如涅槃經雖説圓通一極之理或對權顯實或會異歸同之類是名屈曲教對權顯實者對藏通別三教之權以顯圓教一乘之實也會異歸同者會三教之異歸圓教之同也二平道教謂盧舍那所説之經隨其法性平等而説如華嚴經雖有隨諸衆生各別調伏皆是稱性善巧一時頓演是名平道教梵語盧舍那華言淨滿即報身佛也曇讖二教出華嚴經疏曇讖二教者西秦曇牟讖三藏立此二教也一半字教半字教者謂聲聞藏談理未遍若字之有半也二滿字教滿字教者謂菩薩藏談理滿足若字之圓滿也遠師二教出華嚴經疏遠師二教者隋朝遠法師立此二教也一漸教漸教者謂約漸悟之機大由小起所設具有三乘之教也三乘者聲聞乘緣覺乘菩薩乘也二頓教頓教者謂約頓機直入於大不由於小頓令得悟也劉虯二教出華嚴經疏劉虯二教者齊朝隱士劉虯諳達釋書亦立二教也一漸教謂始自鹿苑終於雙樹所説之經從小至大故名漸教二頓教謂佛最初説華嚴經如日初出先照高山故名頓教二種無心約教出宗鏡録約即要約亦依約之義謂如來之教本離心緣言説之相衆生依教而修捨離妄著之心安住真實之理則於聖道自然成就故云千經萬論莫不説離身心破於執著是也一澄湛令無謂諸衆生若能攝念安禪澄神靜慮能令定體湛然不為妄塵所撓是名澄湛令無二當體是無謂諸衆生直了心源本寂法亦無生以一念起處了不可得是名當體是無二宗釋題出天台四教儀集注并華嚴經疏二宗釋題者謂天台賢首二宗解釋諸經題目有通別能所之不同也一天台通別釋題陳隋間天台智者大師凡解一經題目必以通別二義而判釋之如妙法蓮華經上之四字是別別在此經故經之一字是通通於一切諸經故餘經亦然是為天台通別釋題二賢首能所釋題唐朝賢首國師凡解一經題目必以能詮之文所詮之義而判釋之如大方廣佛華嚴經上之六字是所詮經之一字是能詮餘經亦然是為賢首能所釋題二種立題出法華文句二種立題者謂凡諸經題目有佛自立者有結集經家之所立者一佛自立佛自立者謂諸經題目有佛自立如金剛經云是經名為金剛般若波羅蜜以是名字汝當奉持是也二經家立經家立者謂佛入滅後諸經題目有阿難等結集之人所立如妙法蓮華等經是也梵語阿難華言慶喜二攝出淨名經疏一折伏攝折即折挫伏即摧伏謂六道衆生於三界中貪著五欲流轉生死卒難度脫故如來説諸善惡果報及以地獄等種種苦切之言折伏其心而攝受之是名折伏攝六道者天道人道修羅道餓鬼道畜生道地獄道也三界者欲界色界無色界也五欲者色欲聲欲香欲味欲觸欲也二調伏攝調即調治謂調伏見思煩惱及根本無明之惑皆順正理心心寂滅不令再起是名調伏攝二種入出金剛三昧經一理入謂衆生深信本有真性不一不異不有不無無己無他凡聖不二寂靜無為無有分別因此深信能入於理是名理入二行入行即依理起修之行謂行此行時心不傾倚無念無求安住不動猶如大地因行入理是名行入二詮出宗鏡録一遮詮遮即止其所非詮即能詮名字謂如諸經所説真如妙性每云不生不滅不垢不淨無因無果無相無為非凡非聖非性非相等皆是遣非蕩迹絶相祛情是名遮詮祛音驅逐也除也二表詮表即顯其所是謂如諸經所説知見覺照靈鑒光明朗朗昭昭堂堂寂寂等是名表詮二羯磨出四分律梵語羯磨華言作法謂比丘有罪各共面對秉法自首其罪也一治罪羯磨謂比丘有犯戒者大衆作法治定其罪是名治罪羯磨也二成善羯磨謂比丘有犯戒罪許容對衆首露其罪得滅成就善根是名成善羯磨也二羯磨出毗尼母論一永擯羯磨梵語羯磨華言作法謂佛在世時若比丘犯罪不自見過其性剛強永無改悔即作法白衆隨即擯黜盡此一身不復再同僧事是名永擯羯磨二調伏羯磨謂比丘犯法未曾懺悔凡飲食坐起語言一切僧事皆不得與衆共而使其心調停折伏自能知過改悔求僧懺罪不復更作是名調伏羯磨二種却魔法出修習止觀坐禪法要謂坐禪之人正定未發多有魔事心生驚怖破壞善根若能端心正念則邪不干正魔自滅謝故有二種却魔之法也一修止却魔謂坐禪之人修定之時或見父母兄弟諸佛形像一切可愛之境令人樂著或見師子虎狼羅剎一切可畏之形令人怖懼即當了達此是諸魔惑亂之相悉皆虛誑不喜不怖而唯息心寂靜則彼當自滅是為修止却魔梵語羅剎華言速疾鬼二修觀却魔謂坐禪之人修定之時於諸魔境修止却之不去即當反觀能見之心無有處所彼何所惱如是觀時尋當謝滅若遲遲不去但當正心勿喜勿懼則正定現前彼當自滅是為修觀却魔二等出宗鏡録一斷等謂佛極解脫道初發起時一切衆生所有無明之惑一時究竟頓斷此舉如來望衆生界無有一法而非清淨故名斷等二得等謂佛初成道得滿始覺之時一切衆生始覺之智皆得滿足此舉衆生望佛世尊所有無明等惑皆悉清淨無所障礙故名得等二殊勝出楞嚴經此言觀音菩薩極證圓通十方普應上同諸佛下合羣生妙用超越故云殊勝一上合諸佛本覺妙心本覺妙心即諸佛本然覺了妙明真心也謂菩薩極證寂滅十方圓明體同諸佛故能起同體大慈與衆生樂顯應十方現身説法聖凡等度有願必從是為殊勝二下合衆生同一悲仰謂菩薩所證圓通之理與衆生本有之心迷悟雖殊體元不二故能起同體大悲衆生苦𡨋應十方等施無畏設有所求隨願滿足是為殊勝二種清淨出華嚴經隨疏演義鈔一自性清淨謂衆生真如心體性本清淨無所染礙故名自性清淨二離垢清淨謂衆生自性清淨心體遠離一切煩惱垢染故名離垢清淨二種自在出華嚴經疏一觀境自在謂菩薩以正智慧照了真如之境及能通達一切諸法圓融自在是名觀境自在二作用自在謂菩薩既以正智照了真如之境即能從體起用現身説法化諸衆生而得自在是名作用自在二種畢竟出大涅槃經一莊嚴畢竟畢竟猶決定之義謂一切衆生皆有一乘正性應須修於六度莊嚴設若不修不得正性是則六度決定能為莊嚴之具故疏云以六度為莊嚴也六度者一布施二持戒三忍辱四精進五禪定六智慧也二究竟畢竟究竟猶至極之義即一切衆生所得一乘之性也苟得此一乘之性則能決定至於至極之地故疏云一乘為究竟也二種際出華嚴經疏并演義鈔際即際畔謂生死涅槃體性是一本無際畔不異而異遂有生死涅槃二際之分也梵語涅槃華言滅度一涅槃際涅槃際者若以生死染緣就涅槃實理而言生死即涅槃了無虛妄之可分別無際之際是名涅槃際中論云涅槃之實際及與生死際無毫𨤲差別是也二生死際生死際者若以涅槃實理從生死染緣而言涅槃即生死非真寂靜之可證入無際之際是名生死際故晉譯華嚴經云生死非雜亂涅槃非寂靜是也二轉依出楞嚴經義海一轉煩惱依菩提煩惱者昏煩之法惱亂心神即一切衆生無明妄惑也梵語菩提華言道即一切諸佛所悟所證之道也然菩提煩惱其性是一但由迷悟不分而分衆生迷故即轉菩提而為煩惱諸佛悟故即轉煩惱而為菩提若能了達煩惱即是菩提念念修習是名轉煩惱依菩提也二轉生死依涅槃生死者一切衆生虛妄生滅也梵語涅槃華言滅度即一切諸佛所悟所證之果也然生死涅槃性元是一但由迷悟不分而分衆生迷故即轉涅槃而為生死諸佛悟故即轉生死而為涅槃若能了達生死即是涅槃念念證入是名轉生死依涅槃也二種無量出大智度論一實無量謂涅槃佛性之理譬如虛空實無限量一切菩薩不能量度故名實無量二不知為無量謂如須彌山大海之水唯諸佛菩薩能知斤兩滴數多少諸天世人智力淺劣所不能知故名不知為無量梵語須彌華言妙高二種無礙出華嚴經疏一智慧於境無礙境即法界之理也謂菩薩以平等智證於法界之理理事融通無有障礙故名智慧於境無礙二神通作用無礙謂菩薩由內心證於法界之理故能以種種神通應現十方世界隨機化度皆無障礙故名神通作用無礙二花出華嚴經疏一草木花謂凡草木之花皆有開敷結實之義以喻萬行之因則有成就佛果之能故名草木花二嚴身花謂世間金玉等花皆能嚴飾其身以喻神通相好則能莊嚴法身故名嚴身花二種菩薩出大智度論論云菩薩常好中道捨離二邊故不生邊國又於中國不生邪見家又問曰是菩薩大福德智慧力應生邊地邪見家而教化之何以畏而不生答曰菩薩有二種二邊者有無二邊也一成就大力菩薩論云此菩薩為衆生故隨所應度隨處受用不避邊地及邪見家是名成就大力菩薩二新發意菩薩論云此菩薩初發心故若生邊地及邪見家既不能度人又自敗壞善根譬如真金在泥終不變壞若是銅鐵在泥則壞是故新發意菩薩不生邊地及邪見家真金喻大力菩薩銅鐵喻新發意菩薩菩薩二心出大智度論一大慈心慈名愛念即與樂之心也謂菩薩愛念一切衆生常求樂事隨彼所求而饒益之是名大慈心二大悲心悲名愍傷即苦之心也謂菩薩愍念一切衆生受種種苦常懷悲心拯救濟令其得脫是名大悲心二種勝出地持經一因勝謂菩薩所修出世善法皆以菩提為因勝於聲聞緣覺是名因勝二果勝謂菩薩修行既以菩提為因終證菩提之果勝彼二乘是名果勝二乘者聲聞乘緣覺乘也二木出法華經文句一大樹大樹喻別教菩薩也謂此教菩薩於法華會上聞説一乘之法受記作佛普度一切衆生如彼大樹蒙一雨所潤而得增長敷榮鬱茂則能普覆一切是名大樹二小樹小樹喻通教菩薩也謂此教菩薩亦於法華會上聞説一乘之法受記作佛而不及別教菩薩根器之大化用之廣是名小樹二種獨覺出析玄記大論云獨覺出無佛世觀外因緣無師自悟故名獨覺觀外因緣者謂觀外物之凋零覺內心之生滅也一部行部即部類謂此獨覺稍有為人之心如鹿行走而能回顧後羣故名部行二麟喻謂此獨覺但欲自度略無為人之心譬如麒麟唯有一角故名麟喻二藏出莊嚴論藏即含藏之義謂佛説大小乘諸經各各含藏一切文理故名藏也一聲聞藏聞佛聲教故曰聲聞謂佛説阿含等經含藏小乘聲聞等修因證果之法是名聲聞藏梵語阿含華言無比法二菩薩藏菩薩梵語具云菩提薩埵華言覺有情謂佛説華嚴法華等經含藏大乘菩薩修因證果之法是名菩薩藏二乘出華嚴經疏一臨門三車臨門三車喻小乘權教也謂法華經譬喻品中三乘之人於火宅門外索羊鹿牛三車求出火宅以喻三乘之人依四諦十二因緣六度等法修行得出生死是名臨門三車三乘者聲聞乘緣覺乘菩薩乘也四諦者苦諦集諦滅諦道諦也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也六度者一布施二持戒三忍辱四精進五禪定六智慧也二露地牛車露地牛車喻大乘實教也謂法華經譬喻品中諸子既出火宅到於四衢道中露地而坐等賜大白牛車同歸祕蜜理藏是名露地牛車二乘出天台四教儀集注乘即運載之義謂二乘之人乘四諦十二因緣之法運出三界生死至於涅槃故名為乘四諦者苦諦集諦滅諦道諦也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也梵語涅槃華言滅度一聲聞乘聞佛聲教故曰聲聞謂此人以四諦為乘知苦斷集慕滅修道由觀四諦出離生死至于涅槃故名聲聞乘二緣覺乘因觀十二因緣覺悟真空之理名曰緣覺謂此人以十二因緣為乘由觀因緣生滅即悟非生非滅出離生死至於涅槃故名緣覺乘二果二義出析玄記二果即斯陀含華言一往來而有二義焉一一往天上謂第二果人猶有欲界下三品惑共潤一往來身若於人中得第二果則一往天上一來人間便證第三果是名一往天上二一往人間謂第一果人若在天中得第二果則一往人間一來天上便證第三果是名一往人間初果二義出析玄記初果即須陀洹華言預流又云逆流故有二義焉一預流預入也流即流類謂此聖人得證初果是入聖之流類故名預流二逆流謂初果聖人背逆生死之流類故名逆流利鈍二根出析玄記析玄云見道行人根有二種謂須陀洹初果之人破惑見理名為見道梵語須陀洹華言入流謂預入聖人之流也一鈍根名隨信行婆沙論云由彼依信隨信起行謂此一類行人從來性多鈍故自不披教文但信他人言説而得悟道故名隨信行二利根名隨法行婆沙論云由彼依法隨法起行謂此一類行人從來性多利故不信他言但自披教典而得悟道故名隨法行二種醫出大智度論一小醫謂但知病知病因知差病藥而不知一切病不知一切病因不知一切差病藥以譬聲聞不能遍知藥病是名小醫二大醫謂一切病一切病因一切差病之藥皆能遍知乃至遍知衆生病因差病藥等以譬菩薩無病不知無藥不識是名大醫二宗出翻譯名義一龍樹提婆宗龍樹即南天竺國大名德比丘也作大莊嚴大智度等論號法性宗明一切衆生皆有佛性一闡提等皆當作佛梵語提婆華言天即龍樹弟子稟承其道傳流于世是為龍樹提婆宗梵語一闡提華言信不具二無著天親宗翻譯名義引三藏傳云無著夜升覩史天宮於慈氏菩薩所受瑜伽師地等論專弘一切法相號法相宗天親乃無著之弟相繼其道傳流于世是為無著天親宗梵語覩史又云兜率華言知足梵語瑜伽華言相應二種比丘出出曜經昔二比丘在山中學其一多聞其一寡淺寡淺者持戒誦經唯通一句日誦不輟更無他學天神贊善願樂欲聞多聞比丘見其神應盡己所聞高聲諷誦欲求贊美而神默然怒其神曰何厚於彼而薄於我神曰汝不自責而反責我彼雖少聞言行相顧汝雖能誦三藏行與經違故不稱善也梵語比丘華言乞士三藏者一經藏二律藏三論藏一多聞比丘樂誦經典旁搜廣記謂之多聞比丘多聞固為可稱然學雖有餘其心不誠而行不逮亦不足貴此天神之所以不贊護也二寡淺比丘學道日淺經教少通謂之寡淺比丘寡淺固未足稱然學雖未至其心則專而行無雜亦為可貴此天神之所以贊護也僧伽理事二和出翻譯名義梵語僧伽華言和合衆謂與理和事和也一理和謂二乘之人同斷見思之惑同證無為之理是名理和二乘者聲聞乘緣覺乘也二事和事和有六義謂內凡外凡之僧戒和同修見和同解身和同住利和同均口和無諍意和同恱是名事和內凡者謂四善根位即暖頂忍世第一也此位近於初果須陀洹聖位故名內凡外凡者謂五停心一多貪者修不淨觀二多瞋者修慈悲觀三多散者修數息觀四愚癡者修因緣觀五多障者修念佛觀此位進修之始去聖位遠故名外凡二天隨人出華嚴經經云如人生已則有二天恆相隨逐一曰同生二曰同名一同生天同生天者謂此天與人同時而生也二同名天同名天者謂此天與人同其名字也二難化出大智度論菩薩為化衆生而於世間常作轉輪聖王多生欲界以天上著樂故難化也一欲天難化謂欲界諸天著於上妙五欲難以教化是名欲天難化五欲者色欲聲欲香欲味欲觸欲也二色天難化謂色界諸天多味著世間禪定之樂無厭惡心不求出離難以教化是名色天難化二種衆生出大智度論一習愛衆生習即數習愛即貪愛亦愛樂也謂諸衆生於世間一切聲色香等五欲境界多生貪愛不能捨離是名習愛衆生五欲者色欲聲欲香欲味欲觸欲也二習見衆生見即分別有無等見也謂諸衆生於一切法計有計無及計斷常等見是名習見衆生斷見者執世間之法皆悉斷滅無常也常見者謂執此身死已復生相續不絶也聞經二種非器出華嚴經疏一二乘非器謂佛説華嚴經時一切二乘根器狹劣不能聽聞故出現品云一切二乘不聞此經何况受持故雖在座如聾如瞽是名二乘非器二乘者聲聞乘緣覺乘也二衆生非器謂一切邪見衆生無信心故非其根器雖聞此經聞即生謗而墮惡道是名衆生非器二種出法華安樂行義一凡種謂凡夫之人不能覺了因眼見色生貪愛心為愛造業隨業受報輪回生死相續不斷是名凡種二聖種謂人因善知識得聞法義善能覺了一切諸法皆從妄念而生觀此妄心猶如虛空如是而修不著諸法能為聖果之種是名聖種二種受具戒法出大寶積經戒者萬善之根本也謂能受正戒者一切善法從此增長受之不正者著於邪見墮於外道故戒有二種不同也一受正平等戒謂修行人能受持如來正戒一切平等不生分別差別之見頓絶妄想邪思之心戒體圓明而得解脫究竟至於無上菩提無有退轉也梵語菩提華言道二受邪不等戒謂邪見之人隨逐惡知識以分別心受持邪戒而墮於人我斷常憍慢貪欲瞋恚愚癡種種差別邪見不知出要解脫之道也二種健兒出涅槃經并水懺謂自不作惡既作而能懺悔更不復作乃是有力量人故名健兒一自不作罪謂此健兒身口意業常自清淨永無過惡故名自不作罪二作已能悔謂此健兒雖先作惡後能改悔更不敢作猶如濁水置之明珠以珠力故水即為清故名作已能悔二種人呪術不能加出摩登伽經經云阿難乞食道逢摩登伽女取水阿難渴乏從之求飲女心染著歸白其毋請以呪術致之毋云世有二種人雖呪術不能加也梵語阿難華言慶喜梵語摩登伽華言性一斷欲人謂人能斷欲必自持戒持戒之人正念堅定立行端方神所呵護妖邪莫撓雖有呪術不能加也二死人謂人既死識依業轉隨處受形呪壽夭有限死不復生雖有呪術不能加也二種破戒人出大智度論一因緣不具足破戒謂貧窮之人衣食之緣不能具足是以心生偷盜即破於戒是名因緣不具足破戒二因緣具足破戒謂人衣食之緣雖皆具足以心習惡故好行惡事於諸禁戒多所毀犯是名因緣具足破戒二人出佛身血出大智度論一調達推山得罪梵語調達華言天熱謂其生重惡心推山壓佛金剛力士為護佛故以金剛杵反却擲之碎石迸來傷佛足指出血而得罪報二祇域行針得福梵語祇域華言故活謂佛有疾使祇域治之因行針出血疾得頓愈雖出佛血由治疾故而得福報二種退出地持經一究竟退究竟猶決定也謂修行之人信根淺薄始則勤修後因他緣障礙道心即退終不起菩提之願是名究竟退二不究竟退謂修行之人始則精進中復懈墯道心即退心既退已或遇善知識提獎勸誘復能發起菩提之願是名不究竟退二親出法苑珠林二親者父母也末羅王經云人受父母遺體乳哺養育之恩或從地積寶上至二十八天悉以施人不如供養父母也二十八天四天王天忉利天夜摩天兜率天化樂天他化自在天梵衆天梵輔天大梵天少光天無量光天光音天少淨天無量淨天遍淨天無雲天福生天廣果天無想天無煩天無熱天善見天善現天色究竟天空處天識處天無所有處天非想非非想處天也一父親父親者謂資形之始有生成之德自孩提以至長成教誡撫字其恩罔極也二母親母親者謂資生之始自懷擔以至乳哺鞠育護持劬勞甚至其恩罔極也
