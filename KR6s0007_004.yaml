body:
  text: 上天竺前住持沙門一如等奉勑集註二護出涅槃經一內護內即自己身心也謂佛所制大小乘戒人若受持則能防護身口意業之非成就種智菩提之果此禁戒所以為內護也二外護外即族親眷屬也謂人之脩行湏屏絕緣務凡有所需衣服飲食湯藥之類必藉族親眷屬左右供給庶得身心安隱成辦道業此族親眷屬所以為外護也二種有出毘婆沙論一實物有謂五蘊等法成身即是實有之物故名實物有五蘊者色蘊受蘊想蘊行蘊識蘊也二施設有謂世間之人各各隨業受報因假父母遺體便即施設而有男女之名故名施設有二種病出涅槃經一身病謂身因四大毒蛇互不調適以致諸病所生故名身病四大者地大水大火大風大也以此四者遍滿世界故名為大人攬外之四大而成內四大之身堅濕煖動之𪫬在內交攻不相和順毒𡧱如蛇故曰四大毒蛇二心病謂心體靈明虛圓湛寂其或歡喜不勝而致踊躍怯懦無勇而生恐怖及憂愁苦惱愚癡昏昧由此四者撓動于中以致諸病所生故名心病二種病出大智度論一先世行業病謂因先世好行鞭杖拷掠閉繫種種惡法惱𡧱眾生故感今世多病是名先世行業病二現世失調病謂因冷熱風雨不知將養其身及飲食不節臥起無常以是事故得種種病是名現世失調病二種死出涅槃經一命盡死謂天命當盡捨所受身故名命盡死然或有命盡非是福盡或有福盡非是命盡或有福命俱盡皆為命盡死也福謂財物等二外緣死謂不順天命以喪其身故名外緣死如非分自𡧱或橫遭他人所𡧱或二人怒氣相加自他俱死皆為外緣死也二種布施出大智度論一淨施謂布施時不求世間名譽福利等報但為出世善根及資助涅槃之因以清淨心而行布施故名淨施梵語涅槃華言滅度二不淨施謂以妄心求於福報而行布施如般若經云或畏失財故施與或恐訶罵故施與或為求勢故施與如是種種因緣與淨相違是名不淨施二種法施出般若經一世間法施謂菩薩雖為諸有情宣說開示五神通等一切諸法然未能出離世間故名世間法施五神通者一足不履地二知人心命三回眼千里四呼名即至五石壁無碍也二出世間法施謂菩薩為諸有情宣說開示三解脫門等一切聖法依此而脩即得出離世間故名出世間法施三解脫門者一空解脫門二無相解脫門三無作解脫門也二種身行施出大智度論一生身行施謂菩薩以父母所生之身能以一切寶物及以身命布施心不恡惜是名生身行施二法身行施謂菩薩捨生身已得法身時能於十方世界以種種珍寶衣服飲食給施一切眾生又能一時之頃隨眾生音聲普為說法是名法身行施二種施出法界次第一財施財施者謂以飲食衣服田宅珍寶等一切自己所有資身之具悉能施與它人也金光明㝡勝王經云財施之福不出三界唯伏貪愛但濟一世之貧而不能令其得道譬如燈光止明一室是也三界者欲界色界無色界也二法施法施者謂從諸佛及善知識或從經卷聞說世間出世間善法以清淨心為人演說也金光明㝡勝王經云法施兼利自他能令眾生出於三界斷諸煩惱成就慧身譬如日光徧照大千世界是也世間法者即五戒十善及治世之法也出世間法者即三乘所脩四諦六度等法也二戒出華嚴孔目一性戒謂殺盜邪滛妄語此四性自是戒不待佛制人若持之即得福犯之即得罪是名性戒二遮戒遮即遮止謂飲酒多有過失能犯諸戒是故佛特遮止令不毀犯乃能守護餘之律儀是名遮戒二戒出毘婆沙論一道共戒謂於見道脩道位中不作意持自然不犯戒與道俱發是名道共戒此戒既是初果二果三果所得即是無漏戒也見道即初果脩道即二果三果也無漏者不漏落三界生死也二定共戒謂發得初禪二禪三禪四禪天定之時不作意持自然不犯戒與定俱發是名定共戒此戒斷惑未盡未出生死即是有漏戒也二戒出華嚴經䟽一隨相戒隨即隨順相即形相謂依如來教染衣出家乞食自活不犯威儀是名隨相戒二離相戒離即遠離謂持戒之人心無所著則一切戒猶如虛空了無持犯之相是名離相戒二戒出涅槃經一性重戒謂殺盜妄皆性業也不待佛制持而不犯性自是善犯而不持性自是罪若犯之者其罪極重是名性重戒二息世譏嫌戒謂佛所制出家之人凡世間治生產業及一切非道所宜之事皆不應為以止世人之所譏誚嫌疑是名息世譏嫌戒二戒出涅槃經一威儀戒威儀戒者謂受戒已惟務脩飾容止誑惑於世盖由好求名利欲人恭敬者也二從戒戒從戒戒者謂崸從佛制清淨三業盖其內外相稱不為世事但求真實利益不要虛譽者也三業者身業口業意業也出家二戒出天台四教儀集註一十戒謂一不殺二不盜三不四不妄語五不飲酒六不坐高廣大牀七不著花鬘衣八不觀聽歌舞九手不捉金銀財寶十不過中食此十戒是初出家沙彌所持是為出家十戒梵語沙彌華言息慈息世染之情慈濟羣生也二具足戒具足戒者即二百五十戒也謂波羅夷法凡四條梵語波羅夷華言極惡僧伽婆尸沙法凡一十三條梵語僧伽婆尸沙華言僧殘謂犯此戒如人被他斫殘命雖未盡形已殘廢故也不定法凡二條謂比丘犯非法語或以波羅夷法治之或以僧伽婆尸法治之或以波逸提法治之故名不定也尼薩𦒿波逸提法凡三十條梵語尼薩耆華言捨謂因財物等犯貪慢心令捨入僧眾故梵語波逸提華言墮謂不捨當墮地獄也波逸提法凡九十條波羅提提舍尼法凡四條梵語波羅提提舍尼華言向彼悔僧祇律云此罪應對眾發露故名向彼悔眾學戒法凡一百條此等戒法令比丘眾皆學故名眾學也滅諍法凡七條謂有諍事起即應除滅故名滅諍法此二百五十戒是出家比丘所持是名出家具足戒梵語比丘華言乞士在家二戒出毘婆沙論一五戒謂不殺生不偷盜不邪不妄語不飲酒此五戒是在家之人所持故名在家五戒二八戒謂五戒之後更加不坐高廣大床不著花鬘瓔珞不習歌舞戲樂此八戒亦是在家之人所持故名在家八戒邪正二戒出天台四教儀集註一邪戒謂外道之人執邪為道非因計因自計前世因從鷄中來便即獨立行於苦行或計因從狗中來便即噉食糞穢行於苦行是名邪戒二正戒謂佛未出世時輪王亦教人行於不殺不盜等十善即此十善戒法是名正戒十善者不殺生不偷盜不邪不妄語不兩舌不惡口不綺語不貪欲不瞋恚不邪見也二持出華嚴經䟽一止持止即制止謂止身口令不殺不盜不邪不妄語等是名止持二作持作猶行也謂既不殺生又能放生既不偷盜又能布施既不邪又能恭敬既不妄語又能實語是名作持二種精進出法界次第一身精進謂身勤脩善法晝夜行道禮誦講說勸助開化是名身精進勸助者獎勸贊助也開化者說法開導化度於人也二心精進謂心勤行善道心心相續無有間歇是名心精進二種精進心出法華懺儀謂行人熏脩懺法即當剋取限期破諸惑障如脩法華三昧以三七日為期於中禮佛懺悔行道誦經有事有理俱當精進故有二種心也梵語三昧華言正定三七日二十一日也一事中脩忍精進謂行人於道塲三七日中行儀純𬾨當禮佛時一心𧆛𢢽觀想金容端嚴殊妙儼然在目心不異緣乃至懺悔行道誦經坐禪悉皆一心令與行法相應無有懈怠是名事中脩一心精進二理中脩一心精進謂行人初入道塲乃至三七日滿於其中間所作行儀常當照了一心寂靜如禮佛時即知能禮所禮本𪫬空寂雖曰空寂而自然感應道交不可思議盖由理體平等生佛不二雖無能禮之人而有我身禮諸佛前雖無所禮之佛而有諸佛隨心顯現如是念念無有懈怠是名理中脩一心精進生佛者眾生諸佛也二種忍辱出大智度論一非眾生數忍辱謂菩薩若遇風寒冷熱水雨等無情之物惱𡧱之時安然忍受初不瞋恚是名非眾生數忍辱二眾生數忍辱謂菩薩若遇有情眾生加惡於我亦能忍受略不瞋恨是名眾生數忍辱二種分別真偽禪相出脩習止觀坐禪法要一辨邪偽禪發相謂脩禪之人於禪定中或覺自身如縛如壓或時身輕欲飛或歡喜躁動憂愁悲思如是種種邪偽之相與禪俱發心若愛著即與鬼法相應多失心顛狂是故脩禪定者於此諸相即當一心寂靜辨其邪偽知彼虛誑不愛不著則自然滅謝是為辨邪偽禪發相二辨真正禪發相謂脩禪之人於禪定中端心正念離諸昬散但覺身心安隱泯然虛豁空明清淨寂靜無為而與正定相應如前所說一切邪偽之相了無所見是為辨真正禪發相二種寂靜出釋氏要覽一身寂靜謂捨家恩愛及眾緣務閑居靜處遠離憒閙身諸惡行一切不作是名身寂靜二心寂靜謂於貪瞋癡等悉皆遠離脩習禪定無有散亂意諸惡行一切不作是名心寂靜二種願出大智度論一可得願謂脩福可得人天中生脩戒定慧可得阿羅漢乃至佛果是名可得願梵語阿羅漢華言無學二不可得願謂人以己智力而欲籌量虛空盡其邊際終不可得是名不可得願二種脩行出涅槃經一真實脩行謂依佛所說能知涅槃佛性等相而脩諸行是名真實脩行梵語涅槃華言滅度二不實脩行謂不知涅槃佛性等相而脩諸行是名不實脩行二因緣發起正見出大智度論一外聞正法謂眾生雖具正念必從智人聞說正法然後正見始得開發譬如穀麥內具種子外滋雨澤然後其芽始得生起是故若欲正見開明必湏外聞正法二內有正念謂眾生雖聞正法發起正見實由內心正念本具譬如洪鍾雖待人扣聲非外有是故若欲正見開發必湏內有正念二種心出地持經一安隱心謂菩薩為諸眾生造諸惑業而受生死逼迫之苦沉溺惡道即為種種開示除不善法置之善處令彼之心各獲安隱也二快樂心謂菩薩為諸眾生貧乏困苦無所依怙即起大慈之心利濟攝受平等饒益令彼之心各得快樂也意業有二種心出大乘理趣六波羅蜜經意業者意根所起之業也謂脩行之人於布施持戒忍辱禪定智慧等五度非精進力不能成就身口意三善業亦由精進力方得發生然三業之中意業㝡勝故有二種心也一精進心謂發菩提心脩習善業晝夜禪誦不令放捨遠離一切懈怠心也二退轉心謂於諸善法不能進脩或暫時發心脩行輙生退屈則不能到於涅槃彼岸也二種懺悔出補助儀并天台四教儀梵語懺摩華言悔過華梵兼舉故名懺悔又懺名脩來悔名改往謂脩未來之善果改已往之惡因也一事懺悔事即事儀謂身則禮拜瞻敬口則稱唱讚誦意則存想聖容三業殷勤求哀懺悔過去見在所作罪業一依事儀是名事懺悔二理懺悔理即理性謂過現所作一切罪業皆從心起若了自心本性空寂則一切罪相亦皆空寂是名理懺悔二種白法出華嚴經隨䟽演義鈔白法者白淨之法也地獄等法名為黑法人天等法名為白法光明文句云白法湏尚黑法湏捨是也一慚白法謂內自羞慙不敢作惡脩習善法止息惡行是名慚白法二愧白法謂內自惶愧發露罪瑕更不敢作脩習善法止息惡行是名愧白法二種勸請出大智度論一佛初成道勸請轉法輪謂佛初成道時菩薩勸請言我某甲請佛世尊為眾生轉法輪度脫一切是名勸請轉法輪某甲者稱自己名也二佛欲入滅勸請住世謂佛欲捨壽命入涅槃時菩薩勸請言我某甲請佛世尊久住世間無央數刦度脫一切眾生是名勸請住世刦梵語具云刦波華言分別時節二種資糧出寶積經資即資助糧即糧食如人欲涉遠道必假糧食以為資助盖譬菩薩脩行欲證佛果必藉福智二法以為資助故名資粮也一福德資粮謂布施持戒等所作善因乃至具足脩習一切佛法是名福德資糧二智德資粮謂脩習正觀心無雜亂勤求妙智無暫休息乃至具足脩習一切佛法是名智德資粮二種供養出普賢行願品一財供養經云所有十方一切佛𠛴極微塵數中一一各有一切世界極微塵數佛一一佛所各有菩薩海會圍繞我以普賢行願力故悉以上妙諸供養具而為供養所謂華鬘音樂傘盖衣服及燒種種香然種種燈一一如湏彌山以如是等諸供養具常為供養是名財供養梵語湏彌華言妙高二法供養經云諸供養中法供養㝡所謂如說脩行供養利益眾生供養攝受眾生供養代眾生苦供養勤脩善根供養不捨菩薩業供養不離菩提心供養以前財供養無量功德比今供養一念功德百分不及一是名法供養利益眾生攝受眾生名法供養者必因說法方能利益攝受即是以法供養如來也代眾生苦名法供養者因發大悲之心方能代眾生苦亦是以法供養如來也勤脩善根即是勤修善法也菩薩業者即菩薩所脩之法也二善出大智度論一未生善謂戒定慧等諸善之法未曾脩習是名未生善善若未生當勤脩習令其得生也二已生善謂戒定慧等諸善之法已曾脩習名已生善善若已生當勤脩習令其增長也二種福田出大智度論論云施主有二種一者貧二者富皆能於三寶中種福故名二種福田三寶者佛寶法寶僧寶也一貧福田謂貧窮之人雖無財物供養若能禮事恭敬亦得福報是名貧福田二富福田謂富貴之人既能禮事恭敬又以財物供養而得福報是名富福田二種福田出大方便佛報恩經田以生長為義謂人於應供養者而供養之則能獲諸福報如農服力田畒而有秋成之利故名福田一有作福田謂於諸佛菩薩父母師長之所生恭敬心脩諸供養不惟得福亦可成道若有冀望福報之心乃是有為而作故名有作福田二無作福田謂於諸佛菩薩父母師長之所生恭敬心脩諸供養不惟得福亦可成道若無冀望福報之心乃是無為而作故名無作福田二利出金剛般若經取著不壞假名論一自利謂於如來所說經典自能受持讀誦聽聞思惟如理脩習成就勝果是名自利二利他謂能以己所受之法展轉為人演說令其脩習斷惑證果是名利他二種闡提出楞伽經闡提梵語具云一闡提華言信不具亦云極惡一捨一切善根一闡提捨善根者楞伽經云謂謗菩薩藏及作惡言不肯隨順經律之法是名捨一切善根一闡提菩薩藏者藏即含藏也謂諸大乘經典含藏一切文理是菩薩所脩所證之法故名菩薩藏二於無始眾生發願一闡提謂世間眾生窮刦有之無有初始故名無始眾生菩薩發願度諸眾生以本願力現為闡提故楞伽經云菩薩以本願方便不般涅槃是名於無始眾生發願一闡提二種見出大智度論此二種見即十使中之邊見也外道之人於身見上計我斷常執常非斷執斷非常隨執一邊故名邊見十使者一身見二邊見三邪見四見取五戒取六貪七瞋八癡九慢十疑也一常見論云見五眾常即外道自謂色受想行識今世雖滅未來復生相續不斷是名常見五眾者即色受想行識五陰也二斷見論云見五眾滅即外道自謂色受想行識今世滅已更不再生是名斷見鬼二生出俱舍釋論一鬼胎生論云女餓鬼白目連云我夜生五子晝時亦生五子生已皆食盡如此我無飽此鬼即是胎生也二鬼化生謂不從胎𡖉等生但無而忽有變現不測此鬼即為化生也二罪出圓覺經畧䟽鈔一性罪性罪者即殺盜妄四種重戒不待佛制性是惡故犯之則有罪報也二遮罪遮罪者即酒戒也謂佛制此酒戒意為遮止無犯守護餘戒使不故犯如有犯者則獲遮制之罪也二吉羅出翻譯名義梵語具云突吉羅華言惡作惡說一身惡作謂身行殺盜邪等惡是名身惡作二口惡說謂口出妄言綺語兩舌惡口等是名口惡說二惡出大智度論一已生惡謂貪瞋癡及殺盜等諸惡之法已起於心已見於事者是名已生惡惡若已生速令除滅也二未生惡謂貪瞋癡及殺盜等諸惡之法於心未起於事未見是名未生惡惡若未起防令不生也二種惡事出大智度論一眾生惡事謂諸眾生貪欲瞋恚愚癡不依父母師長教誨造種種惡是名眾生惡事二土地惡事謂土地之中或有饑荒疾疫毒氣流行無處不有是名土地惡事二煩惱出瑜伽師地論一根本煩惱根本煩惱者即無明惑也謂此根本無明之惑能出生一切煩惱也二隨煩惱隨煩惱者即見思二惑也謂此見思二惑隨於一切違順境上起貪瞋癡等煩惱隨逐不捨也二煩惱出大智度論一內著煩惱謂身見邊見等諸煩惱於內心不了而起執著故名內著煩惱身見者謂眾生妄執色受想行識之五陰為自身也邊見者妄於身見中或執為斷或執為常各執一邊名邊見也二外著煩惱謂貪瞋癡等煩惱於外境不了而起貪著故名外著煩惱二煩惱出華嚴經䟽一隨眠煩惱依附不捨曰隨五情暗𡨋曰眠謂無明煩惱種子潛伏第八藏識之中能生一切妄惑是名隨眠煩惱也五情者即眼耳鼻舌身五根也二現行煩惱謂六根對六塵境現起貪瞋癡等煩惱是名現行煩惱也六根者眼根耳根鼻根舌根身根意根也六塵者色塵聲塵香塵味塵觸塵法塵也二惑出釋籤一理惑謂根本無明之惑能障覆中道之理不能顯發是名理惑二事惑謂塵沙惑能障化導則覆俗諦之法見思惑能阻空寂則覆真諦之法是名事惑二惑出華嚴經隨䟽演義鈔一現行惑謂六根對六塵現起貪瞋癡等煩惱令心昬迷障諸善法是名現行惑六根者眼根耳根鼻根舌根身根意根也六塵者色塵聲塵香塵味塵觸塵法塵也二種子惑種子者即根本無明也謂因此無明則能生一切煩惱障諸善法是名種子惑見思二惑出天台四教儀集註惑迷惑也謂諸眾生於一切法不了自性本空妄生執著惑於正道流轉生死故名惑也又名二縛由此惑業纏縛住著三界不能脫離也又名二結結即縛之義也三界者欲界色界無色界也一見惑分別曰見謂意根對法塵非理籌度起諸邪見如外道計斷計常乃至有無等見是名見惑二思惑貪愛曰思謂眼耳鼻舌身五根對於色聲香味觸五塵貪愛染著迷而不覺是名思惑客塵二義出楞嚴經一客義謂見思等惑皆由眾生不了外塵之境種種妄想而生若以智慧觀察惑體本空則法性理顯惑亦何有經云不住名客是名客義二塵義謂微細之惑而能染汙清淨真性譬如牖隙光流諸塵相現亦能亂於虛空之性若智慧發明了惑本無則空理現前塵亦何有經云澄寂名空搖動名塵是名塵義二障出圓覺畧䟽一理障謂本覺心源湛然清淨由無明妄染礙正知見不達真如之理是名理障二事障謂眾生由無明障覆生死相續無由脫離是名事障二障出楞嚴經義海并宗鏡錄一煩惱障謂昬煩之法惱亂心神不能顯發妙明真性是名煩惱障二所知障所知障亦名智障謂執所證之法障蔽智慧之性是名所知障二障出天親論障即障礙如金剛經中湏菩提得無諍三昧盖由離此二障故也梵語湏菩提華言空生一煩惱障煩惱即見思惑也謂湏菩提證得第四阿羅漢果時見思二惑俱已斷盡心空寂靜諍從何起是故得於無諍實由離此煩惱障也梵語阿羅漢華言無學二三昧障梵語三昧華言正定即無諍三昧也謂湏菩提證得第四果時既得無諍三昧若於此三昧心有取著即為有諍是故得於無諍實由離此三昧障也二業出俱舍論一引業謂若宿世善業引發生於人中則得珍寶豐足多受快樂若由宿世惡業引發生於人中則感貧窮困乏受諸苦惱是名引業二滿業謂由宿世脩一善業感一生中大富多財乘此更脩眾善展轉生官貴家乃至圓滿究竟善果是名滿業若由宿世造一惡業感一生貧窮苦惱乘此更造眾惡展轉生貧窮家乃至圓滿極惡之果是名滿業輕重二業出涅槃經經云或有重業可得作輕或有輕業可得作重以人有智有愚故也一重業輕受重業輕受者謂有智之人以智慧力脩習梵行能令地獄重業現世輕受也二輕業重受輕業重受者謂愚癡之人以愚癡故增其業力能令現世輕業地獄重受也二礙亦名二障出宗鏡錄并演義鈔一煩惱礙謂見思二惑起種種昏煩之法惱亂心神以致障礙無漏法性是名煩惱礙二智礙即所知障謂由根本無明之惑覆蔽法性而於中道種智則成障礙故名智礙束蘆二義出宗鏡錄一互相依謂如束蘆互相依倚以譬六根六塵更相由藉而成染惑也以由根依塵故而發妄知塵依根故而有幻相是名互相依六根者眼根耳根鼻根舌根身根意根也六塵者色塵聲塵香塵味塵觸塵法塵也二取中空謂取蘆葦中本空虛自性不實以譬根塵中間各無自性一切皆空是名取中空二慳出地持經一財慳謂悋惜財物無憐愍心見諸貧窮困乏不能惠施是名財慳二法慳謂慳惜佛法懷妬嫉心恐他勝己不肯教導餘人是名法慳二愛出大智度論一欲愛謂眾生愛念妻子及貪染五欲等是名欲愛五欲者以色聲香味觸五塵能起人貪欲之心也二法愛謂菩薩以平等心而生法喜欲令一切眾生皆至佛道是名法愛二種邪見出中論一破世間樂邪見謂人若言無罪福報亦無如來等賢聖因起此邪見捨善為惡當墮苦趣失人天樂是名破世間樂邪見二破涅槃道邪見梵語涅槃華言滅度謂人貪著於我分別有無起善滅惡因起善故得世間之樂因分別有無故不得涅槃道是名破涅槃道邪見二種妄見出楞嚴經一別業妄見謂諸眾生迷失真性自起妄見見有一切虛妄境界或苦或樂若人不失本真即不見有虛妄境界譬如一人病目夜見燈光別有圓影五色重疊不病目者即不見燈別有圓影是名別業妄見二同分妄見謂諸眾生迷失真性同見一切虛妄境界同受苦樂同業所感譬如一國之人同見瘴惡不祥之事是名同分妄見二種無知出天台四教儀集註一染汙無知染汙無知者即見思惑也以無明為體謂見思惑能染汙真性無所明了也二不染汙無知不染汙無知者即塵沙惑也以劣慧為體謂此惑是他人分上見思之惑種數多故如塵若沙名為塵沙既是他人之惑不能染汙我之真性菩薩智慧廣大能令他人斷見思惑於菩薩分上即是斷塵沙惑二乘之人智慧狹劣不能令他斷見思惑是名不染汙無知二乘者聲聞乘緣覺乘也二種顛倒出楞嚴經一眾生顛倒謂眾生不明自性逐妄迷真隨順妄惑而造妄業由此妄業展轉相生輪轉三界不能返妄歸真故名眾生顛倒二世界顛倒世謂過去現在未來遷流為世界謂東西南北四方分位為界以世涉方故名世界顛倒者眾生迷失真性念念遷流住妄境界起諸倒見故名世界顛倒二貧出大智度論一財貧謂其先世不能布施不作眾善之福是故現世乏於資生種種財物是名財貧二法貧謂眾生起諸邪見不信正法不脩善行則無功德之財資於智慧之命是名法貧二緣出楞伽經一外緣謂眾生所依世界皆由妄想因緣而生譬如因泥團柱輪繩水等諸方便緣而有瓶生是名外緣泥團柱輪繩水者謂世之陶匠作瓶以泥團為坯以木為輪柱以繩轉輪以水旋之方能成瓶也二內緣謂眾生之身因無明愛業等緣出生陰界入法是名內緣無明者無所明了也愛者於五陰之境而起貪愛以為惑也業者由心不了遂動身口而作以為業也陰即五陰謂色陰受陰想陰行陰識陰也界即十八界謂眼界色界眼識界耳界聲界耳識界鼻界香界鼻識界舌界味界舌識界身界觸界身識界意界法界意識界也入即十二入謂眼入耳入鼻入舌入身入意入色入聲入香入味入觸入法入也二種有漏因果出大涅槃經一有漏因漏即漏落生死也因者對果而言謂眾生由煩惱結業為因而招三界生死苦果是則煩惱結業名有漏因即集諦也三界者欲界色界無色界也二有漏果果即果報之義謂眾生由有漏惑業為因而感生死之果名有漏果即苦諦也二殺出梵網經一故殺故殺者謂作意故傷物命也二悞殺悞殺者謂不作意悞傷物命也二殺出梵網經一自殺謂無慈悲之心於諸物命輙自殺𡧱是名自殺二教他殺謂無慈悲之心既自殺生亦教他人殺生是名教他殺二報出華嚴經䟽一依報依報亦名依果即世界國土也謂諸眾生各各隨其果報之身依之而住故名依報二正報正報亦名正果即五陰之身也謂諸眾生隨其所作善惡之業各各感得此身正受其報故名正報五陰者色陰受陰想陰行陰識陰也二種殺生報出法苑珠林一短命短命者謂因前世傷𡧱物命令其不得以盡天年故感今生自身亦短命也二多病多病者謂因前世惱𡧱眾生令其不得自在故感今生自身亦多疾病也二種偷盜報出法苑珠林一貧窮貧窮者謂因前世盜他財物令彼空乏故感今生自亦貧窮也二不得自在不得自在者謂因前世劫奪他財而令他人不得自在故感今生雖有財物而屬五家不得自在受用也五家者水火盜賊惡子宮家也二種報出法苑珠林一婦不貞潔婦不貞潔者謂因前世犯他妻妾邪行穢汙故感今生婦不貞良端潔也二得不順意眷屬得不順意眷屬者謂因前世邪奪人所寵令不如意故感今生眷屬常不順意也二種妄語報出法苑珠林一多被誹謗多被誹謗者謂因前世不務誠實妄語無信故感今生多被他人誹謗也二為人所誑為人所誑者謂因前世專以妄語欺誑於人故感今生為人之所誑惑也二種兩舌報出法苑珠林謂向彼說此向此說彼闘構是非離間和合致令乖分故名兩舌一得弊惡眷屬得弊惡眷屬者謂因前世兩舌使人朋儔分離乖間皆生怨惡故感今生得弊惡眷屬也二得不和眷屬得不和眷屬者謂因前世兩舌離間人之親愛使不和合故感今生得不和眷屬也二種惡罵報出法苑珠林一常聞惡音常聞惡音者謂因前世口無禁忌發言麤惡令不忍聞故感今生常聞穢惡之音也二恒有諍訟恒有諍訟者謂因前世恃力怙勢好諍徤訟惡逆無德故感今生常致諍訟而不和也二種邪見報出法苑珠林一生邪見家生邪見家者謂因前世邪僻覆心起諸妄見故感今世不具正信之心而生邪見之家也二其心諂曲其心諂曲者謂因前世邪見心不正直故感今生心常諂曲也二種無義語報出法苑珠林一人不信受人不信受者謂因前世語言無義即是虛妄故感今生雖有言說人亦不信受也二不能明了不能明了者謂因前世語言無義皆因暗昧故感今生有所言說而亦不明了也二種貪報出法苑珠林一多欲多欲者謂因前世縱恣貪欲心無止息故感今生業習不忘倍復增勝而生貪著也二無厭無厭者謂因前世貪求不已展轉馳逐故感今生業習不忘欲心轉盛用之無度求之無厭也二種瞋報出法苑珠林一常為他人求其長短常為他人求其長短者謂因前世不能容物稍不如意即興嗔恨故感今生被人伺求長短動輙得咎也二常為眾人之所惱𡧱常為眾人之所惱𡧱者謂因前世瞋惱眾人令不安隱故感今生常被多人之所惱害也世界二義出楞嚴經一世遷流義世遷流者謂過去現在未來三世遷流也只如昨日是過去今日是現在明日是未來如此遷移流動無有間歇也二界方位義界方位者謂東西南北東南西南東北西北上下十方各有定位不相混亂也二世間出翻譯名義世即隔別之義間即間差之義故名世間一眾生世間謂一切有情眾生皆假五陰和合眾共而生名為眾生又復各各差別不同故名眾生世間五陰者色陰受陰想陰行陰識陰也二器世間謂一切無情世界皆假山河大地而成有側有仰名之為器又復各各差別不同故名器世間二種世間清淨出無量壽經論論云若人一心專念阿彌陀佛畢竟得生安樂國土成就種種功德莊嚴獲此二種世間清淨梵語阿彌陀華言無量壽一器世間清淨謂世界如噐隔別名世間差名間故名噐世間謂彼安養國土廣大無邊如太虛空清淨光明如日月輪具足寶莊嚴是名噐世間清淨二眾生世間清淨謂所化眾生隔別間差故名眾生世間謂彼阿彌陀佛於一佛土身不動搖於一切時放大光明悉能遍至十方世界教化眾生令其如實脩行離諸染著皆願徃生我國是名眾生世間清淨二土出宗鏡錄一性土謂法性之理非穢非淨非廣非狹猶如虛空遍一切處是名性土二相土謂隨諸眾生心量所現或淨或穢或廣或狹是以菩薩所見無諸坑坎眾寶莊嚴眾生所見荊𣗥瓦礫穢惡充滿是名相土二土出華嚴經隨䟽演義鈔一淨土謂其地純以金剛所成眾寶間錯種種莊嚴皆悉殊勝即華藏世界西方安養等世界也以其無有四趣五濁等穢惡是名淨土四趣者脩羅趣餓鬼趣畜生趣地獄趣也五濁者刼濁見濁煩惱濁眾生濁命濁也二穢土謂其地坑坎堆𢍀穢惡充滿即娑婆世界也以其有四趣五濁等穢惡是名穢土梵語娑婆華言能忍謂其土之人堪能忍受眾苦也二種流出涅槃經一順流流即生死流也盖六道眾生順從生死之流唯務趣下而不知返所謂順生死流逆涅槃道也六道者天道人道阿脩羅道餓鬼道畜生道地獄道也二逆流謂初果湏陀洹依戒定慧精勤脩習則能斷三界見惑出離四趣生死而證真空涅槃所謂逆生死流順涅槃道也梵語湏陀洹華言逆流亦曰入流三界者欲界色界無色界也四趣者脩羅趣餓鬼趣畜生趣地獄趣也二身出唯識論一分叚身分即分限叚即形叚謂三界內六道眾生所受之身支形分段長短臣細各各不同是名分段身三界者欲界色界無色界也六道者天道人道阿脩羅道餓鬼道畜生道地獄道也二變易身變即轉變易即改易謂二乘等雖出三界尚受方便等土法性之身因移果易是名變易身二乘者聲聞乘緣覺乘也二種色出宗鏡錄一內色內色者謂眼識乃至意識是名內色又眼耳鼻舌身意名內色以其屬內身故二外色外色者謂眼根乃至身根是名外色又色聲香味觸五塵名外色以其屬外境故二種色出大智度論一淨色謂清淨美妙之色能生貪欲損壞道業故脩道之人宜當遠離也二不淨色謂不淨醜惡之色能生憎惡障蔽道業故脩道之人亦宜遠離也二種色出宗鏡錄一顯色謂青黃赤白光影明暗雲煙塵霧等顯然可見是名顯色二形色謂長短方圓麤細高下正不正等形相可見是名形色二食出天台四教儀集註一正命食謂出家之人常乞食自資色身清淨活命是名正命食二邪命食謂出家之人不依正命而食則有五種一為利養故現奇特相二為利養故自說功德三卜相吉㐫為人說法四高聲現威令人畏敬五說所得供養以動人心是名邪命食二種存濟出阿毘達磨論存即存活濟即救濟謂以飲食存濟其生也一有罪存濟謂有一等之人矯妄詭詐而求飲食如是得飲食已歡喜受用貪愛不捨不見生死過患不知出離之法是名有罪存濟二無罪存濟謂非如前人矯妄詭詐而求飲食但以正道而乞飲食得飲食已如法受用不貪不愛不著能見生死過患善知出離之法是名無罪存濟二求出成實論一得求謂諸眾生欲得諸樂隨意求取雖經險難不以為苦如海吞流心無厭足是名得求二命求謂諸眾生取樂生愛不能如實觀察樂是苦因反求長命受此諸樂是名命求二種數出華嚴經䟽一數量數數量數者即一多之數量也謂由一多之數而能安立一切諸法也二色心有為數色即色身心即所起之心皆有生滅名曰有為此色心二法別而言之則有五陰十二入十八界等數目不同故名色心有為數五陰者色陰受陰想陰行陰識陰也十二入者眼入耳入鼻入舌入身入意入色入聲入香入味入觸入法入也十八界者眼界色界眼識界耳界聲界耳識界鼻界香界鼻識界舌界味界舌識界身界觸界身識界意界法界意識界也二種滅出顯揚聖教論一暫時滅謂如來出世逗機設教化導眾生大小乘人皆得解脫機緣既盡更無可化如來即便入滅然如來法身之體如如不動實未甞滅是名暫時滅二究竟滅謂如來妙覺圓明一切煩惱悉已斷滅淨盡無餘更不復生是名究竟滅二邊出攝大乘論釋一增益邊謂因緣所生之法若分別推求本無自性眾生不了執之為有是名增益邊因緣所生法者謂六根為因六塵為緣根塵相對中間一念心起即是所生法也二減邊謂因緣所生之法若分別定無即是減實有成就之性是名減邊二邊出中論一有邊邊即邊際謂世間一切事物必假眾緣具足和合而生皆無自性雖無自性不得言無故名有邊二無邊謂世間一切事物既假眾緣具足和合而生本無自性若無自性則一切法皆空不得言有故名無邊二時出大智度論一迦羅時梵語迦羅華言實時謂佛於律中誡諸弟子聽時食遮非時食實有其時故名實時論云毗尼結戒是世界中實非第一義中實是也梵語毘尼華言善治二三摩耶時梵語三摩耶華言假時亦名短時長時論中廣約三世無相時法無實故名假時亦名短時長時者謂不同外道定執盖是假設長短而無其實故若短若長悉名三摩耶三世者過去未來現在也
