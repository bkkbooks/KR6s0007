body:
  text: 上天竺前住持沙門一如等奉勑集注三佛身出宗鏡録一自性身謂諸如來具無邊際真常功德是一切法平等實性即此自性亦名法身是名自性身二受用身受用身有二種一者自受用身謂諸如來修習無量福慧所起無邊真實功德恆自受用廣大法樂也二者他受用身謂諸如來由平等智示現微妙淨功德身居純淨土為住十地諸菩薩衆現大神通轉正法輪令彼受用大乘法樂也十地者歡喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也三變化身謂諸如來以不思議神力變現無量隨類化身居淨穢土為未登地諸菩薩衆及二乘等稱其機宜現通説法令其各得諸利樂事是名變化身二乘者聲聞乘緣覺乘也三身出金光明經玄義身即聚集之義謂聚集諸法而成身也所謂理法聚名法身智法聚名報身功德法聚名應身理法聚名法身者謂聚集法性之法而成此身也智法聚名報身者智即能契法性之智智與法性相合而成此身也功德法聚名應身者由智契理聚集一切功德之法起用化他隨機應現而成此身也一法身謂始從初住顯出法性之理乃至妙覺極果理聚方圓是名法身初住者即十住位中初之一住也妙覺者自覺覺他覺行圓滿不可思議故名妙覺理聚方圓者妙覺所證法性之理方始圓滿也二報身謂始從初住終至妙覺極果智聚方圓由智契理報得此身故云報身三應身謂始從初住終至妙覺極果功德法聚方圓故能隨機應現説種種法度諸衆生故名應身三身遍相出華嚴經隨疏演義鈔一法身如虛空遍謂法性之身本體周遍如太虛空無有障礙諸佛衆生平等具足故名法身如虛空遍二智身如日光遍智身即自報之身也謂究竟始覺之智能遍破無明之暗顯發本有真身譬如日光無幽不燭故名智身如日光遍三色身如日影遍色身即應身也謂究竟始覺之智契於本覺法身之理則能從體起用遍應衆機譬如日光之影不擇高下隨處映現故名色身如日影遍三身華梵亦名三如來出法華文句一法身毗盧遮那如來法名可軌諸佛軌之而得成佛以法為身故名法身梵語毗盧遮那華言遍一切處以真如平等性相常然身土無礙故也如來者金剛經云無所從來亦無所去故名如來是也二報身盧舍那如來修因感報名之為報然有自報他報之別自報即理智如如他報即相好無盡是名報身梵語盧舍那華言淨滿謂諸惑淨盡衆德悉圓又云光明遍照謂內以智光照真法界即自報身也外以身光照應大機即他報身也如來者轉法輪論云第一義諦名如正覺名來是也第一義諦者謂中道之理無二無別也三應身釋迦牟尼如來智與體𡨋能起大用隨機普現説法利生故名應身梵語釋迦牟尼華言能仁寂默寂默故不住生死能仁故不住涅槃如來者成實論云乘如實道來成正覺是也智與體𡨋者謂自報之智與法身之體𡨋合也梵語涅槃華言滅度三身壽量出法華經文句一法身壽量法身者師軌法性還以法性為身此身非色質亦非心智強指法性為法身耳言壽量者此非報得命根亦非連持之壽強指不遷不變名之為壽此壽非長量亦非短量經云亦無在世及滅度者非實非虛非如非異等是也二報身壽量報身者以如如智契如如境以境發智以智照境境智𡨋合即是報身言壽量者境既無量無邊常住不滅智亦如是即此智慧名為壽命經云我智力如是久修業所得慧光照無量壽命無數劫是也如如者境如即如智智如即如境蓋言境智不二也三應身壽量應身者應同萬物為身也言壽量者應同連持為壽應同長短為量也智與體𡨋能起大用經云隨所應度處處自説名字不同年紀大小等是也佛化身三出觀佛三昧海經一大化身千丈大化身千丈者謂如來為應十地已前等諸菩薩演説妙法令其進修向於佛果故化現千丈之身也十地者歡喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也二小化身丈六小化身丈六者謂如來為應二乘凡夫之人説於四諦等法令其捨妄歸真而得開悟故化現丈六之身也二乘者聲聞乘緣覺乘也四諦者苦諦集諦滅諦道諦也三隨類不定隨類不定者謂如來誓願弘深慈悲普覆隨諸種類有感即應或現大身滿虛空中或現小身丈六八尺等也三覺出翻譯名義覺有三義謂自覺覺他覺行圓滿也唯妙覺果佛具足三覺故華嚴經云奇大導師自覺能覺他是也一自覺謂覺知過去未來現在三世一切諸法常無常等悟性真空了惑虛妄功成妙智道證圓覺故名自覺二覺他謂運無緣慈度諸衆生皆令離生死苦得涅槃樂故名覺他梵語涅槃華言滅度三覺行圓滿謂三惑淨盡衆德悉𬾨位登妙覺行滿果圓故名覺行圓滿三惑者見思惑塵沙惑無明惑也三種常出佛地論一本性常本性常者即法身也謂法身本性常住無生無滅也二不斷常不斷常者即報身也謂報身常依法身無間斷也三相續常相續常者即應身也亦名變化身謂應身於十方世界沒已復現化無窮盡也三種神變出大寶積經神即神通變即變化也一説法神變謂如來無礙大智知諸衆生善惡業因及善惡果報或以聲聞緣覺之法及以大乘之法而得解脫如是知已則現一切神變而為説法是名説法神變二教誡神變教即教誨誡即警誡謂如來教諸弟子是應作是不應作是應信是不應信是應親近是不應親近是法雜染是法清淨行如是道得聲聞乘行如是道得緣覺乘行如是道成就大乘現諸神變而為教誡是名教誡神變三神通神變謂如來為調伏憍慢衆生故或現一身而作多身或現多身而作一身山崖石壁出入無礙身上出火身下出水身下出火身上出水入地如水履水如地等現諸神變調伏衆生是名神通神變三佛土出華嚴經疏一法性土法性土者即法身如來所依之土乃理土也謂以本識如來藏身為所依持恆頓變現外諸器界則法性土通為諸土之體也器界者世界如器故也二受用土受用土者即報身如來受用之土也受用有二一者若以相應淨識所修自利行滿從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴是名自受用土二者若以大慈悲力所修化他行滿隨十地菩薩所宜變成淨土或大或小或勝或劣等是也十地者歡喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也三變化土變化土者即應身如來變化之土也謂佛以不思議神力隨諸衆生善惡之業變現淨穢之土方便設化是也佛行離地三意出華嚴經隨疏演義鈔并佛説處處經一地有蟲謂一切地上皆有諸蟲或伏或走佛以護生之心恐傷其命故行時足不至地鈔云世尊履地去地四指是也二地有生草謂一切地上有草依之生長佛欲全其生意故行時足不至地也三現神通力謂佛現神通之力飛行自在履空如地故行時足不至地也如來乞食三意出法集經一不貪味美惡均等謂如來乞食入諸聚落隨施所得不貪味若美若惡而無分別是名不貪味美惡均等二為破我慢貴賤同遊謂如來乞食為破我慢自高於富貴貧賤等家皆無揀擇是名破我慢貴賤同遊三慈悲平等大作利益謂如來無有飢渴羸瘦乏等苦為衆生故以平等慈悲現行乞食廣作利益是名慈悲平等大作利益佛三事入城出金剛經疏一為女人入城謂一切女人女子皆為父母及夫主所拘不得輒自出入思仰如來無由得見是故如來入城令彼女人皆得瞻敬觀佛三昧海經云若能暫見如來相好光明除六十劫生死之罪獲無量福未來生處必見彌勒梵語彌勒華言慈氏二為病人入城謂如來於病人所常興救濟之心令其離苦得樂是故入城乞食之時凡有病苦者因得瞻視令其病差發菩提心三欲令人見相好入城謂如來福慧莊嚴具足三十二相八十種好微妙難思人得瞻仰則罪滅福生是故入城令人普見三十二相者足安平相千輻輪相手指纖長相手足柔軟相手足綬網相足跟滿足相足趺高好相腨如鹿王相手過膝相馬陰藏相身縱廣相毛孔生青色相身毛上靡相身金色相身光面各一丈相皮膚細滑相七處平滿相兩腋滿相身如師子相身端直相肩圓滿相四十齒相齒白齊密相四牙白淨相頰車如師子相咽中津液得上味相廣長舌相梵音深遠相眼色如金精相眼睫如牛王相眉間白毫相頂肉髻成相也八十種好一指爪狹長二手足指圓三手足各等無差四手足圓滿五筋脈盤結六兩踝深隱七行步正直八行步威容齊整九行步安平十行步有儀十一回身𮨇視十二支節殊勝十三骨節交結十四膝輪圓滿十五隱處妙好十六身支潤滑十七身容敦肅十八身支堅固十九身支安定二十身相端嚴二十一身有圓光二十二腹形方正二十三臍深右旋二十四臍厚妙相二十五肌膚勻淨二十六手掌充滿二十七手文深長二十八唇色紅潤二十九面門圓滿三十舌相長廣三十一發聲威震三十二音韻美妙三十三鼻高修直三十四諸齒方整三十五諸牙明潔三十六目廣清淨三十七眼相修廣三十八眼睫齊整三十九雙眉修長四十雙眉綺靡四十一雙眉高朗四十二耳厚修長四十三兩耳相好四十四容儀端麗四十五額廣圓滿四十六身分殊勝四十七首髮修長四十八首髮香潔四十九首髮齊整五十首髮堅固五十一首髮光滑五十二身分堅實五十三身體莊嚴五十四諸竅清淨五十五身力充美五十六身相嚴好五十七面輪修廣五十八顏貌舒泰五十九面顏光澤六十身支嚴淨六十一毛孔出香六十二面門出香六十三首相妙好六十四身毛纖柔六十五法音圓辨六十六頂相高妙六十七指網分明六十八行不履地六十九神力自持七十威德遠震七十一音聲和雅七十二觀機説法七十三一音演説七十四次第説法七十五等觀有情七十六先觀後作七十七相好具足七十八頂骨堅實七十九顏容奇妙八十胸臆妙好佛三不能出景德傳燈録一不能免定業不能免定業者謂佛能空一切相斷一切衆生之惡而不能自免定業也定業者決定之業即木槍馬麥等報是也二不能度無緣不能度無緣者謂佛能化導一切衆生而不能度無緣之人也三不能盡生界不能盡生界者謂佛能度世間一切衆生而不能令衆生界盡也三種奇特事出過去現在因果經一神通奇特謂佛世尊妙應群機現大神變不可思議使一切衆生及諸邪魔外道咸歸正化是為神通奇特二慧心奇特謂佛之智慧心光湛寂照了一切諸法成就一切種智是為慧心奇特三攝受奇特謂佛善知衆生諸根利鈍隨機攝受開導教化令彼咸聞法要進修妙行出離生死是為攝受奇特佛三語出華嚴經隨疏演義鈔一隨自意語謂佛隨順自意説自所證一實等法故名隨自意語二隨他意語謂佛一向隨順他機之意説於方便之法導引衆生故名隨他意語三隨自他意語謂佛為衆生説法半隨自證之意半隨他機之意名隨自他意語三處不轉法輪一我慢高山謂外道之人多起邪見我慢貢高如山峻聳雖聞正法非惟不信復有謗法之過招其惡報是故不為轉法輪也二五欲淤泥謂諸凡夫貪著色聲香味觸五欲之境沉溺污穢如在淤泥自非身心清淨則不能受法是故不為轉法輪也三邪見稠林謂外道凡夫執種種見有如稠林茂密而於正法不能信受是故不為轉法輪也三輪出金光明經文句輪即車輪有摧碾之用以譬如來身業現通口業説法意業鑑機而能摧碾衆生煩惱惑業是故名為三輪也一身輪身輪亦名神通輪謂佛説法必先現神通警動衆生機情令生正信也二口輪口輪亦名正教輪謂佛所説之法無不為令衆生翻邪歸正依教修行也三意輪意輪亦名記心輪謂佛説法先以意輪鑑知衆生根器利鈍隨宜演説無有差謬也佛三密出大智度論密即祕密謂如來身口意三業或現通或説法或思惟皆非諸菩薩等之所思議故名三密一身密謂如來處大會中衆見佛身或黃金色或白銀色或雜寶色或長丈六或長一里十里乃至現大神變皆不可思議故名身密二語密語密即口密也謂佛説法之時或一里外聞佛音聲或十里或百千萬里外聞佛音聲又一會中或聞説布施或聞説持戒等各各隨心所聞皆不可思議故名語密三意密謂佛常處寂定凡所思惟觀察皆不可思議故名意密住持三寶出華嚴經隨疏演義鈔并三寶章一泥龕塑像為佛寶泥龕塑像者佛滅度後以泥木雕塑為像住世不絶是為佛寶也二黃卷赤軸為法寶黃卷赤軸者即今大藏經卷是也以其住世不滅是為法寶也三剃髮染衣為僧寶剃髮染衣者謂剃除髮著染色衣即世間之僧以能流通佛法是為僧寶也同體三寶出華嚴經隨疏演義鈔并三寶章謂佛法僧名雖有三體性是一故名同體三寶一佛寶佛梵語具云佛陀華言覺謂性體靈覺照了諸法非空非有是名佛寶二法寶法即軌持之義謂法性寂滅而恆沙性德皆可軌持是名法寶三僧寶僧梵語具云僧伽華言和合衆謂恆沙妙德性相不二理事和合是名僧寶別相三寶亦名別體三寶出釋氏要覽謂佛法僧各各相別不同故名別相三寶一佛寶謂佛初於菩提樹下成道但示丈六之身及説華嚴經時現為盧舍那尊特之身是為佛寶梵語菩提華言道梵語盧舍那華言淨滿二法寶謂五時所説大乘小乘經律論藏是為法寶五時者華嚴時鹿苑時方等時般若時法華涅槃時也三僧寶謂稟佛教法修因得果即聲聞緣覺菩薩是為僧寶聲聞因聞佛聲教而得悟道緣覺因觀十二因緣而得覺悟菩薩梵語菩提薩埵華言覺有情別相三寶出華嚴隨疏演義鈔并三寶章別相者謂三寶中名相各各不同故云別相三寶也一佛寶謂佛具十身名相差別不同故名佛別相也十身者菩提身願身化身力持身相好莊嚴身威勢身意生身福德身法身智身也二法寶謂佛説一大藏典具教法理法行法果法名相不同故名法別相也教即經教理即性理行即行業果即果位也三僧寶謂文殊普賢諸大菩薩乃至三賢十聖各各修證地位不同故名僧別相也三賢者十住十行十回向諸位菩薩也十聖者十地菩薩也大乘三寶出華嚴經疏鈔并三寶章三寶者謂佛法僧可尊可貴名之為寶一大乘佛寶佛梵語具云佛陀華言覺謂自覺覺他覺行圓滿具足三身十身能現無邊相好是名大乘佛寶三身者法身報身應身也十身者菩提身願身化身力持身相好莊嚴身威勢身意生身福德身法身智身也二大乘法寶法即軌則之義謂如來所説中道實相及人法二空之理乃至無量勝妙法門能令衆生軌則此法而成正覺是名大乘法寶三大乘僧寶梵語僧伽華言和合衆謂十住十行十回向十地等菩薩不著有無二邊而與中道之理和合是名大乘僧寶十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也十行者歡喜行饒益行無嗔恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也十回向者救一切衆生離衆生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切衆生回向真如相回向無縛解脫回向法界無量回向也十地者歡喜地離垢地發光地熖慧地難勝地現前地遠行地不動地善慧地法雲地也小乘三寶出華嚴三寶章一小乘佛寶謂如來隱其無量功德莊嚴之身示現丈六紫金之相以應聲聞緣覺人天等機是名小乘佛寶二小乘法寶謂阿含等經為聲聞説四諦教為緣覺説十二因緣教令其依之而修超凡入聖是名小乘法寶梵語阿含華言無比法四諦者苦諦集諦滅諦道諦也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三小乘僧寶謂依四諦十二因緣而修斷見思惑證真空理而成聲聞四果四向及緣覺之僧是名小乘僧寶見思惑者意根對法塵而起分別曰見惑眼耳鼻舌身貪愛色聲香味觸曰思惑四果者一須陀洹華言入流二斯陀含華言一來三阿那含華言不來四阿羅漢華言無生四向者一須陀洹向二斯陀含向三阿那含向四阿羅漢向向者謂未入此果而將向入也華嚴三聖出翻譯名義一毗盧遮那佛梵語毗盧遮那華言遍一切處謂煩惱體淨衆德悉𬾨身土相稱遍一切處能為色相所作依止具無邊際真實功德是一切法平等實性即此自性亦名法身佛梵語具云佛陀華言覺謂理性之體本來覺了也二普賢菩薩普賢者謂其居伏道之頂體性周遍曰普斷道之後鄰於極聖曰賢菩薩者梵語具云菩提薩埵華言覺有情謂覺悟一切有情衆生也伏道者伏即潛伏之義謂普賢能伏初起微細無明居等覺位在衆菩薩之首故云伏道之頂斷道者謂斷初起微細無明惑也鄰者近也極聖者佛也三文殊師利梵語文殊師利華言妙德謂明見佛性具足法身般若解脫三德不可思議故名妙德也三種大師出本事經一如來謂諸如來出現世間闡揚大法化諸衆生出離生死令得無量義利安樂是為衆生之師範也二阿羅漢梵語阿羅漢華言無學謂阿羅漢諸漏已盡梵行具足出現世間開示四諦令諸衆生脫離生死皆得無量義利安樂是為衆生之師範也四諦者苦諦集諦滅諦道諦也三有學弟子有學者煩惱未盡有法可學也謂初果須陀洹二果斯陀含三果阿那含精修梵行具足多聞於諸經典善知法義出現世間開示四諦令諸衆生出離生死皆得無量義利安樂是為衆生之師範也梵語須陀洹華言入流梵語斯陀含華言一來梵語阿那含華言不來三藏出翻譯名義三藏者謂經律論各各含藏一切文理故皆名藏一修多羅藏梵語修多羅華言契經契合也謂上契諸佛之理下契衆生之機故名契經也二毗奈耶藏梵語毗奈耶華言律又云善治謂能治衆生之惡如世法律則能斷決重輕之罪故名律也三阿毗達磨藏梵語阿毗達磨亦名阿毗曇華言論論者論議也瑜伽論云問答決擇諸法性相故名論也梵語瑜伽華言相應大乘三藏出華嚴經疏演義鈔藏即含藏之義也謂經律論三各含文理故名三藏一大乘經藏經法也常也謂華嚴等諸大乘經唯談法界中道之理詮示大乘菩薩修行證果之法是名大乘經藏二大乘律藏律即法也謂梵網等經唯制大乘菩薩所持之戒是名大乘律藏三大乘論藏論即論議謂起信等論唯決擇詮辨大乘菩薩修證之法是名大乘論藏小乘三藏出天台四教儀集注一小乘經藏謂阿含等經唯談真空寂滅之理詮示聲聞緣覺修行證果之法是名小乘經藏梵語阿含華言無比法二小乘律藏謂四分等律唯制小乘之人即聲聞緣覺所持之戒是名小乘律藏四分者一比丘法二比丘尼法三受戒法四滅諍法也三小乘論藏謂俱舍等論唯決擇詮辨小乘聲聞緣覺修證之法是名小乘論藏梵語俱舍華言藏謂有包含攝持之義也三如來藏出圓覺經略疏如來者即理性如來也因中説果故名如來藏者含藏之義謂含藏一切善惡法也的指其體即第八識名如來藏也第八識者藏識也一隱覆藏謂諸衆生本有真如法身之理在第八識中為無明煩惱之所隱覆而不能見故名隱覆藏二含攝藏謂第八識為染淨之所依止以能含藏一切善惡種子故名含攝藏三出生藏謂第八識為染淨之本遇緣熏習則能出生世間出世間有情無情等法故名出生藏三藏詮三學出四教義三藏經律論也三學戒定慧也三藏詮三學者詮具也謂三藏具説三學之事理也一經詮定學謂阿含等經所明皆是安心之法依此攝心即不散亂又佛凡説經必先入定故云經詮定學梵語阿含華言無比法二律詮戒學謂毗尼律藏因事制戒專用防止身口惡法又戒是所詮之行律是能詮之教故云律詮戒學梵語毗尼華言善治又言滅三論詮慧學謂阿毗曇等論決擇辨論一切法義皆以智慧分別故云論詮慧學梵語阿毗曇華言無比法三經通別出法華玄義如來一代所説諸經之內無不具此教行理三無不以別而契於通以通而應於別通則通於諸經別則別有所以故教有通別依教明行行有通別從行顯理理有通別也一教經通別教即聖人對機所説一切言教也夫教本應機機宜不同部部別異故名教別諸部雖異通是佛説故名教通所謂從緣故教別從説故教通也部部者經教部類也二行經通別行即依教修行亦進趣之義也泥洹真法寶衆生以種種門入教既為門不同行則所入亦異所入之門雖異所契之理則同所謂從能契故行別從所契故行通也梵語泥洹亦云涅槃華言滅度三理經通別理即一切言教所詮之義理也理則不二名字非一故智論云般若是一法佛説種種名如或言實相或言法界等名異故別理一故通所謂理從名故別名從理故通也法華三周出法華經玄義法華三周者謂佛説法華經因聲聞之人根有利鈍悟有前後故有三周不同焉周者周足之義也一法説周法説周者佛為上根之人作三乘一乘説開三乘之權顯一乘之實即方便品中所談是也三乘者聲聞乘緣覺乘菩薩乘也二譬喻周譬喻周者佛為中根之人於上法説周中不悟更作三車一車説初許三車是施權後等賜大車是顯實即譬喻品中所談是也三車者羊車鹿車牛車也三宿世因緣周宿世因緣周者佛為下根之人於上法譬二周之中不能解了遂説宿世曾於大通智勝佛時同下一乘之種令其得悟即化城喻品中所談是也蓮華三喻出法華玄義蓮華三喻者良以妙法難解假喻易彰蓮華則華果同時妙法則權實一體故取蓮華以喻權實之法也一為蓮故花為蓮故花有二喻一喻為實施權謂蓮以喻實花以喻權蓋譬如來為一乘之實而施三乘之權故經云雖示種種道其實為佛乘是也二喻從本垂迹謂蓮以喻本花以喻迹蓋譬如來從久成佛之本而施今日設化之迹故經云我實成佛以來久遠若斯但教化衆生作如是説我少出家得三菩提是也三乘者菩薩乘緣覺乘聲聞乘也梵語三菩提華言正道二花開蓮現花開蓮現亦有二喻一喻開權顯實謂華開喻開權蓮現喻顯實蓋譬如來開三乘之權而顯一乘之實故經云開方便門示真實相是也二喻開迹顯本謂花開喻開迹蓮現喻顯本蓋譬如來開今日近成之迹而顯久遠成佛之本故經云一切世間皆謂我今始得道我實成佛以來無量無邊那由他劫是也梵語那由他華言萬億三花落蓮成花落蓮成亦有二喻一喻廢權立實謂華落喻廢權蓮成喻立實蓋譬如來廢棄三乘之權而建立一乘之實故經云正直捨方便但説無上道是也二喻廢迹立本謂華落喻廢迹蓮成喻立本蓋譬如來廢今日近成之迹而立久遠成佛之本故經云諸佛如來法皆如是為度衆生皆實不虛是也三分科經出法華經文句三分者分即分限謂諸經中皆有序分正宗分流通分也始自晉道安法師判節諸經皆具三分尓後親光論自西天傳至此土果有三分之説是故諸經皆以三分而科節也親光論者謂親光菩薩所造之論也一序分序即序述亦次序也有通序別序通序者謂如是我聞一時佛在某處與某大衆俱此是通序以一切經初同有此序故名通也別序者蓋佛説經必有由致如楞嚴經由阿難遭摩登伽幻術之緣佛因提獎阿難及摩登伽歸來佛所故説是經是名別序而言別者以諸經所説各有緣起不同故名別也雖分通別總名序分二正宗分宗即主也亦要也蓋佛説經必以正説為主又正明一經要義故也如楞嚴經第一卷從阿難見佛頂禮悲泣下徵心辨見分別真妄會萬法歸如來藏乃至説呪立壇遠離魔事令阿難大衆除惑證道至第十卷重研五陰知有涅槃不戀三界等此是一經正説故名正宗分五陰者色陰受陰想陰行陰識陰也三界者欲界色界無色界也三流通分流則不滯通則不壅謂正説既陳務傳後世利益衆生用使正法之源流通而不壅也如楞嚴經自阿難若復有人遍滿十方所有虛空盈滿七寶持以奉上微塵諸佛至作禮而去此乃較量持經福勝勸讚讀誦流傳無盡故名流通分七寶者金銀琉璃玻𬎙硨磲碼瑙赤真珠也親光三分科經出佛地論謂親光菩薩造論釋佛地經科分三分也一教起因緣分謂如來説教必有發起因緣此佛地經佛告妙生菩薩有五種法攝大覺地而説是經即教起因緣分五種法者一清淨法界智二大圓鏡智三平等性智四妙觀察智五成所作智也二聖教所説分謂因緣分後正顯聖教所説法門此佛地經從妙生當知下至令入聖教成熟解脫即聖教所説分三依教奉行分謂聞聖教所説時衆信受奉行此佛地經從薄伽梵説是經已至經盡文即依教奉行分三善出法華文句法華經云初中後善蓋言圓頓教中序正流通三分理致圓𬾨故皆稱善三分者一序分謂序述一經之由二正宗分謂正説一經之旨三流通分謂流傳此經使後世通行也一初善初善者序分居初故名初善如經序品為序分是也二中善中善者正説分居中故名中善如經方便品至分別功德品十九行偈為正説分是也三後善後善者流通分居後故名後善如經分別功德品十九行偈後至經盡為流通分是也三軌弘經出法華經并法華文句三軌弘經者弘傳經教必須具此三軌軌即軌範亦軌則也蓋言弘經者當以慈悲忍辱法空三法為之範則故法華文句云利物以慈悲為首涉有以忍辱為基説法以亡我為本能行三法庶可自利而利他也一慈悲室謂弘經之人當須具大慈悲覆護一切衆生以大慈故則能與衆生之樂以大悲故則能衆生之苦慈悲覆物喻之如室故經云大慈悲為室也二忍辱衣謂弘經之人當行忍辱之行遮蔽一切衆生惡障及煩惱等醜喻之如衣故經云柔和忍辱衣也三法空座謂弘經之人當了一切法空亦無我為能説若安心於空方能安他安他安已喻之如座故經云諸法空為座也三涅槃出金光明經玄義梵語涅槃華言滅度又云不生不滅一性淨涅槃謂諸法實相之理不可染不可淨不染即不生不淨即不滅不生不滅名性淨涅槃諸法實相者十界因果之法本來離虛妄相相相皆實故名實相不可染不可淨者謂實相之理惑不能染智不能淨不染即不生者既無惑染豈有法生不淨即不滅者既非智淨豈有法滅是故名為不生不滅二圓淨涅槃智極故名圓惑盡故名淨據性而言雖無染淨約修而説惑智宛然智若契理惑畢竟不生智畢竟不滅不生不滅名圓淨涅槃惑智宛然者惑即所斷之煩惱智即能斷煩惱之智慧也三方便淨涅槃方便猶善巧也謂智能契理即照羣機照必垂應機感即生此生非生機緣既盡應身即滅此滅非滅不生不滅名方便淨涅槃此生非生者謂機感即生心常寂滅也此滅非滅者謂緣盡即滅應用常興也三般若出金光明經玄義梵語般若華言智慧此三般若體是圓常大覺也即此一覺有三種德故名三般若一實相般若謂本覺之體非寂非照離虛妄相名為實相即一切種智也非寂非照者寂謂寂靜照謂照明寂照皆言非者用遮二邊以顯中道實相之德也一切種智者謂知一切諸佛之道知一切衆生之因種也二觀照般若謂觀照之德非照而照了法無相名為觀照即一切智也非照而照者照謂照明謂理本非照因觀而照以顯觀照之德也一切智者謂能知一切內法內名一切外法外名也三方便般若方便猶善巧也謂方便之德非寂而寂善巧分別諸法名為方便即道種智也非寂而寂者寂謂寂靜以寂靜故了一切法皆從因緣而生性本空寂以顯方便之德也道種智者謂能用諸佛一切道法發起一切衆生善種故也三大乘出金光明經玄義一理乘謂理性虛通自然荷運諸法故名理乘荷負也運動也無法不具故名荷能至極果故名運二隨乘謂智隨理境如蓋隨函隨理荷運故名隨乘三得乘得者得果得機也謂得果故自解脫得機故令他解脫故名得乘得果者得妙覺極果得機者得所化之機衆也二菩提出金光明經玄義梵語菩提華言道一真性菩提真名不偽性名不改不偽不改名為真性以此真性為道故名真性菩提二實智菩提謂能照真性之智稱理不虛名為實智以此實智為道故名實智菩提三方便菩提謂善巧隨機化用自在名為方便以此方便為道故名方便菩提三菩提出出生菩提經梵語菩提華言道經云婆羅門白佛言若已發菩提心有退失否佛言發菩提心已則無退失當知有三種菩提梵語婆羅門華言淨行一聲聞菩提謂聲聞之人發菩提心也經云若人在於聲聞行中雖已自發菩提之心而不勸化衆生發菩提心亦不習學大乘經義以是行故獨得解脫是名聲聞菩提二緣覺菩提謂緣覺之人發菩提心也經云若人在於緣覺行中雖已自發菩提之心而不勸化衆生發菩提心亦不習學大乘經義以是行故獨得解脫是名緣覺菩提三諸佛菩提謂諸佛於因中發菩提心也經云若人自發菩提心已復能勸諸衆生發菩提心習學大乘法義自既解脫亦令衆生解脫是名諸佛菩提三轉法輪出法華文句三轉法輪者以苦集滅道四諦之法三番而説名為三轉世間車輪則有摧碾之用佛之説法則能摧碾衆生一切惑業故名轉法輪也一示轉示即指示如云此是苦此是集此是滅此是道是名示轉苦者生死逼迫之苦也集者積集煩惱惑業也道者戒定慧之道也滅者涅槃寂滅之樂也二勸轉勸即勸勉也如云此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修是名勸轉三證轉證驗也謂引己所證以驗之也如云此是苦我己知不復更知此是集我已斷不復更斷此是滅我已證不復更證此是道我已修不復更修是名證轉三法印出法華玄義釋論云諸小乘經若有無常無我涅槃三印印定其説即是佛説若無此三法印印之即是魔説如世公文得印可信故名三法印梵語涅槃華言滅度一無常印謂世間生死及一切法皆是無常衆生不了於無常法中執為常想是故佛説無常破其執常之倒是名無常印二無我印謂世間生死及一切法皆是因緣和合而有虛假不實本無有我衆生不了於一切法強立主宰執之為我是故佛説無我破其著我之倒是名無我印三涅槃印梵語涅槃華言滅度謂一切衆生不知生死是苦而更起惑造業流轉三界是故佛説涅槃之法令其出離生死之苦而得寂滅之樂是名涅槃印三界者欲界色界無色界也三陀羅尼出大智度論梵語陀羅尼華言能持謂於一切善法能持令不散不失也又翻總持謂持善不失持惡不生也一聞持陀羅尼謂得此陀羅尼者於一切語言諸法耳之所聞皆不忘失是名聞持陀羅尼二分別陀羅尼謂得此陀羅尼者於一切衆生一切諸法分別不錯是名分別陀羅尼三入音聲陀羅尼謂得此陀羅尼者聞一切衆生惡言罵詈心不憎恨聞一切衆生善言讚歎心不搖動是名入音聲陀羅尼三無礙出大寶積經一總持無礙謂菩薩獲大總持於種種善法持令不失種種惡法持令不生故一切言語諸法分別悉知皆不忘失無所挂礙是為總持無礙二辨才無礙謂菩薩獲大辨才於大小乘種種諸法隨衆生機縱辨宣揚悉使通達皆無疑礙是為辨才無礙三道法無礙謂菩薩獲大智慧於大小乘一切道法及世間種種語言文字悉能通達照了無礙是為道法無礙三德出華嚴經疏一恩德謂如來乘大願力救護衆生猶如赤子是為恩德二斷德斷德亦名解脫謂如來斷除一切煩惱惑業淨盡無餘是為斷德三智德智即智慧謂如來以平等智慧照了一切諸法圓融無礙是為智德三德出金光明經玄義法身般若解脫是為三常樂我淨是為德常即不遷不變樂即安隱寂滅我即自在無礙淨即離垢無染佛以此四者為德也一法身德法即軌法謂諸佛由軌法而得成佛故名法身此之法身在諸佛不增在衆生不減衆生迷之而成顛倒諸佛悟之而得自在迷悟雖殊體性恆一具足常樂我淨是名法身德二般若德梵語般若華言智慧謂佛究竟始覺之智而能覺了諸法不生不滅清淨無相平等無二不增不減具足常樂我淨是名般若德三解脫德不繫名解自在名脫謂佛永離一切業纍之縛得大自在具足常樂我淨是名解脫德翻三染成三德出華嚴經隨疏演義鈔翻即翻轉之義三染者謂苦惑業也以其皆能染汙本性不得清淨故也三德者謂法身般若解脫皆具常樂我淨之德名為三德梵語般若華言智慧常樂我淨者不遷不變常也離生死苦樂也自在謂之我也惑盡謂之淨也一翻苦身成法身德謂於生滅無常之身若能觀察五蘊本空不生不滅即成法身故名翻苦身成法身德五蘊者色蘊受蘊想蘊行蘊識蘊也二翻煩惱成般若德梵語般若華言智慧謂於意根所起諸惑若能觀察惑體本空自性不實於一切法無不了達即成智慧故名翻煩惱成般若德三翻結業成解脫德解脫即自在之義謂於身口所作諸業若能觀察其性本空則無繫縛之相於一切法無不自在即成解脫故名翻結業成解脫德三解脫門出法界次第解脫即自在之義也門即能通之義謂由此三解脫門則能通至涅槃故名三解脫門梵語涅槃華言滅度一空解脫門謂觀一切法皆從因緣和合而生自性本空無我我所若能如是通達則於諸法而得自在故名空解脫門我者衆生於五陰身中強立主宰名之為我我所者衆生妄執五陰之身及男女資生等物皆名我所五陰者色陰受陰想陰行陰識陰也二無相解脫門謂既知一切法空故觀男女一異等相實不可得若能如是通達諸法無相即得自在故名無相解脫門三無作解脫門無作又云無願謂若知一切法無相則於三界無所願求若無願求則不造作生死之業若無生死之業即無果報之苦而得自在故名無作解脫門三界者欲界色界無色界也三無為出俱舍論無為者謂真空寂滅之理本無造作故名無為一虛空無為虛空即無礙之義謂真空之理不為惑染之所障礙故名虛空無為二擇滅無為擇即揀擇滅即寂滅謂聲聞之人用智揀擇遠離見思繫縛即證寂滅真空之理是名擇滅無為三非擇滅無為謂聲聞之人證果之後諸惑不復續起自然契悟寂滅真空之理不假揀擇故名非擇滅無為律有三名出大藏一覽并華嚴經疏一毗尼梵語毗尼華言善治謂能治貪瞋癡等惡也又言調伏謂能調練三業制伏過非也三業者身業口業意業也二尸羅梵語尸羅華言止得謂能止惡得善也又名戒戒以防止為義以能防止身口意諸不善業故也三波羅提木義梵語波羅提木義華言解脫謂能遠離惑業繫縛而得自在也三論各出本論一百論僧肇法師云佛入滅後八百餘年外道紛然異端競起邪辨逼真殆亂正道有提婆菩薩乃作斯論所以防正間邪大明於宗極者矣論有百偈故名百論梵語提婆華言天龍樹弟子也二中論中論即觀論也僧睿法師云論有五百偈龍樹菩薩之所造也以中為名者照其實也以論為稱者盡其言也實非名不悟故寄中以宣之言非釋不盡故假論以明之也蓋因修行之人內心滯惑或生於倒見或執於偏悟故作此論折之以中道之理令二邊之相即真俗之不二故名中論二邊者即空有二邊也真俗者即真諦俗諦也三十二門論十二門論亦龍樹菩薩所造也而言十二者總衆枝之大數也門者開通無滯之稱也論者欲以窮其源盡其理也故始自觀因緣門終至觀門總有十二其中所明則有無兼暢事無不盡理無不𬾨故名十二門論十二門因緣門有無果門緣門相門有無相門異門有無門𪫬門因果門作門三時門生門也三學出翻譯名義如來立教其法有三一曰戒律二曰禪定三曰智慧然非戒無以生定非定無以生慧三法相資一不可而皆稱為學者學猶飾也器不飾則無以成美觀人不學則無以成聖德故依此而修者必證聖果也一戒學戒者禁戒也謂能防止身口意所作之惡業故名戒學二定學定者禪定也謂能攝散澄神見性悟道故名定學三慧學慧者智慧也謂能斷除煩惱顯發本性故名慧學三歸依出法界次第謂如來初成正覺因為提謂長者開受三歸之戒翻邪歸正以為入道根本是故三乘行者修因證果皆以此為道也華嚴經疏云三寶吉祥最勝良緣有歸依者能辦大事生諸善根離生死苦得涅槃樂是名三歸依三乘者菩薩乘緣覺乘聲聞乘也一歸依佛梵語佛陀華言覺自覺覺他故名佛也歸者反還之義謂反邪師還事正師也依者憑也憑佛大覺得出三途及三界生死故經云歸依於佛終不更歸依其餘外道天神也三途者刀途血途火途也三界者欲界色界無色界也二歸依法法即軌則之義謂佛所説若教若理可為衆生修行軌則故言法也歸者反邪法還修正法也依者憑佛所説教法得出三塗及三界生死故經云歸依於法者永離於殺害也三歸依僧梵語僧伽華言和合衆謂出家三乘之人其心與佛所説事理之法和合故名僧也歸者反外道邪行之侶歸心出家三乘正行之伴也依者憑信出家正行之伴得出三塗及三界生死故經云歸依於僧者永不復更歸依其餘外道也三三昧出法界次第梵語三昧華言正定亦云正心行處謂衆生之心從無始已來常不正直得是三昧心行正直故名三昧一有覺有觀三昧謂初心在禪曰覺細心分別禪味曰觀以空無相無作相應心入於初禪則一切覺觀皆悉正直故名有覺有觀三昧空無相無作即三解脫門也二無覺有觀三昧謂以空無相無作相應心將入二禪之時覺知之心已亡分別禪味之念猶在一切定觀皆悉正直故名無覺有觀三昧三無覺無觀三昧謂以空無相無作相應心入於二禪乃至滅受想定時覺知之心分別禪味之念俱亡故名無覺無觀三昧三三昧出成實論一分修三昧謂定慧二分隨修一分也或修定不修慧或修慧不修定是名分修三昧梵語三昧華言調直定亦名正定正受二共修三昧謂修定亦兼修慧修慧亦兼修定是名共修三昧三聖正三昧自初果須陀洹已去聖位所修名為聖正謂以定修心因慧能破煩惱以慧修心因定能破煩惱定慧一時具足故名聖正三昧梵語須陀洹華言預流三止出止觀一體真止謂體達無明顛倒之妄即是實相之真是名體真止二方便隨緣止方便猶善巧也謂隨緣歷境安心不動是名方便隨緣止三離二邊分別止謂不分別生死涅槃有無等二邊之相是名離二邊分別止梵語涅槃華言滅度為三事故修奢摩他出涅槃經梵語奢摩他華言止即禪定也一不放逸謂修禪定而能止諸散亂調伏諸根惡不善法故心不放逸也二莊嚴大智謂修禪定既得離諸散亂則本性寂靜之慧自然照朗內外洞徹於諸佛法無不通達此之智慧非定不發是為莊嚴大智也三得自在謂修禪定能滅一切煩惱散亂即得身心寂靜安隱快樂而無挂礙是為得自在也覺觀三種發相出釋禪波羅蜜次第法門初心在緣曰覺細心分別曰觀一明利心中覺觀發相謂修禪之人宿無善根現修定時善法不起但覺觀攀緣念念不住三毒之中或緣貪或緣瞋或緣癡如是經年纍月而不得定此為明利心中覺觀發相二半明半昏覺觀發相謂修禪之人於攝念時雖了覺觀煩惱念念不住但隨所緣或明或昏明則覺觀攀緣起諸思想昏則無記瞪矒無所覺知是為半明半昏覺觀發相三一向沉昏覺觀發相謂修禪之人於修禪定時心雖一向昏暗猶如睡眠然於昏昏之中切切攀緣覺觀不住是名沉昏覺觀發相
