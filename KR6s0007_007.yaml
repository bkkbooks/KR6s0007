body:
  text: 上天竺前住持沙門一如等奉勑集注三種圓滿安樂出瑜伽師地論一成就加行圓滿謂修菩薩行者於淨戒中不敢毀犯於身語意清淨無染若有過失即能懺悔令其戒體圓滿無虧是名成就加行圓滿二成就意樂圓滿謂修菩薩行者為法出家不為活命但為求無上菩提及求大涅槃樂勇猛精進不生懈怠之心不雜衆惡之法不受當來生老病死之苦是名成就意樂圓滿梵語菩提華言道梵語涅槃華言滅度三成就宿因圓滿謂修菩薩行者於宿世中曾修福善故於今生種種資身之具悉無匱乏復能為他廣行惠施心不慳吝是名成就宿因圓滿三義歡喜出觀經妙宗鈔觀無量壽佛經疏因釋阿難及天龍等聞法歡喜作禮而去故以三義釋之梵語阿難華言慶喜一遇人歡喜人即佛也謂佛具足四無礙智説觀彼佛之法離於錯謬今遇此人寧不歡喜是名遇人歡喜四無礙智者法無礙智義無礙智詞無礙智樂説無礙智也彼佛即梵語阿彌陀華言無量壽二聞法歡喜謂所説觀佛之法一十六門曲盡其妙能令凡心入深三昧聞如是法豈不歡喜是名聞法歡喜一十六觀門者日觀水觀地觀寶樹觀八功德水觀總觀華座觀像觀佛真身觀觀世音觀大勢至觀普想觀雜想觀上輩生觀中輩生觀下輩生觀三得果歡喜果即修觀剋獲之果也謂韋提希等聞説觀佛之法依此修之得分真果侍女諸天得相以果得如是果豈不歡喜是名得果歡喜梵語韋提布華言思惟分真者即證一分中道也相似者近於分真也三因出佛性論一應得因謂依真如空理而修因行應得菩提之果故名應得因梵語菩提華言道二加行因謂依菩提心加功用行以此為因即能證得法身之果故名加行因三圓滿因謂由加行故因行圓滿故名圓滿因三斷出宗鏡録一自性斷謂智慧起時煩惱暗障自性應斷故名自性斷二不生斷謂得法空之時能令三塗惡道苦果永更不生故名不生斷三塗者火塗刀塗血塗也三緣縛斷謂但斷心中之惑則於外塵境不起貪瞋於境雖緣不生染著故名緣縛斷三斷出阿毗達磨品類足論一見所斷謂聲聞初果之人斷惑見理名為見道因斷三界八十八使見惑故名見所斷三界者欲界色界無色界也八十八使者一身見二邊見三見取四戒取五邪見六貪七瞋八癡九慢十疑此十使歷三界四諦下增減不同成八十八謂欲界苦諦十使具足集滅二諦各七使除身見邊見戒取道諦下八使除身見邊見四諦合為三十二上色界無色界每四諦下咨除瞋使餘皆如欲界故上二界合為五十六并前欲界三十二共成八十八使也二修所斷謂聲聞第二果第三果修真斷惑名為修道因斷三界十隨眠惑故名修所斷十隨眠者即是思惑謂長時隨逐潛伏覆蔽真性故名隨眠欲界有四謂貪瞋癡慢色界無色界各三謂貪癡慢共為十也三非所斷謂聲聞第四果三界煩惱皆已斷竟得無漏果無惑可斷故名非所斷龍華三會出法住記彌勒下生經云彌勒菩薩即於出家之日便得成佛坐於龍華樹下花林園中三會説法故云龍華三會梵語彌勒華言慈氏第一會度九十六俱胝聲聞衆梵語俱胝華言百億記云若諸國王大臣長者居士男女一切施主於今釋迦牟尼佛正法中能作佛事自種善根或教他種以七寶金銀鍮石銅鐵木石泥土或以繒縷或以綵畫作佛形像及窣堵波若大若小乃至最小如指節大或以香花諸妙供具而為供養由如是善根力故至彌勒如來成正覺時善得人身於第一會中剃髮出家乘宿願力便得涅槃梵語窣堵波華言高顯即塔也梵語涅槃華言滅度第二會度九十四俱胝聲聞衆記云若國王等及以臣庶於今釋迦牟尼佛正法中能為法事謂於諸大乘經典或律或論若讀若誦或恭敬供養或於經卷以諸雜綵而嚴飾之由是善根力故至彌勒如來成正覺時善得人身於第二會中剃髮出家乘宿願力便得涅槃第三會度九十二俱胝聲聞衆記云若諸國王及臣庶等於今釋迦牟尼佛正法中能為僧事自種善根或教他種於每月初一日或初八日十五日設齋供養比丘比丘尼或供養修禪定者或供養諸説法者或施坐臥等具供養僧衆由是善根力故至彌勒如來成正覺時於第三會中剃髮出家乘宿願力便得涅槃菩薩三修學出菩薩瓔珞本業經一百劫頂寂定中修諸三昧劫梵語具云劫波華言分別時節梵語三昧華言正定頂寂定者在衆定之上故名頂也謂等覺菩薩住頂寂定以大願力住壽百劫修一切三昧已入金剛三昧與一切法性相應相冥而得一合相也等覺者去佛之位一等也金剛三昧著金剛最堅至利謂入此三昧則一切諸惑無不斷也二千劫金剛定中學諸威儀謂等覺菩薩復住壽千劫學佛一切威儀象主觀視師子遊步修佛無量不可思議神通化導之法皆現在前入佛行處坐佛道場也三萬劫大寂定中學佛化行謂等覺菩薩復住壽萬劫學佛教化之行現諸色相教化衆生復現同諸佛常行中道大樂無為也菩薩生兜率天三事勝出涅槃經菩薩當補佛處故生兜率梵語兜率華言知足謂於五欲境界知止足故五欲者色欲聲欲香欲味欲觸欲也一命勝菩薩已離三界生死雖不修命業而於彼天託生天繫壽命四千嵗天壽畢已降生中國以補佛處是名命勝也三界者欲界色界無色界也二色勝菩薩雖不修色業既生兜率而妙色身光明照耀自然莊嚴異諸天衆是名色勝也三名勝佛本行集經云菩薩既生兜率其諸天衆即喚菩薩名為護明展轉稱喚其聲上徹淨居乃至色界天頂是名名勝也護明釋迦佛也從迦葉佛時護持禁戒梵行清淨命終生天不失本心不忘宿行故曰護明三賢出仁王護國經疏十住十行十回向諸位菩薩皆稱賢者此就別教而論蓋諸位菩薩但斷見思惑盡尚有無明惑在未入聖位故名賢也一十住會理之心安住不動名之為住一發心住二治地住三修行住四生貴住五具足方便住六正心住七不退住八童真住九法王子住十灌頂住二十行行即進趣之義謂行此行則能進向於果名之為行一歡喜行二饒益行三無違逆行四無屈撓行五無癡亂行六善現行七無著行八難得行九善法行十真實行三十回向回因向果名為回向一救諸衆生離衆生相回向二不壞回向三等一切諸佛回向四至一切處回向五無盡功德藏回向六入一切平等善根回向七等隨順一切衆生回向八真如相回向九無縛無著解脫回向十入法界無量回向三種發心出起信論一信成就發心謂十信行滿信心成就入十住位中初發心住故名信成就發心十信者信心念心精進心慧心定心不退心護法心回向心戒心願心也十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也二解行發心解即解了行即修行謂十行位中能解法性本空順修六度之行發回向心入十回向故名解行發心十行者歡喜行饒益行無瞋恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也六度者一布施二持戒三忍辱四精進五禪定六智慧也十回向者救一切衆生離衆生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切衆生回向真如相回向無礙解脫回向法界無量回向也三證發心證即證入謂入初地乃至第十地而此證者無有境界惟真如智名為法身法身顯發故名證發心三不退出觀經妙字鈔一位不退謂別教菩薩從初住位中斷見惑二住至七住位中斷思惑則永不退失超凡之位故名位不退初住即十住發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也二行不退謂別教菩薩從八住已去至十行位中伏斷塵沙之惑則永不退失菩薩之行故名行不退十行者歡喜行饒益行無瞋恨行無盡行離癡亂行善現行無著行尊重行善法行真實行也三念不退謂別教菩薩從初地已去破無明惑則永不退失中道正念故名念不退三處入法界出華嚴經疏法界即一切衆生本有之心諸佛所證平等之理也而云三處入者由菩薩根有利鈍行有淺深故所證入先後不定遂分三處也一十住初心入法界謂利根菩薩即於初住位中破無明惑證入法界平等之理得不退轉是名十住初心入法界也十住者發心住治地住修行住生貴住方便具足住正心住不退住童真住法王子住灌頂住也二回向終心入法界謂菩薩於十回向後心衆行純熟證入法界是名回向終心入法界也十回向者救一切衆生離衆生相回向不壞回向等一切佛回向至一切處回向無盡功德藏回向隨順平等善根回向隨順等觀一切衆生回向真如相回向無礙解脫回向法界無量回向也三初地入法界謂菩薩於前行向中功德具足至於初地即得證入法界乃了三德圓融三身自在是名初地入法界也三德者法身德般若德解脫德也三身者法身報身應身也文殊三名出翻譯名義一文殊師利梵語文殊師利華言妙德謂具不可思議種種微妙功德故名妙德二滿殊尸利梵語滿殊尸利華言妙首謂具不可思議微妙功德在諸菩薩之上故名妙首三曼殊室利梵語曼殊室利華言妙吉祥謂具不可思議微妙功德最勝吉祥故名妙吉祥三人觀十二因緣出涅槃經三人者謂通教聲聞緣覺菩薩雖同觀十二因緣然隨智淺深法成高下故有三種之異也一下智觀故得聲聞菩提梵語菩提華言道謂聲聞之人用體空之智初觀十二因緣生次觀十二因緣滅觀此生滅即悟非生非滅破見思之惑證真空之理是名下智觀故得聲聞菩提體空者體達諸法性本空也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也因緣生者即無明緣行行緣識等是也因緣滅者即無明滅乃至老死滅是也二中智觀故得緣覺菩提謂緣覺之人亦用體空之智初觀十二因緣生次觀十二因緣滅觀此生滅即悟非生非滅破見思之惑更能侵除習氣以由能觀之智比於聲聞稍勝故所證真空之理亦深是名中智觀故得緣覺菩提侵除者猶漸除也習氣者見思餘習之氣分也三上智觀故得菩薩菩提謂菩薩之人雖亦用體空之智觀十二因緣生滅了悟非生非滅而能頓斷見思習氣以由能觀之智比於緣覺復勝故所證真空之理最深是名上智觀故得菩薩菩提菩薩梵語具云菩提薩埵華言覺有情阿羅漢三義出翻譯名義梵語阿羅漢華言無生亦云無學謂三界生死已盡是為無生無法可學是為無學或言不翻者名含三義故也三界者欲界色界無色界也一殺賊賊即見思惑也以其劫人功德之財奪人智慧之命故名為賊阿羅漢能斷三界見思之惑故名殺賊二不生不生即無生也謂阿羅漢既斷見思惑盡更不受三界生故名不生三應供謂阿羅漢智斷功德既已具足應受人天供養故名應供智謂得漏盡智斷謂斷三界見思惑盡也三迦葉出法華經文句梵語迦葉華言光波謂身光炎涌映餘光故也毗婆尸佛時三人共立剎柱以是因緣感報遂為兄弟梵語毗婆尸華言勝觀一優樓頻螺迦葉梵語優樓頻螺華言木瓜林謂其居處近於此林故以名之將護四衆供給四事令無所乏最為第一四衆者一比丘二比丘尼三優婆塞四優婆夷也四事者一飲食二衣服三臥具四醫藥也二伽耶迦葉梵語伽耶華言城謂其居家在王舍城南七由旬故以名之觀了諸法都無所著教化衆生最為第一梵語由旬華言限量一由旬四十里也三那提迦葉梵語那提華言河謂其居止近於此河故以名之心意寂然降伏結業精進修行最為第一阿難三名出翻譯名義阿難是斛飯王之子佛成道日生以其能持法藏有三種不同隨德受稱故有三名也一名阿難梵語阿難華言慶喜生時合國欣慶歡喜故也以其親承佛旨傳以化人即傳持聲聞藏也二名阿難跋陀梵語阿難跋陀華言喜賢以其住於有學之地得空無相無願三解脫門即傳持緣覺藏也空者謂了達自性本空無我我所也無相者謂一切法空無男女相也無願者謂了達諸法無相無所願求也以能空此三者即得自在無礙故云解脫門也三名阿難迦羅梵語阿難迦羅華言喜海以其解了如來説法無説而説説即無説所謂佛法大海水流入阿難心即傳持菩薩藏也聲聞三道出天台四教儀集注一見道謂聲聞因斷三界見惑見真諦理故名見道即初果須陀洹也三界者欲界色界無色界也見惑者意根對法塵起諸分別曰見惑梵語須陀洹華言預流謂預入聖道法流也二修道謂聲聞得初果已復緣真諦之理斷欲界九品思惑名為修道即二果斯陀含三果阿那含也思惑者五根對五塵起貪染心曰思九品者於上中下三品每一品中又分三品名為九品梵語斯陀含華言一來謂來欲界一番受生也梵語阿那含華言不來謂不來欲界受生也三無學道謂聲聞斷三界見思惑盡真諦之理究竟無法可學故名無學即第四果阿羅漢也梵語阿羅漢華言無學結集三人出付法藏因緣經一阿難梵語阿難華言慶喜斛飯王之子佛成道日生生時舉國欣慶故云慶喜隨佛出家得阿羅漢果多聞第一能持法藏如來滅後與文殊師利集諸大衆於鐵圍山等處結集修多羅藏梵語修多羅華言契經二優波離梵語優波離華言化生或翻上首以其持律第一為衆紀綱故也如來滅後與五百聖人於畢鉢羅窟內結集毗奈耶藏畢鉢羅西域記云即菩提樹也梵語毗奈耶華言善治即律也三迦葉梵語迦葉波華言飲光謂其身光炎涌能映餘物故也如來滅後集諸大衆於畢鉢羅窟等處結集阿毗曇藏梵語阿毗曇華言無比法即論也初果三結出四教儀集注結即見惑衆生由此見惑結縛不能出離生死聲聞之人斷此惑盡即證初須陀洹果故名初果三結梵語須陀洹華言預流謂預入聖道法流也一身見結謂衆生於五陰等法中妄計為身強立主宰恆起我見是名身見結五陰者色陰受陰想陰行陰識陰也二戒取結謂外道之人於非戒中謬以為戒取以進行如雞狗戒等是名戒取結雞狗戒者謂外道計自身前世從雞中來即便獨立等或計從狗中來即便噉糞穢等是也三疑結謂迷心背理而於正法猶豫不決不能深信是名疑結三餘出華嚴經隨疏演義鈔一煩惱餘煩惱餘亦名障餘謂二乘之人雖斷三界內見思惑盡尚有界外無明惑在故名煩惱餘二乘者聲聞乘緣覺乘也三界者欲界色界無色界也二業餘業餘亦名道餘謂二乘之人雖斷三界內業縛尚餘界外變易生死之業故名業餘三苦餘苦餘亦名果餘謂二乘之人已出三界分假生死尚有變易生死之苦故名苦餘三佛子出華嚴經疏一外子謂諸凡夫未曾入道未能紹繼佛種是名外子二庶子謂聲聞緣覺但稟小乘之教生於法身不從如來大法生故是名庶子三真子謂大乘菩薩稟受如來大法生於法身是名真子三車出法華經三車者車即運載之義喻三乘之人各以所乘之法運出三界而至涅槃也三乘者菩薩乘緣覺乘聲聞乘也三界者欲界色界無色界也梵語涅槃華言滅度一羊車羊車者以羊挽車故名羊車喻聲聞之人修四諦行求出三界但欲自度不顧他人如羊之奔逸竟不回顧後群故以羊車喻之經云如彼諸子為求羊車出於火宅是也四諦者苦諦集諦滅諦道諦也二鹿車鹿車者以鹿挽車故名鹿車喻緣覺之人修十二因緣行求出三界而略有為他之心如鹿之馳走即能回顧後群故以鹿車喻之經云如彼諸子為求鹿車出於火宅是也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三牛車牛車者以牛挽車故名牛車喻三藏教菩薩之人修六度行但欲度人出於三界而不求自出如牛之荷負安耐一切普運故以牛車喻之經云如彼諸子為求牛車出於火宅是也三藏者經藏律藏論藏也六度者一布施二持戒三忍辱四精進五禪定六智慧也三乘出法華經乘即運載之義謂聲聞緣覺菩薩各以其法為乘運出三界生死同到真空涅槃故名三乘三界者欲界色界無色界也梵語涅槃華言滅度一聲聞乘聞佛聲教而得悟道故曰聲聞謂其知苦斷集慕滅修道故以此四諦為乘也四諦者苦諦集諦滅諦道諦也二緣覺乘因觀十二因緣覺真諦理故名緣覺謂始觀無明緣乃至老死此是觀十二因緣生次觀無明滅乃至老死滅此是觀十二因緣滅觀此因緣生滅即悟非生非滅故以此十二因緣為乘也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三菩薩乘菩薩梵語具云菩提薩埵華言覺有情謂覺悟一切有情衆生也菩薩行六度行廣化衆生出離生死故以此六度為乘也六度者一布施二持戒三忍辱四精進五禪定六智慧也三乘觀門出天台四教儀集注一聲聞觀苦諦為初門苦即三界生死之苦也諦即審實之義謂聲聞之人知果苦而斷集因慕寂滅而修道品諦觀五陰生死之身即是衆苦之本故觀苦諦為初門也三界者欲界色界無色界也五陰者色陰受陰想陰行陰識陰也二緣覺觀集諦為初門集即招集之義謂煩惱之因則能招集生死之苦果也緣覺之人於十二因緣中初從無明觀起無明即屬集諦了知苦果實由集因而生故觀集諦為初門也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三菩薩觀道諦為初門道即六度也謂菩薩為利他故廣行六度化諸衆生故觀道諦為初門也六度者一布施二持戒三忍辱四精進五禪定六智慧也三田喻三種人出涅槃經第一田此田渠流便利無諸沙滷瓦石𣗥刺種一得百以喻菩薩根性猛利智慧明了利益衆生無有窮盡是為第一田也滷音魯第二田此田雖無沙滷瓦石𣗥刺渠流險難𭣣實減半以喻聲聞根性稍鈍雖得無漏但能自利不能度生是為第二田也無漏者謂聲聞惑業已斷無復漏落三界生死也第三田此田渠流險難多諸沙滷瓦石𣗥刺種一得一為草故以喻闡提之人而於佛法無有信心今為説法以種後世善種是為第三田也闡提梵語一闡提華言信不具外道名三草出法華經文句草即藥草也藥草既蒙雲雨之潤即得生長而能遍治衆病變體成仙以譬五乘之人既聞法華之教無漏智慧即得增長能破無明之惑開佛知見故以三草喻之五乘者菩薩乘緣覺乘聲聞乘天乘人乘也一小草小草喻人天也謂法雨既沾無不蒙潤而人天之機根力微弱未獲大益故名小草二中草中草喻聲聞緣覺也謂此二乘之人蒙佛法雨而於大乘根漸增長故名中草三上草上草喻三藏教菩薩也謂此菩薩蒙佛法雨敷榮鬱茂自他饒益故名上草三藏者經藏律藏論藏也三獸渡河出天台四教儀并法華玄義三獸喻三乘河喻空理也謂通教聲聞緣覺菩薩同出三界取證空理而根器有大小行位有淺深如象馬兔同共渡河而有淺深之異故以此為喻也三界者欲界色界無色界也一象渡河象渡河者喻菩薩之人也謂菩薩修六度萬行利益衆生斷見思惑及斷習氣盡而證菩提如象之渡河得其底也六度者一布施二持戒三忍辱四精進五禪定六智慧也見思惑者意根對法塵而起分別曰見惑眼耳鼻舌身貪愛色聲香味觸五塵曰思惑習氣者即見思餘習之氣分也二馬渡河馬渡河者喻緣覺之人也謂緣覺修十二因緣斷見思惑雖兼斷習氣未能淨盡而證真空之理如馬之渡河雖不至底而漸深也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也三兔渡河兔渡河者喻聲聞之人也謂聲聞修四諦法斷見思惑未能除斷習氣而但證真空之理如兔之渡河但浮水而過不能深也四諦者苦諦集諦滅諦道諦也比丘三義出大智度論梵語比丘華言除饉謂衆生薄福在因無法自資得報多所饉乏出家之人戒行是良福田能除因果之饉乏故名除饉或言不翻者名含三義故也一破惡謂比丘修戒定慧之道能破見思之惡故名破惡二怖魔魔梵語具云魔羅華言殺者謂能殺人智慧之命也比丘既能修道魔即念言此人非但出我界域亦能轉化於他空我眷屬魔即驚怖故名怖魔三乞士乞是乞求之名士是清雅之稱謂比丘常當乞食清淨自活上乞法以資慧命下乞食以資色身故名乞士三種僧出涅槃經一犯戒雜僧謂其雖持禁戒為利養故與破戒者常共親附同其事業雜處熏習因而破戒是名犯戒雜僧也二愚癡僧謂其雖在阿蘭若處諸根不利暗鈍愚魯經律論藏不能解了於諸弟子或犯禁戒亦不能教令清淨懺悔是名愚癡僧也梵語阿蘭若華言間靜處三清淨僧謂其本𪫬清淨嚴持戒律通達經論不為諸魔之所沮壞又能調伏利益一切衆生為説諸戒輕重之相堪稱護法無上大師是名清淨僧也律師三法出善見毗婆沙律一本毗尼藏梵語毗尼華言律謂為律師者必本於毗尼諷誦通利句義辨習文字不忘然後可以教授於人所以稱之為律師也二堅持不雜謂為律師者當懷慚愧堅持法律於毗尼藏所有文句義疏悉皆通達若有問者次第而答不相雜亂所以稱之為律師也三受持不忘謂為律師者於毗尼藏所傳之師須知次第授受之由若佛授優波離如是次第師師相承乃至于今於其名字或能盡知或知一二而不忘失所以稱之為律師也三圓滿出瑜伽師地論一行圓滿謂聽聞正法依法修行復能為他如法演説自利利他之行既周是名行圓滿二果圓滿謂由修行即能證涅槃之果圓成滿足是名果圓滿梵語涅槃華言滅度三師圓滿師即受道之師謂能以佛所説之法教誡於我復能引發一切梵行令得滿足是名師圓滿沙彌三名出翻譯名義梵語沙彌華言息慈謂息惡行慈也一驅烏沙彌謂能驅遣烏鳥即七嵗至十二三嵗者皆名驅烏沙彌也二應法沙彌謂能與出家之法相應即十四嵗至十九嵗者皆名應法沙彌也三名字沙彌謂能止息諸惡勤行衆慈可以沙彌名字稱之即二十嵗已上皆號名字沙彌也三種天出涅槃經天者天然自然樂勝身勝故名天也一世間天謂十方世界一切剎土中諸大國王雖處人中享受天福是名世間天二生天即一切衆生修行十善之因受其果報或生欲界天或生色界天或生無色界天是名生天十善者不殺生不偷盜不邪不妄語不兩舌不惡口不綺語不貪欲不瞋恚不邪見也三淨天謂聲聞緣覺斷諸煩惱獲大神通變化自在清淨無染是名淨天三界出華嚴孔目界限也別也謂三界分限各別不同故名界也一欲界欲有四種一者情欲二者色欲三者食欲四者欲下極阿鼻地獄上至第六他化天男女相參多諸染欲故名欲界梵語阿鼻華言無間第六他化天者李他所化而自娛樂也二色界色即色質謂雖離欲界穢惡之色而有清淨之色始從初禪梵天終至阿迦膩吒天九有一十八天並無女形亦無欲染皆是化生尚有色質故名色界梵語阿迦膩吒華言質礙究竟一十八天者梵衆天梵輔天大梵天少光天無量光天光音天少淨天無量淨天遍淨天無雲天福生天廣果天無想天無煩天無熱天善見天善現天色究竟天也三無色界謂但有心識而無色質也始從空處終至非非想處九有四天但有受想行識四心而無形質故名無色界四天者空無邊處天識無邊處天無所有處天非非想處天也三事人勝諸天出大毗婆沙論一能勇猛諸天耽嗜欲樂不復進修是人雖不見當來之果而能修諸苦行精進不怠是能勇猛勝諸天也二能憶念諸天耽嗜欲樂慧性常惛是人能憶記曩久所作所説之事了了分明悉無忘失是能憶念勝諸天也三能梵行梵者淨也諸天耽嗜欲樂不復增修善業是人初發心時能種殊勝善根愛持戒律行業清淨是能梵行勝諸天也閻浮提人三事勝餘三洲出長阿含經梵語閻浮提華言勝金洲即南洲也三洲者東弗于逮西瞿耶尼北鬱單越也一勇猛強記謂南洲之人於諸教法勇猛讀誦記聞廣博心不忘失其餘三洲則不能然所以勝之也二勤修梵行謂南洲之人於諸清淨梵行則能精勤修習期證道果其餘三洲則不能然所以勝之也三佛出其土謂南洲乃是中華文物之國一切聖賢皆出其中其人易化所以佛之降生必在斯土其餘三洲則不示現所以勝之也三種人難報出大毗婆沙論佛告比丘我見有三種人於諸有情多獲利益其恩難報假使盡其形壽以諸上妙衣服飲食臥具醫藥及餘資緣而供養之亦不能報也一令出家者謂若有人為其説法勸令出家剃髮染衣以正信心受持淨戒乃至成就菩提其恩難報也梵語菩提華言道二令知集法者集積集也謂衆生積集煩惱惑業而能招集生死之苦若有人為其説法令知煩惱過患而滅除之其恩難報也三令得漏盡者漏盡者謂衆生生死惑俱盡不漏落三界也若有人為其説法令如法而修破除煩惱出離生死之苦而證真空涅槃之樂其恩難報也三界者欲界色界無色界也梵語涅槃華言滅度太子三妃出瑞應經并翻譯名義經云太子十七嵗納妃三人以示同人法也一瞿夷梵語瞿夷華言明女其父名水光長者女生之時日將沒餘光照其室內皆明因名瞿夷是太子第一妃也二耶輸梵語耶輸陀羅華言華色是太子第二妃即羅㬋羅之母也其父名移施長者三鹿野鹿野是太子第三妃也其父名釋長者三善知識出止觀知識者聞名欽德曰知覩形敬奉曰識謂修行之人欲得道果必由教授知識以訓誨同行知識以䇿勵外護知識以資養三者俱𬾨方能成就其功故名善知識也一教授善知識宣傳聖言曰教訓誨於我曰授即教授之師也謂其人內外方便通塞障礙皆能決了是名教授善知識二同行善知識謂修觀行之人互相䇿發切磋琢磨併心齊志如乘一船故名同行善知識三外護善知識護猶助也謂管理所須以助修行之人或有外侮而能扞禦故名外護善知識三想出大智度論般若經云菩薩欲成無上道者應起平等心於一切衆生無有偏黨皆生親愛之想莫生怨心莫生中人心故名三想一怨想怨想者謂有人加害於我及害我父母兄弟者亦生親愛之想也二親想親想者謂於父母兄弟及親戚朋友等皆生親愛之想也三中人想中人想者謂於非怨非親之人亦生親愛之想也三思出華嚴經疏鈔一審慮思謂在意地籌量之時未有所作故名審慮思二決定思謂意既決定乃有所作是名決定思三動發思唯識論云動身之思名為身業發語之思名為語業是名動發思三惡覺出涅槃經并宗鏡録覺即知覺宗鏡録云若唯修事定但習世禪雖曰修行猶生惡覺以不制意地未斷其原故也經云一切凡夫雖善護身心猶故生於三種惡覺是也一欲覺欲即貪欲謂一切凡夫之人不了五塵過患而於順情之境種種貪求而生惡覺故名惡覺五塵者色塵聲塵香塵味塵觸塵也二恚覺恚即瞋恚謂一切凡夫之人不了五塵過患而於違情之境種種忿怒而生惡覺故名恚覺三害覺謂一切凡夫之人常為覺觀怨賊之所侵害故名害覺覺觀者初心在緣曰覺細心分別曰觀三報出慈悲水懺一現報謂現世作惡現身即受惡報現世作善現身即受善報是名現報二生報謂此生作善作惡來生方受善惡之報是名生報三後報謂或過去無量生中作善作惡於此生中受善惡報或在未來無量生中受善惡報是名後報三業出析玄記一身業身業即身所作之業也有善有惡若殺生偷盜邪即身惡業也若不殺不盜不即身善業也二語業語業即口所説之業也有善有惡若妄言綺語惡口兩舌即口惡業也若不妄言不綺語不惡口不兩舌即口善業也三意業意業即意所起之業也有善有惡若貪欲瞋恚邪見即意惡業也若不貪欲不瞋恚不邪見即意善業也三福田出優婆塞滅經一報恩福田謂父母有養育之恩師長有教誨之恩若能供養恭敬非惟報答其恩抑且自然獲福是名報恩福田二功德福田謂若能恭敬供養佛法僧三寶非但成就無量功德亦能獲其福報是名功德福田佛梵語具云佛陀華言覺僧梵語具云僧伽華言和合衆三貧窮福田謂若見貧窮困苦之人當起慈愍之心以己所有資生等物而給施之唯不求報則亦自然獲福是名貧窮福田三福業出增一阿含經一施福業謂修行之人若遇貧窮之人來乞之時須食與食須衣與衣乃至臥具醫藥隨其所欲皆悉施與因施獲福是名施福業也二平等福業謂修行之人能持戒律不興惡想梵行端嚴語言和雅以平等慈悲愛護之心普覆一切有情令得安隱以平等心而能致福是為平等福業也三思惟福業謂修行之人以智慧觀察了知出要之法遠離世間塵緣雜想以此思惟為出世善福之業是為思惟福業也三供養出普賢行願疏一財供養謂以世間財寶及以種種上妙諸供養具供養諸佛菩薩是名財供養菩薩梵語具云菩提薩埵華言覺有情二法供養謂依佛所説教法修於衆行乃至不捨菩薩業不離菩提心即是以法供養諸佛菩薩是名法供養梵語菩提華言道三觀行供養謂依中道妙觀觀於一念之心具足三諦之法無有減衆生諸佛平等不二煩惱生死即是菩提涅槃念念觀之即是供養諸佛菩薩是名觀行供養三諦者真諦俗諦中諦也梵語涅槃華言滅度三應供養出增一阿含經一如來所應供養謂如來出現世間咸欲利樂一切衆生於天人中最尊最上不降伏者而降伏之無救護者而救護之未度脫者而度脫之以是因緣一切天人所應供養二阿羅漢所應供養梵語阿羅漢華言無學謂阿羅漢生死已盡梵行已立而能利益有情為世福田以是因緣一切天人所應供養三轉輪聖王所應供養謂轉輪聖王恆以正法治化天下使其人民不殺不盜無諸過惡咸被恩澤各得其所以是因緣一切人民所應供養三種示導出般若經示開示導引導謂菩薩見諸有情在地獄中受極苦報即起拯濟之心故有三種示導也一神變示導謂菩薩憫彼地獄之苦故現神通之力滅除湯火刀劒種種苦具令諸衆生藉此神變從地獄出生天人中受諸快樂是為神變示導二記説示導謂菩薩憫彼地獄之苦而於衆生念念記憶不忘而為説法令諸衆生藉此法力從地獄出生天人中受諸快樂是為記説示導三教誡示導謂菩薩憫彼地獄之苦即發慈悲喜捨之心説法教誡令諸衆生藉此教誡從地獄出生天人中受諸快樂是為教誡示導三善道出四教儀集注三善道者謂天人阿修羅同修十善雖有上中下品不同皆名善道十善者不殺生不偷盜不邪不妄語不兩舌不惡口不綺語不貪欲不瞋恚不邪見也一天道天即欲界色界無色界諸天也謂因修上品十善復修世間禪定得生其中是名天道二人道人即四天下之人也謂因行五常五戒復行中品十善得生其中是名人道四天下即四洲東弗于逮西瞿耶尼南閻浮提北鬱單越也五常者仁義禮智信也五戒者不殺不盜不邪不妄語不飲酒也三修羅道梵語阿修羅華言無酒謂雖行五常欲勝他故行下品十善得生其中是名修羅道亦名仙道者以修羅一道攝屬不定故也無酒者修羅於四天下採花醞於大海魚龍業力其味不變逐瞋妬誓斷酒故名無酒三種禮佛出華嚴孔目一成過禮謂禮佛時身儀不正而與輕慢相應如碓上下佛制有過是名成過禮二相似禮謂禮佛時身儀雖似端正而與雜覺相應是名相似禮雜覺者謂覺知之念紛雜也三順實禮謂禮佛時身儀端正而與正智相應隨順實理是名順實禮三發心出翻譯名義一發大智心謂欲以智慧廣求一切佛法普令衆生皆得法喜之樂是名發大智心二發大悲心謂慈愍一切衆生輪回生死受種種苦誓願救是名發大悲心三發大願心謂依四弘誓願發無上菩提之心上求佛道下化衆生是名發大願心四弘誓願者衆生無邊誓願度煩惱無數誓願斷法門無量誓願學佛道無上誓願成也三發心出釋氏要覽一厭離有為發心謂人厭惡世間皆是有為之法能招三界生死之苦欲求出離此苦即發心修行是名厭離有為發心三界者欲界色界無色界也二所求菩提發心梵語菩提華言道謂人宿有善本具正知見欲求出世妙道即發心修行是名所求菩提發心三饒益有情發心有情即衆生也謂人起慈悲心愍念世間一切衆生受生死苦即發心修行願其苦而與其樂是名饒益有情發心三種發心出觀經妙宗鈔觀無量壽佛經云若有衆生願生彼國者發三種心當得往生彼國者西方安養淨土也一至誠心至專也誠實也謂此土衆生欲生彼國當發專至誠實之心正念真如求願往生故名至誠心二深心謂求無上佛果必須心契深理欲契深理必須厚種善根涅槃經云深根難故名深心三發願心謂以真如實心趣果善心二心功德善巧回向發願求生淨土速證法忍廣一切衆生苦惱故名發願心法忍者謂於無生之法忍可忍證也三種發菩提心出起信論一直心直心者謂心常質直離諸諂曲能行正法即是菩提之心也二深心深心者謂於正法心生深信而復樂修一切善行即是菩提之心也三大悲心大悲心者悲即悲愍謂悲愍一切受苦衆生常思救護令其安樂即是菩提之心也三行亦名三種業出大智度論并王法念處經一福行謂因修十善等福報生欲界天上人間及阿修羅享福受樂故名福行十善者不殺生不偷盜不邪不妄語不兩舌不惡口不綺語不貪欲不瞋恚不邪見也梵語阿修羅華言無酒二罪行謂因作五逆十惡等罪報生畜生餓鬼地獄責罪受苦故名罪行五逆者一殺父母二破和合僧三出佛身血四殺阿羅漢五破羯磨僧也十惡者殺生偷盜邪妄語兩舌惡口綺語貪欲瞋恚邪見也三無動行亦名不動行謂修世間禪定報生色界無色界天心定不動故名無動行三種清淨出大智度論一心清淨謂修學般若菩薩不生染心不生瞋心不生憍慢心不生慳貪心不生邪見心是名心清淨梵語般若華言智慧二身清淨謂修學般若菩薩心既清淨再後受身常得化生是名身清淨三相清淨謂修學般若菩薩身心既皆清淨則能具足相好莊嚴其身故名相清淨清淨三業出瓔珞經經云須菩提問佛色身佛即以三業答之梵語須菩提華言空生又云善現一身行清淨謂身之所行能防塞一切諸不善法是名身業清淨二口言真誠謂凡所言説真實誠信永離邪妄之語是名口業清淨三意專向道謂𭣣攝身心常居寂定無他異念是名意業清淨三業供養出法華文句一身業供養謂身至誠敬禮諸佛菩薩是名身業供養二口業供養謂口發言稱美諸佛菩薩功德是名口業供養三意業供養謂端心正意想念諸佛菩薩相好是名意業供養三種淨業出觀無量壽佛經經云韋提希白佛言世尊我今樂生極樂世界阿彌陀佛所唯願世尊教我思惟教我正受於是世尊以三種淨業答思惟十六妙觀酬正受故知三種淨業乃往生淨土之因也梵語韋提希華言思惟梵語阿彌陀華言無量壽十六妙觀者日觀水觀地觀寶樹觀八功德水觀總觀華座觀像觀佛真身觀觀世音觀大勢至觀普想觀雜想觀上輩生觀中輩生觀下輩生觀也一孝養父母等業謂若能孝養父母奉事師長則必慈心不殺修行十善是為淨業十善者不殺生不偷盜不邪不妄語不兩舌不惡口不綺語不貪欲不瞋恚不邪見也二受持三歸等業謂歸依佛法僧寶具足衆戒不犯威儀是為淨業三發菩提心等業梵語菩提華言道謂發無上道心深信因果誦大乘經勸進行者是為淨業三施出大智度論一財施謂自能持戒不侵他人財物又能以己之財施與他人是名財施二法施謂既能財施又能為人説法令其開悟是名法施三無畏施謂一切衆生皆畏於死持戒之人無殺害心令其無畏是名無畏施三施出華嚴經疏鈔一飲食施飲食施者謂見飢餓之人即以飲食濟其困餒是名下品施二珍寶施珍寶施者謂見貧窮之人即以財物珍寶周其窘乏是名中品施三身命施身命施者謂但割身肉濟於飢餓衆生名身施若全身施與命亦隨盡名命施此施極難極重是名上品施三輪體空出能斷金剛經論謂布施時體達施者受者及所施物皆悉本空則能摧碾執著之相是名三輪體空一施空謂能施之人體達我身本空豈有我為能施既知無我則無希望福報之心是名施空二受空謂既體達本無我為能施之人亦無他人為受施之者是名受空三施物空物即資財珍寶等物謂能體達一切皆空豈有此物而為所施是名施物空三種不堅易三堅法出本事經一不堅財貿易堅財謂一切世間財物體非堅固聚散無常不可久保若能持用布施清淨梵行之人遠求無上安樂涅槃或求當來天人樂果即為堅固之財永久不壞矣是為不堅之財貿易堅財也梵語涅槃華言滅度二不堅身貿易堅身謂父母所生之身乃四大假合而成危脆不實體非堅固生滅無常不可久存若能持守五戒清淨無染修習菩提無上之道以證金剛不壞之身是為以不堅身貿易堅身也四大者地大水大火大風大也五戒者不殺不盜不邪不妄語不飲酒也三不堅命貿易堅命謂人所受之命雖壽夭不齊皆同夢幻體非堅固倐忽無常不可久保若能了知四諦修習正法超越生死以續常住不朽慧命是為以不堅命貿易堅命也四諦者苦諦集諦滅諦道諦也三聚戒出菩薩戒義疏并法苑珠林聚集也戒禁戒也此三種戒能攝一切大乘諸戒故名三聚戒法苑珠林云大聖度人功唯在戒莊嚴論云初律儀戒以禁防為體後攝善攝生二戒以勤勇為體一攝律儀戒攝律儀戒者謂一切律儀無不聚攝也律即法律是禁止之義儀即儀式是軌範之義法苑珠林云攝律儀者要唯有四一者不得為利養故自讚毀他二者不得故慳不施前人即外人也三者不得瞋心打罵衆生四者不得謗大乘經典持此四法無惡不離故名攝律儀戒二攝善法戒攝善法戒者所行之行能攝一切善法也謂身口意所作善法及聞思修三慧布施等六度之法無不聚攝故名攝善法戒三慧者一聞慧謂聞法而生智慧也二思慧謂思惟而生智慧也三修慧謂修習而生智慧也六度者一布施二持戒三忍辱四精進五禪定六智慧也三攝衆生戒攝衆生戒者謂能攝受一切衆生也能攝之行即是慈悲喜捨慈名愛念能與衆生樂故悲名憐愍能衆生苦故喜名喜慶慶一切衆生離苦得樂故捨名無憎無愛常念衆生同得無憎無愛故以此等法攝諸衆生也三事戒出大寶積經一身淨戒謂身受諸戒無有闕漏無有毀犯是名身淨戒二言淨戒謂一切所説語言無有諛諂虛誑不實是名言淨戒三意淨戒謂蠲除惡覺離諸貪欲是名意淨戒滅有三義出華嚴經隨疏演義鈔華嚴疏云梵語毗尼或翻為滅滅有三義一滅業非謂戒能滅殺盜等罪業之過非故名滅業非二滅煩惱謂戒能滅貪瞋癡等煩惱故名滅煩惱三得滅果謂因戒故既滅業與煩惱即得無為寂滅之果故名得滅果三種忍行出諸經要集一身忍行謂菩薩修行時捨身命財無有吝惜雖被割截身體而能忍受是名身忍行二口忍行謂菩薩修行時雖被人輕嫌打罵聞已能忍不起鬪諍是名口忍行三意忍行謂菩薩修行時雖被人毀訾罵辱瞋恚呵責聞已能忍不起忿恨之心是名意忍行三種精進出菩薩善戒經一莊嚴精進莊即端莊嚴即嚴飾謂菩薩發心時精勤修習一切梵行莊嚴道果復為化諸衆生於三界中示現受生乃至為慈悲故入地獄中代其受苦心不休息是名莊嚴精進三界者欲界色界無色界也二攝善法精進謂菩薩既修六度梵行不為煩惱惡業邪見之所傾動攝持世間出世間一切善法心不放逸是名攝善法精進六度者一布施二持戒三忍辱四精進五禪定六智慧也三利益衆生精進謂菩薩於一切時修習聖道利益一切衆生以種種法而化導之咸使斷滅惡因成就善果雖歷塵劫心不疲倦是名利益衆生精進三種勝勇猛出大乘莊嚴經論一願勝勇猛願即誓願謂初修行之時須發四弘誓願發大勇猛成佛菩提廣化有情知勝功德是名願勝勇猛四弘誓者衆生無邊誓願度煩惱無數誓願斷法門無量誓願學佛道無上誓願成也梵語菩提華言道二行勝勇猛行即所修之行謂至心學道能行妙行發大勇猛決趣菩提是名行勝勇猛三果勝勇猛果即修因所感之果謂一心精進修諸妙行發大勇猛決求成佛於彼之時與一切佛平等無二是名果勝勇猛三種定業輪出地藏十輪經定即禪定業即行業輪有運轉摧輾之義謂如來以禪定誦習之法輪摧輾一切煩惱惑業而成無上菩提亦令衆生如説修行而證道果故説此三種定業輪也梵語菩提華言道一建立修定業輪謂令衆生修行正觀觀察無明煩惱起滅之相及觀察世間如幻如化以安那般那數息之法修習靜慮則能摧破一切惑業心住正定是為建立修定業輪梵語安那般那華言出息入息即數息觀也二建立習誦業輪謂令衆生習誦大乘經教初中後夜精勤無怠心不散亂則能摧破一切惑業是為建立習誦業輪三建立營福業輪謂令衆生修行布施持戒造像建塔供佛法僧又營種種福報之事則能摧破一切惑業是為建立營福業輪三勝學出瑜伽師地論一增上戒學謂具足受持大小乘戒制伏過非成就威儀於諸戒法而能增勝是名增上戒學二增上心學謂能捨欲界諸不善法得入初禪乃至入第四禪於諸定心而能增勝是名增上心學初禪四禪即色界天也三增上慧學謂於四聖諦等法如實能知是名增上慧學四聖諦者苦聖諦集聖諦滅聖諦道聖諦也三事無盡出衆德三昧經一布施無盡謂菩薩好喜布施不吝財物乃至軀命悉能施與心不疲厭是名布施無盡二持戒無盡謂菩薩護持禁戒未曾違捨見犯戒者憐愍悲哀見奉戒者尊重愛敬復以戒法傳化他人心不疲厭是名持戒無盡三博聞無盡謂菩薩聞如是法即當奉行思欲化他必須博學一切經典與夫世間藝術無不諳練求聞稟聽心不疲厭是名博聞無盡
