body:
  text: 上天竺前住持沙門一如等奉勑集注一心出華嚴經一心者一念之心也心性周遍虛徹靈通散之則應萬事斂之而成一念是故若善若惡若聖若凡無不皆由此心以心本具萬法而能成立衆事經云三界無別法惟是一心作是也三界者欲界色界無色界也一心約教有異出華嚴一乘教義分齊章謂賢首祖師一宗判教有五蓋小教假四諦而說心得悟解始教約第八識心了一切緣生之法皆空各無自性而受異熟之果終教言恆沙一切性妙功德具於如來藏心頓教即於一念不生之心無染無淨頓顯理性圓教主伴圓融法法無礙一即一切一切即一卷舒自在總該萬有然教雖有五而不出一心是名一心約教有異第八識即藏識也異熟果者如以前世善惡之業為因而成今世善惡之果以其異生而熟故名異熟也一善心出涅槃經心即以根對塵所起一念之心也若起一念惡即消滅衆善若起一念善即破除衆惡故經云修一善心破百種惡是也一人出仁王護國經一人者佛也佛本於人中得道故亦稱人世間出世間最尊最勝故名一人經云三賢十聖住果報惟佛一人居淨土是也三賢即十住十行十回向諸位菩薩也十聖即十地菩薩也果報即實報土也淨土即常寂光淨土也一身出華嚴經身即法身也蓋十方諸佛無明之惑淨盡法性之體全彰無有自他色相之異故名一身經云一切諸佛身惟是一法身是也一虛出普賢行願品疏謂如來真身無形無相猶若虛空雖同一虛萬像森然雖含萬像一相不立疏云寂寥於萬化之域動用於一虛之中是也一月喻三身出寶王論一月喻三身者以月體喻法身月光喻報身月影喻應身也蓋由法身即是常住之理理體惟一不遷不變而能出生諸法統攝萬事猶如月體一輪在天影含衆水報身即是寂照之智智無自體依理而發明了一切無有差謬猶如月光照臨萬像無有隱形應身即是變化之用用無自性從體而起有感則通無感不應猶如月影有水則現無水不顯然此三身本是一體從用立名故有多種論云法身如月之體報身如月之光應身如月之影是也一月三舟喻出華嚴經疏謂澄江一月三舟共觀一舟停住二舟向南北行向南者見月隨南向北者見月隨北停舟者見月不移蓋譬如來智無不周體無不在無依無住無去無來皆由衆生緣有生熟故見如來有去住相法身之體本無去住也一月喻佛三舟喻世間衆生見佛不同是名一月三舟喻也一法出華嚴經法即軌則之義謂諸佛菩薩莫不軌則真如之法修之而成正覺故經云惟以一法而得出離成阿耨多羅三藐三菩提是也梵語阿耨多羅三藐三菩提華言無上正等正覺一理出法華經玄義一理者諸法之本體也理性容攝其大無外諸法雖殊理元是一理雖是一而能統貫諸法諸法雖殊莫不本乎一理事理融通法法無礙是則世間出世間法皆不外乎此也一乘出法華經一乘者佛乘也乘即運載之義佛說一乘之法為令衆生依此修行出離生死苦海運至涅槃彼岸故喻以七寶大車而導之以大白牛也佛之出世意欲直說法華蓋由衆生機器不等於是先說三乘之法而調熟之故經云於一乘道分別說三後至法華會三乘之小行歸廣大之一乘又云十方佛土中惟有一乘法是也梵語涅槃華言滅度七寶者金銀琉璃玻瓈硨磲碼瑙赤真珠也三乘者聲聞乘緣覺乘菩薩乘也一雨出法華經一雨者喻佛所說一乘之法也蓋佛說法華惟談圓教一實相理純一無雜即是如來一音宣澍一乘法雨咸令衆生開佛知見經云一雨所潤是也一門出法華經門者即能通之義一謂一理即是所通門謂正教即是能通蓋譬佛所說一乘之教則能通於實相之理經云惟有一門是也一味出法華經并法華玄義一味者喻法華一乘之教也如來說法必稱機宜以其機有大小故歷四時三教漸次調停令其入大然後高會靈山純談一妙開前四時三教之法即是圓妙一乘一乘之外更無別法故經云决了聲聞法是諸經之王是以無垢藏王菩薩於涅槃會上白佛言佛說十二部經譬如從牛出乳蓋喻初時說華嚴經也次云從乳出酪喻華嚴經後第二時說阿含經也次云從酪出生酥喻阿含經後第三時說淨名寶積等經也次云從生酥出熟酥喻淨名等經後第四時說般若經也次云從熟酥出醍醐喻般若經後第五時說法華涅槃經也如此展轉相從說者據如來施化次第而言耳若據法華開前諸教諸乘即是圓妙一乘則顯乳酪二酥皆成一醍醐味經云一相一味是也四時者華嚴時鹿苑時方等時般若時也三教者藏教通教別教也十二部經者一契經二重頌三授記四孤起五無問自說六因緣七譬喻八本事九本生十方廣十一未曾有十二論義也一大事因緣出法華經一即一實相也其性廣博故名為大如來出世度生之儀式故名為事衆生具此實相而能成機感佛故名為因如來證此實相而能起應度生故名為緣一切如來出現於世皆為開示一切衆生本有實相令其咸得悟入佛之知見捨此則非如來出世本懷經云如來惟以一大事因緣故出現於世是也一覺出起信論一覺者十界衆生本性之覺也謂六道衆生業惑所覆不能覺了名為不覺三乘之人斷惑證理未能究竟名隨分覺惟佛一人諸惑淨盡徹見本性名究竟覺迷悟雖殊覺體本一論云本來平等同一覺故是也十界者佛界菩薩界緣覺界聲聞界天界人界阿修羅界餓鬼界畜生界地獄界也佛亦名衆生者佛為無上衆生也六道者天道人道修羅道餓鬼道畜生道地獄道也三乘者菩薩乘緣覺乘聲聞乘也一道出華嚴經一道者一實之道即佛所說最上乘之法也若依此道而修則能頓斷諸惑頓出生死非如二乘等次第超出經云一切無礙人一道出生死是也二乘者緣覺乘聲聞乘也第一義出大集經第一義者即無上甚深之妙理也其體湛寂其性虛融無名無相絶議絶思經云甚深之理不可說第一義諦無聲字是也無聲字者謂離語言文字之相也一實諦出涅槃經謂一實相中道之理也無有虛妄無有顛倒若聖若凡性本不二故名一實諦也一實相印出法華玄義一實相者謂真實之理無二無別離諸虛妄之相也印者信也如世之公文得印可信蓋如來所說諸大乘經皆以實相之理印定其說外道不能雜天魔不能破若有實相印即是佛說若無實相印即是魔說經云世尊說實道波旬無此事是也梵語波旬華言惡釋迦如來出世時魔王名也一實境界出占察善惡業報經一實境界者即一實相之理也不變不異無滅無生自性清淨離虛妄相猶如虛空平等普遍諸佛衆生無二無別也一地出法華經一地者一實相地也地有能生之義一切草木種子皆依於地而得生長以譬人天聲聞緣覺菩薩一切習因種子皆依五陰之身增長成熟至於法華會上聞佛說一乘法皆成菩薩法性五陰則是一實相地故經云一地所生是也習因者所作之因習續不斷也五陰者色陰受陰想陰行陰識陰也一法印出宗鏡録一法印者謂一念心含攝一切世間出世間法無不悉備然此諸法於一心中炳然顯現如即印泥文無前後故云森羅及萬像一法之所印是也一法界出起信論一法界即一真如之理體性虛融平等不二也一真法界出華嚴經隨疏演義鈔無二曰一不妄曰真交徹融攝故曰法界即是諸佛平等法身從本以來不生不滅非空非有離名離相無內無外惟一真實不可思議是名一真法界一藏出華嚴經疏藏即含藏之義謂法界之理竪窮三際橫遍十方無德不備無法不攝一一詠羅重重無盡若世間法若出世間法無不含藏故名一藏三際者過去現在未來也一會出法華要義一會者謂如來於靈山會上與諸大衆說法華經之時也隋天台智者大師於光州大蘇山修法華三昧誦法華經至藥王菩薩品中是真精進是名真法供養如來之句身心豁然寂而入定徹見靈山一會儼然未散是也梵語三昧華言正定一極出普賢行願品疏一極者謂華嚴經廣談法界之旨妙極無二也蓋如來出世首為諸大菩薩說佛菩薩真實境界不說二乘方便之法是故聲聞緣覺雖在聽次有如聾聵寂無所聞故疏云一極唱高二乘絶聽是也二乘者聲聞乘緣覺乘也一致出華嚴經隨疏演義鈔一致者謂佛乘宗極之趣惟一也如來設化始隨機宜不同故有三乘之說終歸顯實但名佛乘一致之理鈔云混萬化即真會精粗一致是也三乘者聲聞乘緣覺乘菩薩乘也一源出華嚴經隨疏演義鈔一源者甚深法界之體也此體不變不遷非真非妄因隨緣故有真有妄若隨法性淨緣則能出生諸佛之法若隨無明染緣則能出生衆生之法染淨之緣雖別法界之體無殊譬如流水流雖清濁有異所出之源是一也一體出法界觀一體者常住真心之體也自性清淨一體無二妄想忽生境界頓現於是有情衆生無情國土從一真心妄分為二當知有情無情皆是衆生自心所變實非外物故頌云情與非情共一體是也一偈出翻譯名義一偈者西域記云舊曰偈或曰偈他梵音訛也今從正音宜云伽陀華言頌諸經雖五字七字為句不同皆以四句為一偈也一句出華嚴經一句者謂經中所說普眼法門一句功德不可思議也經云假使有人以大海量墨須彌聚筆書寫此普眼法門一品中一門一門中一法一法中一義一義中一句不得少分何况能盡是也普眼者眼外無法名為普眼一言出圓覺經略疏一言者謂圭峯密禪師讀圓覺經未終其卷於一言下豁然開悟乃知自心即是佛心定當作佛故疏序云一言之下心地開通是也一語出華嚴經疏一語者如來之語也經云如來於二語言中演說無邊契經海蓋言於一語中演說妙法無量無邊譬如泉之初發細若一線流之不已為江為海無有窮盡也一名出涅槃經名即名字謂理雖是一假言施設種種不同如經中只一涅槃之名如來隨機演說亦名無生亦名無作亦名無為亦名解脫亦名彼岸亦名無退亦名安處亦名寂靜亦名無相亦名無二亦名一行亦名清凉亦名無諍亦名吉祥雖立多種之別只是涅槃一名是為一名一字出大方廣師子吼經一字者一理之名字也理本無名無字超心意識離性離相無作無示非諸衆生所能思說惟佛如來究盡明了經云法惟一字所謂無字是也一義出華嚴經義即義理即一法中或一句中之一義也一音出維摩經一音者佛之音聲也蓋衆生緣有淺深根有利鈍故於一音之中同聽異聞若是人天根器則聞佛說五戒十善之法若是聲聞根器則聞佛說四諦之法若是緣覺根器則聞佛說十二因緣之法若是菩薩根器則聞佛說六度等法各得解了經云佛以一音演說法衆生隨類各得解是也五戒者不殺不盜不邪淫不妄語不飲酒也十善者不殺不盜不邪淫不妄言不綺語不兩舌不惡口不貪不嗔不癡也聲聞者聞佛聲教悟真空理故名聲聞也四諦者苦諦集諦滅諦道諦也緣覺者因觀十二因緣覺真空理故名緣覺也十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死也菩薩者梵語具云菩提薩埵華言覺有情六度者一布施二持戒三忍辱四精進五禪定六智慧也一音教出華嚴經疏一音教者謂如來一代之教雖有頓漸諸說不同而皆不出一音也故羅什法師云佛一圓音平等無二無思普應機聞自殊是也梵語羅什華言童壽一宗出華嚴經疏宗者要也謂諸大乘經所說雖異莫不同乎一理如華嚴之談法界般若之談佛母法華之談實相等皆以一理為其宗要鈔云一宗容具多經是也一相出起信論謂一真法界之相從本以來離虛妄相離言說相離名字相離一切諸法之相故名一相一合相出金剛經一合相者蓋言衆塵和合而為一世界也世界本空微塵不有但衆生不了妄執為實若是實有即應世界不可分為微塵若是實無不應微塵合為世界是知執有執無皆不當理經云如來說一合相即非一合相是名一合相是也一性出涅槃經一性者即正因佛性也謂一切衆生皆具此性但背覺合塵常為煩惱之所覆障若順性而修則能超脫生死悟入涅槃與佛所證無二無別也梵語涅槃華言滅度煩惱者昏煩之法惱亂心神也一性出華嚴經性以不變為義上極諸佛下至蠕飛蠢動雖品類萬差莫不本乎一性迷之則成生死悟之而為涅槃迷悟雖殊其性本一是為一性也蠕而宣切蟲行貌蠢尺尹切蠢動也梵語涅槃華言滅度一因出涅槃經一因者謂聖凡平等之理體也蓋此理體諸佛衆生皆性本具初無增减然諸佛悟之而成妙果衆生迷之而流轉諸趣若全此一因而修圓頓之行則能超出三乘所修之因而證一乘之果也三乘者聲聞乘緣覺乘菩薩乘也一如出首楞嚴三昧經不二不異名曰一如即真如之理也所謂真如界內絶生佛之假名平等性中無自他之形相故經云魔界如佛界如一如無二如是也魔梵語具云魔羅華言殺者謂能奪人功德之財殺人智慧之命也佛梵語具云佛陀華言覺者謂能自覺覺他覺行圓滿也魔佛皆言如者魔為修惡之極佛為修善之極善惡雖分其性本一故云一如無二如也一行出涅槃經一行者如來所行之行也行以進趣為義能行此行則能趣向佛果雖名一行而具足五行故經明五行之後乃云復有一行是如來行謂能於一心中行於五行具足而無缺也五行者聖行梵行天行病行嬰兒行也一行三昧出文殊師利所說摩訶般若波羅蜜經梵語三昧華言調直定又云正定一行三昧者惟專一行修習正定也謂修行之人應處空間捨諸亂意繫心實理想念一佛專稱名字隨佛方所端身正向能於一佛念念相續而不懈怠於一念中即能得見十方諸佛獲大辨才也一解脫出涅槃經解脫者無拘無礙自在之謂也一切衆生同有佛性本來解脫良由心生執著妄自迷倒受諸纏縛若能一念反妄歸真了縛無縛則與諸佛如來同一解脫無有差別經云同一解脫是也一空出寂調音所問經一空者謂一切諸法皆無自性若色若心若依若正乃至聖凡因果之法雖種種不同求其體性畢竟皆空經云如瓦器中空寶器中空俱同一空無二無別是也依者依報即國土也正者正報即衆生身也一生出法華經一生者謂等覺菩薩無明之惑未盡尚有一番變易生死過此一生即登妙覺果佛之位所以等覺菩薩稱為一生補處經云一生當得阿耨多羅三藐三菩提是也等覺者望後妙覺猶有一等超前諸位得稱為覺無明者無所明了即障理之惑也變易者即實報土生死也因移果易故名變易生死妙覺者自覺覺他覺行圓滿不可思議也一生出華嚴經隨疏演義鈔謂善財童子一生之內圓成佛果故慈氏菩薩讚善財言餘諸菩薩於無量劫乃能滿足菩薩行願此長者子於一生內能淨佛土能化衆生是名一生慈氏菩薩即彌勒菩薩也一來出四教儀一來者謂二果斯陀含於欲界九品思惑中前六品雖盡後三品猶在故更來欲界一番受生是名一來梵語斯陀含華言一來九品者上中下三品每品中又分三品也一師出四分戒品師者受道之師也凡諸比丘同一師學當須和合歡喜無諍猶如水乳於佛法中庶得增益是名一師梵語比丘華言乞士一子出涅槃經謂菩薩修慈悲行視諸衆生猶如一子若見衆生修習善業勝進聖道心則歡喜若見衆生造作惡業流轉生死心則愁惱譬如父母見子安隱心則歡喜見子遇患心則苦惱經云視諸衆生同於一子是也一修一切修出華嚴經隨疏演義鈔一修一切修者謂上根大智之人全性起修了修即性修性不二事理互融燒香散花無非中道習禪誦經盡是真如是故一行修則一切行無不修焉一斷一切斷出華嚴經隨疏演義鈔一斷一切斷者謂上根之人斷惑無漸次也中下根人不知妄惑即是真智所以斷惑有其漸次上根之人了惑即智達妄即真惑外無智妄外無真所以一斷則一切斷也一證一切證出華嚴經隨疏演義鈔一證一切證者謂上根之人以圓妙之智照了性境圓融無始無終非淺非深不有不空無法不𬾨無處不通是故一處證入則一切處皆證入矣一成一切成出華嚴經疏一成一切成者謂一佛成道法界無非此佛之依正也依即所依之土正即能依之身以其迷時則衆生國土皆迷悟時則衆生國土皆悟蓋約一人惟心即具而說故楞嚴經云一人發真歸源此十方空皆悉消殞是也一位一切位出華嚴經疏一位一切位者謂上根之人證一地位則具足一切地位之功德也蓋所證之位全是法性法性遍周恆沙功德無不含攝是故證一地位則一切地位功德皆悉具足也一行一切行出華嚴經疏一行一切行者謂上根之人依於一乘圓融之教建立圓頓之行圓頓行立契合一乘故能於一行中具足一切諸行也一障一切障出華嚴經隨疏演義鈔一障一切障者謂造惡衆生一念瞋心起百萬障門開一切善根皆悉消滅一切業障同時增長所以一障則一切障也一念出華嚴經念即心念此之一念有真有妄若凡夫以根對塵所起之念念念生滅此妄念也若離根塵真淨明妙虛徹靈通之念即是如來正智之念也此正智之念非生非滅不常不斷促一剎那而非短延無量劫而非長經云一念普觀無量劫是也根者眼耳鼻舌身意六根也塵者色聲香味觸法六塵也梵語剎那華言一念劫梵語具云劫波華言分別時節一剎那出仁王護國經梵語剎那華言一念經云一念中有九十剎那一剎那中有九百生滅俱舍論云時之極少者名剎那是也念有大小一念者大念也一剎那者小念也一根出楞嚴經一根即耳根也蓋由此方之人耳根最利聞法易入故文殊選揀圓通之門取耳根為第一也然以耳根為圓通門者特假其通入而已必期脫去聲塵反聞自性然後為復本歸源之至一根既然諸根亦寂經云一根既返源六根成解脫是也六根者眼根耳根鼻根舌根身根意根也一機出楞嚴經機謂機關即發起之處也一機以喻耳之一根一根返源諸根解脫經云雖見諸根動要在一機抽是也一色出仁王經疏色者眼根所對之色也色即法界具足三諦以一切法體性融通互攝無礙若一切色即一色此是真諦忘泯一切法也若一色即一切色此是俗諦建立一切法也若非一非一切亦一亦一切此是中諦雙遮雙照即中道也盡理言之非但色之一塵具足三諦聲香味觸法五塵莫不皆然舉色則一切法皆在於色色外無法舉香則一切法皆在於香香外無法疏云一色一香無非中道是也法界者法法皆以三諦而為界分即是理也雙遮雙照者遮謂遮情照謂照性即雙遮真俗雙照真俗也一指出楞嚴經一指手之一指經云若我滅後其有比丘發心决定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏也梵語三摩提華言等持離昏沈掉舉曰等令心住一境性曰持諸漏即三界生死也一髮出摩訶僧祇律一髮者謂日晷過午一髮許也蓋言修行之人持齊之法日正當午乃受飲食若日過午一髮許則不當食也一毫出普賢行願品疏疏云一字法門海墨書而不𥁞一毫之善空界盡而無窮此言華嚴大經功德浩博不可測量不可稱說而虛空界有𥁞一毫之善無窮也一毛出楞嚴經經云於一毛端現寶王剎此是正報中現依報也由佛具足不思議神通之力故能依中現正正中現依依正融通事理無礙大小相含一多平等故於一毛之端能現寶王剎也一氣出圓覺經略鈔一氣者道之所宗陰陽天地之根本也以喻自性清淨之心未起染淨已前諸佛衆生平等不二一切諸法莫不皆由此心而生故以一氣喻一心也一瞬出摩訶僧祇律瞬者目動也律云二十瞬名一彈指謂修行人持齊之法日正當午乃受飲食若日過午一瞬則不當食一默出維摩經默者無言也默必對說諸佛菩薩或說或默皆能顯於妙理故經中三十二菩薩各談不二法門竟文殊師利問維摩詰言仁者當說何等是菩薩入不二法門時維摩詰默然無言文殊歎曰善哉善哉乃至無有文字語言是真入不二法門此即默而說即說而默也梵語文殊師利華言妙德梵語維摩詰華言淨名一時出各經之首一時者佛與弟子說聽和合之時也是故諸經之首皆言一時法華文句云聞持和合非異時是也聞持者弟子從佛聞法而受持也一時一切時出華嚴經疏一時一切時者謂一時之間即為無量劫也蓋如來智境圓融延促無礙故能促多劫為一時延一時為多劫經云一念普觀無量劫是也一食出維摩詰所說經一食者世間分假之食也若能於此一食了達三諦即成法食然後運平等心上供諸佛中奉賢聖下及六道等施無別經云以一食施一切是也三諦者真諦俗諦中諦也六道者天道人道修羅道餓鬼道畜生道地獄道也一餐出法華經一餐者一餐之食也蓋言聲聞之人於般若會上蒙佛加被為諸菩薩說大乘法聲聞自謂小乘而於大法不生喜樂譬若見食而不能餐經云而無希取一餐之意是也一切出翻譯名義一是普及之言切是盡際之語又云究竟非二名一其性廣博名切故名一切一處出遺教經一處者謂心專注一境而無他適也修行之人若能攝心斂念不涉餘緣則所修行業决可成辦經云制之一處無事不辦是也一剎出翻譯名義剎梵語具云剎摩華言土田即國土也謂一佛所化之境以大千世界而為一剎也大千世界者一日一月繞一須彌山照四天下為一世界一千世界為小千世界一千小千世界為中千世界一千中千世界為大千世界也一路出首楞嚴經路猶道也即能通之義謂諸佛如來離於生死入大涅槃無不皆以首楞嚴大定而為正路捨此則無由而入經云十方薄伽梵一路涅槃門是也梵語涅槃華言滅度梵語首楞嚴華言健相又云一切事竟堅固梵語薄伽梵佛之總號其義有六自在熾盛端嚴名稱吉祥尊貴為含多義故不翻也一塵出華嚴經一塵者一微塵也經云譬如有大經卷量等大千世界而全住在一微塵中一微塵既然一切微塵皆亦如是時有一人謂佛也智慧明達有淨天眼見此經卷在微塵內即以方便破此微塵出此經卷令諸衆生普得饒益以譬一切衆生身中具有如來無礙智慧但由衆生妄想顛倒而不自覺惟有諸佛乃能知之即以方便令諸衆生修於聖道破除虛妄煩惱顯出如來真實智慧故云一塵之內有大千經卷是也一漚出楞嚴經漚者水泡也海本澄湛因風飄鼓發起水泡以譬大覺之性真淨明妙因心妄動生起虛空世界虛空世界在大覺性中如大海中之一漚耳經云空生大覺中如海一漚發是也一蓋出維摩詰所說經經云毗耶離城有長者子名曰寶積與五百長者子俱持七寶蓋來供養佛佛之威神令諸寶蓋合成一蓋遍覆大千世界而此世界廣長之相悉於中現五百蓋者表五陰也合成一蓋者表一心也以顯五陰之法全是一心也梵語毗耶離華言廣博嚴淨五陰者色陰受陰想陰行陰識陰也一針出梵網經經云一針一草不得故盜謂持戒之人雖是微細之物不得故意盜取也一花出梵網經經云我今盧舍那方坐蓮華臺我者釋迦佛自謂也梵語盧舍那華言淨滿諸惑究盡謂之淨衆德悉圓謂之滿也方坐者方正也謂安住正法也蓮華者華藏世界也以其形似蓮華故以名之臺者華藏世界之中央也華嚴經云風輪持香海香海出蓮花蓮花持世界是也周匝千花上復現千釋迦蓮花有千葉故云千花一花葉上現一釋迦佛故云復現千釋迦此千釋迦乃從盧舍那佛出現也一花百億國一國一釋迦於一花葉復現百億國土每一國土又現一釋迦佛則有千百億國土千百億釋迦佛此千百億釋迦乃從千葉上千釋迦現出也通而言之盧舍那佛現出千釋迦千釋迦佛現出千百億釋迦今此四天下乃是千百億國土中之一土釋迦牟尼佛乃是千百億釋迦中之一佛也一燈出華嚴經謂燈能破暗以喻菩提之心能破煩惱之暗也故經云譬如一燈入於暗室百千年暗悉能破盡菩提心燈亦復如是入於衆生心室之內百千萬億不可說劫諸業煩惱種種暗障悉能除盡故名一燈梵語菩提華言道二法身出華嚴經疏一理法身理即性德也謂性淨明體本來離念等虛空界無所不遍諸佛衆生皆同一相是名理法身二智法身智即修德也謂究竟始覺之智契合清淨本覺之理理智互融色心不二智所現故是名智法身二法身出無著論一智相法身謂具足智慧方能演說諸法是則說法為智慧之相由此智相得至法身住處故名智相法身二福相法身謂以大千世界七寶布施不如受持一四句偈故金剛經云於此經中受持乃至四句偈等為人演說其福勝彼由此福相得至法身住處故名福相法身七寶者金銀琉璃玻𭹳硨磲碼瑙赤真珠也二法身出起信論疏一言說法身謂法身無相本離言說雖離言說非言莫顯故名言說法身二證得法身謂法身體遍物物皆具但以迷故不能究顯若不造修何由證得故以始覺之心契於本覺之理始本不二即究竟覺是名證得法身二佛身出涅槃經一法性身法性即法身也謂此法性之身遍滿十方無量無邊色像端正相好莊嚴以無量光明無量音聲能度十方法身菩薩是名法性身二生死身謂佛以方便力現生現滅示初出家乃至成佛得道一切惡法盡斷一切善法悉皆成就次第說法度諸衆生是名生死身二佛身出涅槃經一生身生身者謂從父母所生即佛應化之身也二法身法身者謂本有法性之身若佛出世及不出世常住不動無有變易也二佛身出涅槃經一常身如來常住解脫之身衆德悉𬾨萬行俱圓先百千萬億劫而不見其生後百千萬億劫而不見其滅是名常身也二無常身如來方便為欲度脫一切衆生示現生死之身出家修道成佛說法入於涅槃是名無常身也梵語涅槃華言滅度二身出華嚴經疏一真身真身者真智與法身合故名真身起信論云自體有大智慧光明遍照法界是也二應身應身者應周萬物化洽衆生隨其心量現種種身譬如一月現於衆水而無去來之相金光明經云應物現形如水中月是也二種色身出佛地經論一實色身實即實有謂諸如來因中於無數劫所修相好等業至于果成感得無量相好莊嚴其身周遍法界是名實色身二化色身化即變化謂諸如來由大悲願力為大菩薩衆現種種身種種相好種種言音隨時隨處隨衆所宜所現身形其量不定是名化色身大小二化身出華嚴經隨疏演義鈔一大化身謂佛被大乘菩薩之機或現八萬四千相好之身或現微塵數相好之身滿虛空中是名大化身二小化身謂佛被小乘及人天等機或現三十二相一丈六尺之身是名小化身三十二相者足安平相千輻輪相手指纖長相手足柔軟相手足縵網相足跟滿足相足趺高好相腨如鹿王相手過膝相馬陰藏相身縱廣相毛孔生青色相身毛上靡相身金色相身光面各一丈相皮膚細滑相七處平滿相兩腋滿相身如獅子相身端直相肩圓滿相四十齒相齒白齊密相四牙白淨相頰車如師子相咽中津液得上味相廣長舌相梵音深遠相眼色如金精相眼睫如牛王相眉間白毫相頂肉髻成相也佛二種十身出華嚴經疏一融三世間為十身融即融會之義隔別名世間差名間即衆生國土智正覺之三世間也言融三世間為十身者衆生身業報身即衆生世間國土身即國土世間聲聞身緣覺身菩薩身如來身智身法身虛空身即智正覺世間也二佛自具十身佛自具十身者一菩提身二願身三化身四力持身五相好莊嚴身六威勢身七意生身八福德身九法身十智身也梵語菩提華言道二覺出翻譯名義一自覺謂覺知過去未來現在三世一切諸法常無常等悟性真空了惑虛妄功成妙智能自開覺故名自覺二覺他謂自既覺已運無緣慈廣說諸法開悟衆生皆令離生死苦得涅槃樂故名覺他二覺出起信論一本覺謂衆生心體靈明虛廓本來離念等虛空界無處不遍即是如來平等法身是名本覺二始覺謂衆生本覺心源由無明熏動覺成不覺多劫在迷今始覺悟是名始覺始覺究竟即成佛也二種佛境出華嚴經疏一證境謂真如法性之理是諸佛所證之境界離念絶想皆悉真如是名證境二化境謂十方國土皆是如來所化境界是名化境二種身土出佛地經論身即能依之色身土即所依之國土既有能依之身必有所依之土故名二種身土一自受用身土自受用身土者謂自己修因之所感稱性受用種種法樂自在無礙故身名自受用身亦名圓滿報身土名自受用土亦名實報莊嚴土蓋諸佛如來歷無數劫修習無量善根所感周遍法界身土為自受用諸大菩薩但可得聞而不能見也二他受用身土他受用身土者謂他機之所感見也蓋諸佛如來為令諸菩薩衆受大法樂進修勝行隨宜而現或勝或劣或大或小轉變不定令他受用也身土二不相離出宗鏡録二不相離者謂身土二法皆不離法性也一法性屬佛為法性身謂佛了悟真如法性復以法性為身故名法性屬佛為法性身二法性屬法為法性土謂真如法性之理譬如虛空遍一切處乃是法身所證之體即為所依之土故名法性屬法為法性土二種神力出大智度論一令遠處見聞令遠處見聞者謂佛在一處說法以神通力令他方異土衆生皆獲見聞也二令各各見佛令各各見佛者謂佛在一處說法能令一一衆生各自見佛在前說法譬如日出影現衆水也二宿因力出華嚴經疏宿因力者謂遮那世尊宿世願因為化衆生發願修行而成佛果為酬宿願故今出世悲智雙運行願齊周乃以無障解脫之智頓闡華嚴一乘圓教法門普令法界衆生深悟如來智慧然佛宿因雖多略開二種焉一大願力謂佛於因中發大誓願度諸衆生今已成佛乘大願力示現十方世界說法度生現相品云毗盧遮那佛願力周法界一切國土中恆轉無上輪是也梵語毗盧遮那華言遍一切處亦云光明遍照二昔行力謂佛昔於無量劫依願起行行成得果方能演說諸法廣化衆生故主山神偈云往修勝行無有邊今獲神通亦無量法門廣闢如塵數悉使衆生深悟喜是也二足出金剛經纂要疏一福足謂佛於因中修行布施持戒忍辱精進禪定五度之福今於果上成就應身相好圓滿萬德莊嚴是為福足二慧足謂佛於因中由修般若妙慧成就法身圓極真常滿菩提果衆智莊嚴是為慧足梵語菩提華言道悉達太子二相出佛本行集經梵語悉達華言頓吉即佛幼時之名也二相者謂佛初生時淨飯王令相師占之相師云太子相好具有輪王及成佛之相也一輪王相輪王相者謂轉輪聖王亦具三十二相也相師言太子具足是相若其在家當作轉輪聖王王四天下也三十二相者足安平相千輻輪相手指纖長相手足柔軟相手足縵網相足跟滿足相足趺高妙相腨如鹿王相手過膝相馬陰藏相身縱廣相毛孔生青色相身毛上靡相身金色相身光面各一丈相皮膚細滑相七處平滿相兩腋滿相身如師子相身端直相肩圓滿相四十齒相齒白齊密相四牙白淨相頰車如師子相咽中津液得上味相廣長舌相梵音深遠相眼色如金精相眼睫如牛王相眉間白毫相頂肉髻成相也四天下即四洲東弗于逮南閻浮提西瞿耶尼北鬱單越也二成佛相成佛相者佛具三十二相相師言太子具足是相若捨王位出家求道必得成佛名遍十方化導一切也二種舍利出翻譯名義一生身舍利梵語舍利又云設利羅華言骨身謂如來應身滅度既闍維後所有舍利其色有三骨舍利色白𩬊舍利色黑肉舍利色赤體性堅固椎擊不碎若菩薩羅漢者其色則同而堅固不及光明經云此舍利者是戒定慧之所熏修甚難可得最上福田故人能起塔供養則得無量福報也梵語闍維華言焚燒二法身舍利大論云經卷是法身舍利謂如來所說中道實相之理不遷不變無滅無生亘古今而恆存彌天地而普覆人能至心如法受持即是得見如來法身其所獲福無量無邊故法華經云若經卷所住之處皆應起塔供養不須復安舍利此中已有如來全身是也二法出華嚴經疏一勝義法勝義法即涅槃也謂涅槃之法其義最勝故名勝義法梵語涅槃華言滅度二法相法法相法即四諦法也謂四諦之法各有相狀是名法相法四諦者苦諦集諦滅諦道諦也二法出楞伽經一自得法謂佛自行證得之法與十方佛無增無减是名自得法二本住法謂法界之法本來常住有佛無佛性相常然是名本住法二種法性出地持經法即軌則之義性即不改之義謂一切法性無改易皆可軌則而修故名法性一實法性謂一實之理離虛妄相本性平等無有變易一切諸佛莫不軌此法性修之而成正覺是名實法性二事法性謂世間種種諸法皆依於理施設建立所謂地水火風五陰等法隨俗所知所見雖屬於事實不外乎法性之理是名事法性五陰者色陰受陰想陰行陰識陰也契經二義出阿毗達磨大毗婆沙論契者上契諸佛之理下契衆生之機經者法也常也如來所說契經有此結集刊定之二義也一結集義謂如來契經攝持衆義冠有情心令無忘失猶結華鬘冠衆生首久無遺散也二刊定義謂如來契經裁斷衆義了別是非去惡留善猶匠繩墨治彼衆材斫邪歸正去曲留直也二般若出大智度論梵語般若華言智慧謂佛於般若會上說通別圓三教之法故有共不共般若之名也一共般若共般若者即通教也通即通共之義謂聲聞緣覺菩薩三乘之人共依此教而修證也二不共般若不共般若者即別圓二教也謂此別圓二教唯談菩薩修行之法不與聲聞緣覺之所共也二般若出華嚴經疏一實相般若實相般若者謂本覺之理非寂非照離虛妄相名為實相即一切種智也非寂非照者寂謂寂靜照謂照明寂照皆言非者用遮二邊以顯中道實相之德也二觀照般若觀照般若者謂觀照之德非照而照了法無相名為觀照即一切智也非照而照者謂理本非照因觀而照以顯觀照之德也般若二種相出地藏十輪經一世間般若謂諸菩薩唯依讀誦書寫為他演說三乘道教勸正修行滅除煩惱惑業不行寂靜真實般若常行有見有相般若如是般若有取有著是名世間般若有見有相般若即世間之智如劬賔大臣分閻浮提七分而能息諍智滿祖師云正取世間之智為般若也二出世間般若謂諸菩薩精勤修習菩提道時隨力聽聞為他演說三乘正法而於其中心如虛空平等寂滅離諸名相如是般若無取無著是名出世間般若三乘者聲聞乘緣覺乘菩薩乘也二種般若莊嚴出般若經并大智度論梵語般若華言智慧謂智慧能嚴飾法身故名般若莊嚴一已莊嚴謂人能修習智慧如著美妙瓔珞莊嚴其身是名已莊嚴二未莊嚴謂人未能修習智慧如無瓔珞嚴飾其身是名未莊嚴金剛二義出金剛經助顯録金剛者金中最剛故云金剛而小品般若以金剛立題者具有堅利二義焉梵語般若華言智慧一堅義堅義者謂金剛之堅萬物不能碎壞以喻般若之體真常清淨不變不遷煩惱不能亂邪魔不能動此即實相般若也二利義利義者謂金剛之利能碎壞萬物以喻般若之用能斷惑著照五蘊空度諸苦厄此即觀照般若也五蘊者色蘊受蘊想蘊行蘊識蘊也法華二妙出法華玄義妙名不可思議非諸菩薩心思口議故也此之二妙正論法華開權顯實之意妙名一唱待絶俱時故相待論判則顯法華出前四時三教之上絶待論開復能開前令皆圓妙也開權顯實者開者發也拓也聲聞緣覺菩薩三乘之法是權佛乘是實佛說法華正為開三乘之權顯一乘之實故經云十方佛土中唯有一乘法又云决了聲聞法是諸經之王四時者華嚴時鹿苑時方等時般若時也三教者藏教通教別教也一相待妙彼此互形曰相以彼望此曰待彼此互形者形即形比之義謂以前四時三教所說之法為粗形後法華所說之法為妙以彼望此曰待者待即待對謂對前之粗顯後之妙也二絶待妙絶前諸粗無復形待謂法華開三乘之權即是佛乘之實實外無權權外無實實即是權權即是實故云絶待妙也
